volumes:
  pg-data:
    driver: local

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    working_dir: /deps/next-role/frontend
    # Self-heal node_modules against the host's pnpm-lock.yaml on every boot,
    # then start the dev server. Lets `pnpm add` on the host take effect via a
    # plain `docker compose restart frontend` — no rebuild, no volume nuking.
    # When the lockfile is already in sync this is a fast no-op.
    command: sh -c "pnpm install --frozen-lockfile && pnpm dev --hostname 0.0.0.0"
    ports:
      - "${FRONTEND_LOCAL_PORT}:3000"
    environment:
      PORT: 3000
      NEXT_PUBLIC_LANGGRAPH_DEPLOYMENT_URL: ${NEXT_PUBLIC_LANGGRAPH_DEPLOYMENT_URL}
      NEXT_PUBLIC_LANGGRAPH_ASSISTANT_ID: ${NEXT_PUBLIC_LANGGRAPH_ASSISTANT_ID}
      NEXT_PUBLIC_LANGSMITH_API_KEY: ${NEXT_PUBLIC_LANGSMITH_API_KEY}
      # Pin pnpm's content-addressed store inside the container layer so it
      # doesn't spill into the bind-mounted project as `.pnpm-store/`. (pnpm
      # falls back to a project-local store when its default location is on a
      # different filesystem than node_modules — which is exactly the case
      # inside this container.)
      PNPM_HOME: /root/.pnpm
      npm_config_store_dir: /root/.pnpm/store
      # Lets pnpm purge a stale `node_modules` (e.g. when the store path
      # changes) without prompting for confirmation — there's no TTY here.
      CI: "true"
    volumes:
      - .:/deps/next-role
      - /deps/next-role/frontend/node_modules
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:3000/').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:8
    ports:
      - "${REDIS_LOCAL_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 1s
      retries: 5

  postgres:
    image: pgvector/pgvector:pg18
    ports:
      - "${POSTGRES_LOCAL_PORT}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg-data:/var/lib/postgresql/18/docker
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      start_period: 10s
      timeout: 1s
      retries: 5
      interval: 60s
      start_interval: 1s

  # The gRPC data plane of the agent server (backend/server/core_server/).
  # Owns all assistant/thread/run/cron SQL and the Redis queue doorbell/pub-sub
  # fan-out; the backend blocks at boot until this is reachable. Same image as
  # the backend, different command. Internal-only — no host port. Code edits
  # under backend/server/core_server/ or backend/server/grpc_common/ need a
  # `docker compose restart core-server` (no hot reload here).
  core-server:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: next-role-backend:local
    restart: on-failure
    command: ["python", "-m", "server.core_server"]
    volumes:
      - .:/deps/next-role
      - /deps/next-role/backend/.venv
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      CORE_SERVER_BIND: 0.0.0.0:50052
      # Default is a Go-binary fallback at localhost:50051; empty disables it —
      # all RPCs are served natively by the Python implementation.
      CORE_SERVER_GO_FALLBACK: ""
      CORE_SERVER_POSTGRES_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      CORE_SERVER_REDIS_URI: redis://redis:6379
      # Only used to enumerate registered graph ids (assistant scoping); the
      # graph itself is loaded by the backend service.
      LANGSERVE_GRAPHS: >-
        {
          "career_agent": "/deps/next-role/backend/agents/career_agent/agents.py:career_agent"
        }
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import socket; socket.create_connection(('localhost', 50052), 2)",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
      start_interval: 1s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: next-role-backend:local
    restart: on-failure
    # Image CMD + --reload: uvicorn/watchfiles watches the bind-mounted source,
    # so backend code edits (agents/ and server packages alike) hot-reload.
    command: ["uvicorn", "server.api.server:app",
              "--log-config", "server/logging.json",
              "--host", "0.0.0.0", "--port", "8000",
              "--no-access-log",
              "--timeout-graceful-shutdown", "3600",
              "--timeout-keep-alive", "75",
              "--reload"]
    ports:
      - "${LANGGRAPH_LOCAL_PORT}:8000"
    volumes:
      - .:/deps/next-role
      # Keep the container's uv-managed `.venv` isolated from the host. Without
      # this, `uv run` inside the container creates `/deps/next-role/backend/.venv`
      # which leaks through the bind mount to the host with container-style paths
      # hardcoded — making the venv unusable from macOS and clobbering any host
      # venv. Same pattern as frontend `node_modules` above. (The image's own
      # venv lives at /opt/venv, outside the mount.)
      - /deps/next-role/backend/.venv
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      core-server:
        condition: service_healthy
    environment:
      REDIS_URI: redis://redis:6379
      POSTGRES_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      # Selects the postgres backend in the runtime edition router
      # (hard-required — the router raises if unset).
      LANGGRAPH_RUNTIME_EDITION: postgres
      LSD_GRPC_SERVER_ADDRESS: core-server:50052
      # Repo-owned migrations, applied at boot under a Redis lock (the code
      # default is the official image's /storage/migrations).
      MIGRATIONS_PATH: /deps/next-role/backend/storage/migrations
      # langchain-openai kills a stream after this many seconds without a
      # chunk (its default 120s is too aggressive for gpt-5.x reasoning
      # pauses on Azure /v1/responses — healthy streams go silent for
      # minutes mid-thought, especially with parallel subagents). 600s still
      # catches genuinely dead streams. Override in .env if needed.
      LANGCHAIN_OPENAI_STREAM_CHUNK_TIMEOUT_S: ${LANGCHAIN_OPENAI_STREAM_CHUNK_TIMEOUT_S:-600}
      LANGSERVE_GRAPHS: >-
        {
          "career_agent": "/deps/next-role/backend/agents/career_agent/agents.py:career_agent"
        }
    env_file: .env
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/ok', timeout=5).status==200 else 1)",
        ]
      interval: 60s
      timeout: 5s
      retries: 5
      # First boot budget: migrations no-op + up to 60s waiting on core-server
      # gRPC readiness.
      start_period: 60s
      start_interval: 2s
