# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.(svg|csv)$'
      - id: end-of-file-fixer
        exclude: '\.(svg|csv)$'
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        name: Backend Ruff Lint
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [ python, pyi, jupyter, pyproject ]
      - id: ruff-format
        name: Backend Ruff Format
        types_or: [ python, pyi, jupyter, pyproject ]

  - repo: local
    hooks:
      - id: backend-typecheck
        name: Backend Type Check
        entry: uv run ty check --ignore unresolved-import
        language: system
        files: ^backend/
        types_or: [python, pyi, jupyter, pyproject]
        pass_filenames: false

      - id: frontend-lint
        name: Frontend ESLint
        entry: bash -c 'cd frontend && pnpm exec eslint --fix "${@#frontend/}"' --
        language: system
        files: ^frontend/
        types_or: [javascript, jsx, ts, tsx]

      - id: frontend-format
        name: Frontend Prettier Format
        entry: bash -c 'cd frontend && pnpm exec prettier --write --ignore-unknown "${@#frontend/}"' --
        language: system
        files: ^frontend/
        types_or: [javascript, jsx, ts, tsx, json, yaml, markdown, css, scss]

      - id: frontend-typecheck
        name: Frontend Type Check
        entry: pnpm --dir frontend type-check
        language: system
        files: ^frontend/
        types_or: [ts, tsx]
        pass_filenames: false
