# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.(svg|csv)$'
      - id: end-of-file-fixer
        exclude: '\.(svg|csv)$'
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=2500"]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      # Generated protobuf/gRPC stubs are excluded here as well as in ruff's own
      # config: pre-commit passes filenames explicitly, which bypasses
      # [tool.ruff] exclude (an F401 autofix once stripped the side-effect
      # empty_pb2 imports that register well-known types in the descriptor pool).
      - id: ruff-check
        name: Backend Ruff Lint
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [ python, pyi, jupyter, pyproject ]
        exclude: ^backend/langgraph_grpc_common/proto/
      - id: ruff-format
        name: Backend Ruff Format
        types_or: [ python, pyi, jupyter, pyproject ]
        exclude: ^backend/langgraph_grpc_common/proto/

  - repo: local
    hooks:
      - id: backend-typecheck
        name: Backend Type Check
        # cd so ty discovers backend/pyproject.toml ([tool.ty.src] excludes the
        # vendored server dirs); from the repo root it would find no config.
        entry: bash -c 'cd backend && uv run ty check'
        language: system
        files: ^backend/
        types_or: [python, pyi, jupyter, pyproject]
        pass_filenames: false

      - id: frontend-lint
        name: Frontend ESLint
        entry: bash -c 'cd frontend && pnpm exec eslint --fix "${@#frontend/}"' --
        language: system
        files: ^frontend/
        types_or: [javascript, jsx, ts, tsx]

      - id: frontend-format
        name: Frontend Prettier Format
        entry: bash -c 'cd frontend && pnpm exec prettier --write --ignore-unknown "${@#frontend/}"' --
        language: system
        files: ^frontend/
        types_or: [javascript, jsx, ts, tsx, json, yaml, markdown, css, scss]

      - id: frontend-typecheck
        name: Frontend Type Check
        entry: pnpm --dir frontend type-check
        language: system
        files: ^frontend/
        types_or: [ts, tsx]
        pass_filenames: false

      - id: frontend-langchain-sdk-sync
        name: Frontend LangChain SDK sync
        entry: node frontend/scripts/check-langchain-sdk-sync.mjs
        language: system
        files: ^frontend/(package\.json|pnpm-lock\.yaml)$
        pass_filenames: false
