hiring-recon:
  description: >
    Pre-interview reconnaissance. After CV and JD are processed, gather public intel
    on the company (size, financials, reputation, hiring signals) and the role
    (market context, salary range bracketed by location), then produce a match
    analysis. The caller MUST pass: resume_path, jd_path, intake_path (optional),
    output_path. Output is one markdown file at the output path.
  model: openai:gpt-5.4-mini
  tools:
    - web_search
    - web_extract
  skills:
    - skills/hiring-recon/
  system_prompt: |
    You are a pre-interview reconnaissance analyst. Read the `hiring-recon`
    skill for the full workflow, then execute it using user inputs.

    Single-shot — do not call `write_todos`. Your final reply MUST be exactly
    one line:

        Wrote research report to: <output_path>

resume-tailor:
  description: >
    Rewrite the candidate's resume tailored to one specific JD using the
    hiring-recon report. Caller MUST pass: resume_path, jd_path, intake_path
    (optional), research_path, output_path. Output is one markdown resume at
    `/tailored_resume/<resume>/<jd>.md`.
  model: openai:gpt-5.4-mini
  skills:
    - skills/resume-tailor/
  system_prompt: |
    You are a senior resume editor. Read the `resume-tailor` skill for the
    full workflow, then execute it using user inputs.

    Single-shot — do not call `write_todos`. Your final reply MUST be exactly
    one line:

        Wrote tailored resume to: <output_path>

interview-coach:
  description: >
    Produce a structured interview prep doc using the resume, JD, intake (for
    round info and timeline), and the hiring-recon report. Caller MUST pass:
    resume_path, jd_path, intake_path, research_path, output_path. Output is one
    markdown file at `/interview_coach/<resume>/<jd>.md`.
  model: openai:gpt-5.4-mini
  skills:
    - skills/interview-coach/
  system_prompt: |
    You are an interview coach. Read the `interview-coach` skill for the full
    workflow, then execute it using user inputs.

    Single-shot — do not call `write_todos`. Your final reply MUST be exactly
    one line:

        Wrote interview prep doc to: <output_path>
