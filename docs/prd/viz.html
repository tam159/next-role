t gets its own outer folder of skills (`skills/career-agent/`, `skills/hiring-recon/`, `skills/resume-tailor/`, `skills/interview-coach/`), with the actual skill name as the inner folder. Each consumer's declaration (e.g. `skills=[\"skills/career-agent/\"]` on the main agent, `skills: skills/hiring-recon/` in `subagents.yaml`) points only at its own outer folder, so `SkillsMiddleware` loads exactly the skills that consumer needs \u2014 no cross-pollination. Considered a flat `skills/` with frontmatter-based gating; rejected because it would make the per-subagent skill list implicit and hard to audit.\n\n**All-upfront intake (Stage 1), persisted at end of Stage 2.** The agent asks all four intake questions in one message before any parsing. Persistence happens at the end of Stage 2 (not Stage 1) because the intake filename `/processed/<resume-slug>-<jd-slug>-intake.md` depends on slugs minted during Stage 2 parsing. Stage 1 answers are held in conversation context and written once both slugs exist \u2014 established in [PRD 04](04_initialize_subagents.md) and unchanged here.\n\n**Per resume\u00d7JD intake file.** `/processed/<resume-slug>-<jd-slug>-intake.md` matches the per-pair scoping of downstream stages \u2014 the same JD can apply to multiple candidates over time (e.g., an AI-leaning vs an infra-leaning resume variant), and Stages 3\u20135 are all keyed by the `<resume>/<jd>` pair, so intake follows. The path also serves as the natural cache key \u2014 re-running the workflow for the same pair finds the existing intake. (Pair-keyed naming was already in place at [PRD 04](04_initialize_subagents.md); called out here because it's load-bearing for the Stage 4/5 layout.)\n\n**Stage 4 runs `resume-tailor` and `interview-coach` in parallel.** Both subagents consume the same inputs (resume, JD, intake, research) and produce independent outputs (tailored PDF vs. interview prep doc). The orchestrator spawns them in a single turn via two `task` tool calls in parallel, then synthesizes once both return. Considered serial (tailor first, then coach reads the tailored resume); rejected because the coach's value comes from understanding the *original* candidate against the JD, not the polished version, and serializing would double the latency for no quality gain.\n\n**Tailored resume as YAML, rendered to PDF.** `resume-tailor` writes a `rendercv` YAML at `/tailored_resume/<resume>/<jd>.yaml` as the source of truth, then calls `prepare_render_settings` which kicks off `rendercv render` to emit a `.typ` intermediate (under `/render_intermediate/`, NOT in the UI allowlist) and a final `.pdf` sibling. The YAML is user-editable; the `.typ` and `.pdf` are regenerated on demand. Considered having the LLM write markdown and converting downstream; rejected because `rendercv`'s schema is the contract that produces a professional PDF, and asking the LLM to emit it directly avoids a lossy conversion step.\n\n**Backend storage routes split: StoreBackend for markdown, default LocalShellBackend for binaries.** `CompositeBackend(routes=\u2026)` in `agents.py` routes `/processed/`, `/research/`, `/interview_coach/`, `/memory/`, `/workspace/`, `/large_tool_results/` to `StoreBackend` (Postgres-backed, fast cross-session reads, queryable by namespace). `/tailored_resume/`, `/render_intermediate/`, `/upload/`, and `/interview_battlecard/` fall through to the default `LocalShellBackend(root_dir=CAREER_AGENT_DIR, virtual_mode=True)` so they land on disk \u2014 required for `rendercv` (writes real files Typst can read) and for the eventual battlecard PDF.\n\n**Subagents inherit `execute` from the main backend; declarative tool registration in `subagents.yaml`.** Each subagent in `subagents.yaml` declares its `tools:` (opt-in pool: `web_search`, `web_extract`, `prepare_render_settings`) and `skills:` paths. `load_subagents()` wires them up against a shared `_SUBAGENT_TOOLS` registry plus `_SUBAGENT_DEFAULT_TOOLS` (`list_files`, `overwrite_file`) so every subagent gets baseline filesystem access without re-declaring it. The system prompt for each subagent is a one-liner: role + pointer to its skill \u2014 the workflow lives in `SKILL.md`, not the prompt.\n\n# Files of interest\n\n| Concern | Path |\n|---|---|\n| 5-stage workflow + `write_todos` invariant | `backend/app/career_agent/prompts.py` (`SYSTEM_PROMPT`) |\n| Per-stage procedure manual (loaded via `memory=[\"CAREER_AGENT.md\"]`) | `backend/agents/career_agent/CAREER_AGENT.md` |\n| Agent wiring \u2014 `memory`, `skills`, `tools`, `subagents`, `backend` routes | `backend/app/career_agent/agents.py` |\n| Subagent definitions (`hiring-recon`, `resume-tailor`, `interview-coach`) | `backend/app/career_agent/subagents.yaml` |\n| Stage 3 skill | `backend/app/career_agent/skills/hiring-recon/hiring-recon/SKILL.md` |\n| Stage 4 skills | `backend/app/career_agent/skills/resume-tailor/resume-tailor/SKILL.md`, `backend/app/career_agent/skills/interview-coach/interview-coach/SKILL.md` |\n| Stage 5 skill (main agent) | `backend/app/career_agent/skills/career-agent/interview-battlecard/SKILL.md` |\n| File upload route | `frontend/src/app/api/files/upload/route.ts`, allowlist in `frontend/src/app/config/agentFiles.ts` |\n| `rendercv` driver | `prepare_render_settings` tool in `backend/app/career_agent/tools.py` |\n\n# Decisions worth remembering\n\n- **Override the default `write_todos` guidance, in-prompt.** Career-agent turns look \"simple\" individually (parse this file; spawn that subagent) but are stages of a 5-step arc, so `SYSTEM_PROMPT` explicitly tells the LLM to call `write_todos` from turn one. The middleware's general \"skip TODOs for simple objectives\" prompt is not edited \u2014 the override stays scoped to this agent.\n- **Don't ask the user twice.** If prep timeline / extra context arrive in a later turn (because they skipped the upfront ask), the same Stage 2 persistence step runs at that time \u2014 slugs already exist, and `CAREER_AGENT.md` spells out the late-arrival path. The agent does not loop on the ask if the user declined.\n- **Skill folders kebab-case, backend routes snake_case.** `skills/interview-coach/`, `skills/resume-tailor/`, `skills/career-agent/interview-battlecard/` all keep kebab-case (matches the existing skill folder convention and the `name:` slug in each `SKILL.md` frontmatter). Backend routes `/tailored_resume/`, `/interview_coach/`, `/interview_battlecard/`, `/render_intermediate/` use snake_case \u2014 the auto-memory rule requires snake_case for multi-word directory names matching `CompositeBackend` routes. Don't unify these.\n- **Slug suffix convention.** CV slugs end in `-resume`, JD slugs end in `-jd`. The missing-inputs check in Stage 2 uses this to detect when both artifacts exist in `/processed/` before Stages 3-5 run. Nested paths (`/research/<resume>/<jd>.md`, etc.) drop the `.md` extension on the directory segment but keep the suffix inside it (`/research/tam-nguyen-senior-ai-engineer-resume/aws-ai-solution-engineer-jd.md`).\n- **`/render_intermediate/` is hidden from the UI.** It holds `rendercv`-generated `.typ` files that are an implementation detail of the PDF pipeline. The frontend allowlist (`AGENT_FILE_SOURCES.career_agent`) deliberately omits it; users see the YAML source of truth and the rendered PDF, nothing in between.\n- **Subagent prompts stay minimal.** Each entry in `subagents.yaml` has a one-liner role + a pointer to its `SKILL.md` and a strict single-line return contract (e.g. `Wrote research report to: <output_path>`). Task details arrive in the user message at spawn time; workflow rules live in the skill, not the system prompt.\n\n# Deferred (intentional non-goals)\n\n- **PDF rendering for the interview battlecard.** Stage 5 still emits `.md` only. `/interview_battlecard/` already routes to `LocalShellBackend` (not `StoreBackend`) so the eventual binary lands on disk; the renderer itself is the missing piece.\n- **Cross-session resume / JD reuse.** Re-running the workflow with the same CV + JD pair regenerates everything. A \"you already have research for this pair \u2014 reuse?\" branch is an obvious follow-up but not in scope.\n- **LLM-driven retry / regeneration of individual stages.** If `resume-tailor` produces a weak PDF, the user can edit the YAML and re-run `rendercv`, but there's no in-chat \"regenerate just Stage 4 with this feedback\" affordance. The orchestrator restarts from the earliest stage that needs new inputs.\n\n# How to verify end-to-end\n\n1. `docker compose up -d`.\n2. Open the frontend, start a new chat, and send a message that triggers the workflow (e.g. \"Help me prep for an interview\").\n3. **Stage 1 ask.** The agent replies with one short message asking for CV, JD, prep timeline, and extra context \u2014 no file operations yet.\n4. **`write_todos` shows up.** In the LangGraph trace, confirm `write_todos` is called early with all 5 stages listed.\n5. **Stage 2 parse + persist.** Upload a CV from the paperclip, paste a JD URL, give \"1 week\" as the timeline plus \"I shipped a RAG side-project last month not on my CV\". Confirm:\n   - `/upload/<filename>` contains the raw CV bytes.\n   - `parse_document` / `extract_jd` write `/processed/<resume-slug>.md` and `/processed/<jd-slug>.md`.\n   - `/processed/<resume-slug>-<jd-slug>-intake.md` is written with the prep timeline.\n   - `/processed/<resume-slug>.md` has an appended `## Additional context` block with the RAG note \u2014 not the intake file.\n6. **Stage 3.** A `task` call spawns `hiring-recon`. Output appears at `/research/<resume>/<jd>.md`. The subagent's reply is a single line: `Wrote research report to: /research/<resume>/<jd>.md`.\n7. **Stage 4 (parallel).** Two `task` calls in the same turn spawn `resume-tailor` and `interview-coach`. Outputs:\n   - `/tailored_resume/<resume>/<jd>.yaml` (LLM-written YAML)\n   - `/render_intermediate/<resume>/<jd>.typ` (Typst intermediate)\n   - `/tailored_resume/<resume>/<jd>.pdf` (rendered PDF \u2014 open it and confirm it's a real, well-formatted resume)\n   - `/interview_coach/<resume>/<jd>.md` (structured prep doc with self-introduction + per-round STAR stories)\n8. **Stage 5.** The main agent loads the `interview-battlecard` skill, reads the three prior outputs, and writes `/interview_battlecard/<resume>/<jd>.md`.\n9. **Workspace > Files.** All artifacts except `/render_intermediate/` are visible. Confirm the tailored PDF is downloadable.", "09_file_category_colors": "# Why\n\nThe Workspace > Files panel renders every agent-produced file as a visually identical white card in an auto-fill grid. As the agent produces output across `/tailored_resume/`, `/interview_battlecard/`, `/research/`, `/processed/`, `/interview_coach/`, and `/upload/`, users end up scanning ~10 uniform tiles to find the artifact they want. The full file path is already in the card label, but reading 10 long paths to spot the one battlecard for a given role is slow. A subtle visual cue per category would let users land on the right file in one glance \u2014 without breaking the cream/teal calm of the existing theme.\n\n# What the user sees\n\nEach file card's icon is tinted by its root folder, the prefix path (e.g. `/research/`) is rendered in a muted tertiary text color while the filename stays in normal foreground, and long paths truncate with an ellipsis. The card itself, padding, hover, and delete control are unchanged. The full path remains on hover via the existing `title` tooltip.\n\nSix categories get a distinct icon color; system folders (`/memory/`, `/workspace/`, anything unmapped) keep the existing brand-teal icon \u2014 no regression.\n\n| Category | Token | Hue |\n|---|---|---|\n| `tailored_resume` | `--color-primary` | teal (brand) |\n| `interview_battlecard` | `--color-warning` | amber |\n| `interview_coach` | `--color-category-plum` | muted plum |\n| `research` | `--color-category-slate` | slate blue |\n| `processed` | `--color-success` | green |\n| `upload` | `--color-category-clay` | warm clay |\n\n# How \u2014 the key architectural choices\n\n**Mapping is purely a frontend concern, derived from the existing virtual path string.** No backend changes, no schema work, no new API. The 6 colored categories are listed in one module that the Files component consults per render.\n\nWhy this shape:\n\n- **CSS variables, not Tailwind config.** Colors are referenced via `style={{ color: \"var(--color-...)\" }}` inline, matching the existing `--color-file-button` pattern already used in `TasksFilesSidebar.tsx`. Dark mode comes free because every `--color-*` token has a `prefers-color-scheme: dark` override in `globals.css`. Skipping Tailwind theme extension keeps this a one-off palette without bloating the design system.\n- **Color the icon, nothing else.** An early design used a 3px left accent bar plus icon tint; user review said the bar was redundant once the icon carried the signal. Final design uses icon tint alone \u2014 quieter, no extra DOM, full card padding preserved.\n- **Hues chosen for separability at icon size, not brand fidelity.** Initial palette reused `--color-primary`, `--color-secondary`, `--text-brand-tertiary`, and `--color-success` \u2014 all teal-family. At small icon sizes they read as \"four greens.\" Final palette keeps the two non-teal semantic tokens (warning amber, success green) and adds three new tokens (plum, slate, clay) at low saturation. Six hues, each \u226540\u00b0 apart on the wheel.\n\n# Files of interest\n\n| Concern | Path |\n|---|---|\n| Category mapping + helpers | `frontend/src/app/lib/fileCategories.ts` |\n| New palette tokens (light + dark) | `frontend/src/app/globals.css` (`--color-category-plum`, `--color-category-slate`, `--color-category-clay`) |\n| File card render | `frontend/src/app/components/TasksFilesSidebar.tsx` (`FilesPopover`) |\n\n# Decisions worth remembering\n\n- **Icon-only color, no badges, no group headers, no tinted backgrounds.** User explicitly chose the quietest option. Future requests to \"make categories more prominent\" should start by reconsidering whether the calm theme is still the right goal \u2014 not by stacking treatments on top of this one.\n- **Three new CSS tokens, not reassignment of `--color-error`.** Reds remain reserved for the destructive delete action so the category palette never collides with destructive UI semantics.\n- **Filename rendering ended up as one inline `<span class=\"truncate\">`, not flex-split parts.** Three intermediate designs tried to keep the file extension always visible (flex with `shrink-0` extension, `-ml-px` negative margin to close ellipsis gaps, JS character-budget truncation that built `prefix + stem + \"\u2026\" + ext` as one string). Each had its own artifact \u2014 visible whitespace gaps between `\u2026` and the extension, double-dot rendering (`tam-\u2026.md` reading as `tam-....md`), or invisible clipping when a long prefix pushed the JS-truncated tail past the card's `overflow:hidden` edge. The final shape \u2014 one truncating span with native CSS ellipsis \u2014 is robust and consistent across rows, at the cost of sometimes hiding the extension on very long paths. The `title={filePath}` hover tooltip preserves the full path for users who need it.\n- **`text-tertiary` for the prefix.** The token already exists in `globals.css` and is wired up via `tailwind.config.mjs`. No new theme color needed for the dimming effect.\n- **`getFileCategory` matches only the first path segment.** Disk-backed sources like `/tailored_resume/<role>/<file>.yaml` produce a long virtual path, but the root segment is what matters for the color decision. Nested folders are reflected in the dimmed prefix text, not the icon color.\n- **Iteration order preserved.** The grid still renders files in the order they appear in the `files` record (chronological-ish). No regrouping or sorting by category \u2014 that's a bigger UX change worth its own PRD.\n\n# Deferred (intentional non-goals for v1)\n\n- **Pixel-accurate middle-truncation that always preserves the file extension.** Would need canvas `measureText()` plus a `ResizeObserver` on the card. Worth doing only if losing the extension on long paths turns out to actually hurt usage.\n- **Group-by-category view with section headers.** Stronger structure, bigger UX change. Possible follow-up if users start producing >10 files per session.\n- **Drag-to-reorder, filter chips, search.** Out of scope.\n- **Per-category icon glyphs** (e.g., briefcase for battlecard, magnifier for research). Color alone is the lighter touch; revisit if users want stronger differentiation.\n- **Light/dark accessibility audit beyond informal contrast checks.** All six tokens were eyeballed against both surface colors but not run through a WCAG checker.\n\n# How to verify end-to-end\n\n1. `docker compose up -d` and open the frontend.\n2. Trigger the agent to produce files across at least four of the six categories \u2014 e.g. ask for a tailored resume, a battlecard, a research note, and process an upload. Confirm each card's icon matches the palette table above.\n3. Drop a file into a system folder (e.g. `/memory/`) and confirm its card looks identical to the pre-change baseline \u2014 brand-teal icon, no tint.\n4. Hover any card \u2192 `title` tooltip shows the full virtual path.\n5. Resize the panel narrow enough to truncate. Filename ends in `\u2026`; prefix `/research/` is still readable as the dimmer leading text.\n6. Toggle OS-level dark mode and confirm all six hues remain readable on the dark surface \u2014 no low-contrast issues, no token still resolving to its light value.", "10_print_file_as_pdf": "# Why\n\nThe Workspace > Files viewer lets users **Download** a file as its raw source. For markdown, code, and DOCX files the viewer already renders into formatted HTML (headings, links, syntax-highlighted code, tables), raw source is rarely what the user actually wants \u2014 they want a polished, shareable artifact (e.g. send a rendered interview battlecard to a recruiter). Without this, \"save a nice copy of this file\" is a manual copy-paste + reformat job.\n\n# What the user sees\n\nA new **Print** button next to **Download** in the file preview dialog (`FileViewDialog`). One click opens the browser's native print dialog overlaid on the current tab \u2014 the workspace and the file preview stay put. The user picks \"Save as PDF\" (or a physical printer) from the OS dialog. The default filename is the file's path with slashes turned to dashes and the extension stripped, e.g. `/interview_battlecard/tam-nguyen-lead-ai-ml-resume/within-ai-engineer-jd.md` \u2192 `interview_battlecard-tam-nguyen-lead-ai-ml-resume-within-ai-engineer-jd.pdf`.\n\nThe button is shown for **markdown, text/code, and DOCX**. It's hidden for already-PDF files (Download is enough), images, and unknown binaries. For DOCX it stays disabled until `mammoth` finishes the in-browser conversion.\n\n# How \u2014 the key architectural choice\n\n**Render the file content into a hidden, same-origin iframe pointing at a dedicated `/print/file` route, then auto-call `window.print()`.**\n\nWhy this shape rather than a PDF library or printing the dialog directly:\n\n- **No PDF dependency.** Adding `jspdf`/`@react-pdf` etc. would require a container restart per `frontend/CLAUDE.md` and pull a heavyweight dep for what `window.print()` already does. Hash through the OS's \"Save as PDF\" instead.\n- **Iframe, not new tab.** A new tab loses focus from the workspace; the user said so explicitly during review. A 0\u00d70 hidden iframe keeps the user in place \u2014 the browser's print dialog overlays the current tab. Same-origin iframes share `sessionStorage` with the parent, so passing the rendered content needs no API call.\n- **Dedicated print route.** Radix `Dialog` lives in a portal inside a `max-h-[80vh]` ScrollArea \u2014 printing the dialog itself would clip content. The `/print/file` route reuses `MarkdownContent` and `SyntaxHighlighter` so we don't duplicate rendering; it applies its own print CSS in isolation.\n\n# Files of interest\n\n| Concern | Path |\n|---|---|\n| Print page (iframe target) | `frontend/src/app/print/file/page.tsx` |\n| Print button + iframe handler | `frontend/src/app/components/FileViewDialog.tsx` (`handlePrint`, lines ~189\u2013227) |\n| Reused markdown renderer | `frontend/src/app/components/MarkdownContent.tsx` |\n| Reused DOCX \u2192 HTML conversion (already done in dialog state) | `FileViewDialog.tsx` (`docxHtml` via `mammoth`) |\n| Theme CSS variables overridden for print | `frontend/src/app/globals.css` (light values mirrored under `.print-root` in `page.tsx`) |\n\n# Decisions worth remembering\n\n- **`sessionStorage` for the iframe payload, not query string or API.** Same-origin iframes share the parent's `sessionStorage`; the payload (`{path, content, kind, language?}`) lands under a fixed key (`nextrole:print-file`) and the print page clears it immediately after read. No server round-trip, no URL size limit, no leakage across origins.\n- **Light theme is *redeclared*, not class-toggled.** `globals.css` flips theme via `@media (prefers-color-scheme: dark)` on `:root`. There is no `.light`/`.dark` class wired up. A `.light` wrapper would do nothing. Instead the print page re-declares the light values on `.print-root` \u2014 a more-specific selector \u2014 so dark-mode users still get a printable light PDF.\n- **DOCX HTML is passed through, not re-rendered.** `mammoth` already ran in the dialog; the payload carries the rendered HTML for the DOCX case and the print page drops it in via `dangerouslySetInnerHTML` (same trust boundary as the dialog \u2014 the user's own uploaded document).\n- **`document.title` swap on the *parent* for the Save-as filename.** Browsers use the top-level document's title \u2014 not the iframe's \u2014 as the default print job name. The handler temporarily overwrites `document.title` and restores it on `afterprint`. The tab title flickers for a moment; acceptable.\n- **Path \u2192 filename mangling.** `/folder_a/folder_b/file.md` becomes `folder_a-folder_b-file.pdf` so nested files keep their folder context in the saved file. Slashes \u2192 dashes; extension stripped; leading slash dropped.\n- **`await document.fonts.ready` + one `requestAnimationFrame` before `window.print()`.** Without these the print preview can fire mid-paint and render the first page un-fonted.\n- **iframe cleanup on `afterprint`.** The parent's listener on `iframe.contentWindow` removes the iframe whether the user saved or cancelled. The print page's own `window.close()` on `afterprint` is a no-op inside an iframe (browsers block `close()` on windows the script didn't open) \u2014 kept as belt-and-suspenders for the case someone navigates to `/print/file` directly.\n\n# Deferred (intentional non-goals for v1)\n\n- **Server-side / headless PDF rendering** (Playwright, Puppeteer). Browser print is good enough; revisit only if WYSIWYG drift across browsers becomes a problem.\n- **Custom cover page / header / footer / page numbers.** Out of scope; not requested.\n- **Bulk export** (multiple files \u2192 one combined PDF, e.g. all files in `/interview_battlecard/<role>/`). Possible follow-up if users start asking.\n- **PDF export for already-PDF files** \u2014 existing Download already saves the PDF bytes; no value in re-printing.\n- **PDF export for images / unrecognized binaries** \u2014 out of scope.\n\n# How to verify end-to-end\n\n1. `docker compose up -d` and grab the frontend host port from `docker ps`.\n2. Open Workspace > Files, click a `.md` file. **Print** appears next to **Download**.\n3. Click Print \u2192 the OS print dialog appears over the current tab (no new tab). The preview shows the rendered markdown \u2014 headings, links, code blocks, tables, light backgrounds.\n4. The Save-as filename defaults to `<folder_a>-<folder_b>-<basename>.pdf`. Save and open the resulting PDF.\n5. Cancel the dialog on a separate try \u2014 the hidden iframe disappears, the original tab title is restored.\n6. Repeat for a code file (`.py`/`.ts`/`.json`) \u2014 syntax-highlighted with the `oneLight` Prism theme, no dark backgrounds in the PDF.\n7. Repeat for a `.docx` \u2014 the mammoth-rendered HTML matches the dialog preview.\n8. Open a `.pdf` file or an image \u2014 Print button is hidden (only Download).\n9. Toggle the OS to dark mode and repeat the markdown case \u2014 the PDF must still be light-on-dark text on a white background.", "11_interview_battlecard_pdf": "**Extends:** [agent_workflow](08_agent_workflow.md), mirrors [tailored_resume_pdf](07_tailored_resume_pdf.md)\n\n# Why\n\nStage 5 of the agent workflow previously emitted a markdown battlecard at `/interview_battlecard/<resume>/<jd>.md`. Plain markdown is the wrong artifact to walk into an interview with \u2014 candidates don't open it the night before because it doesn't *feel* like prep. We want a visually attractive, downloadable PDF that makes the candidate actually review it, plus a JSON sibling they can hand-edit in Workspace > Files and re-render.\n\nThis mirrors the tailored-resume pattern (YAML source of truth + rendercv-generated PDF) but for battlecards (JSON source of truth + weasyprint-generated PDF). `weasyprint>=68.1` was already added to `backend/pyproject.toml` ahead of this work.\n\n# What the user sees\n\nFor each `<resume>` \u00d7 `<jd>` pair, Workspace > Files now shows two artifacts under `/interview_battlecard/<resume>/`:\n\n- `<jd>.json` \u2014 the source of truth. LLM-written, hand-editable. Strict shape: `document_title` + `rounds[]` with five sections per round (`introduction`, `stories_ready`, `company_facts`, `questions`, `watch_outs`).\n- `<jd>.pdf` \u2014 A4 landscape, one page per round, five colored section cards (intro yellow, stories lavender, facts peach, questions pink, watch-outs blue), FiraSans throughout.\n\nThe `.md` from v0 is gone \u2014 replaced, not augmented. Existing `.md` files in the repo are stale outputs; the agent regenerates per run.\n\nAfter rendering, the agent emits one short handoff line: `Battlecard saved \u2014 N rounds, JSON + PDF under /interview_battlecard/<resume>/<jd>.{json,pdf}`. To re-render after the user edits the JSON, the user asks the agent to re-run `render_battlecard_pdf` on the same path \u2014 idempotent.\n\n# How \u2014 the key architectural choices\n\n**One-step in-process render, not the rendercv-style two-step CLI handshake.** Tailored resumes use `prepare_render_settings` + `execute(\"rendercv render \u2026\")` because rendercv is a CLI binary. weasyprint is a pure-Python library, so the new tool reads the JSON via the backend, runs jinja2 + weasyprint inline, and writes the PDF \u2014 one tool call, no shell, no settings-block injection. The LLM doesn't reason about render config at all.\n\n**Template assets bundled in-tree as a self-contained unit.** `backend/app/career_agent/templates/battlecard/` holds the `.html.j2`, `.css`, and five FiraSans `.ttf` files (~2.2 MB). The CSS references fonts via relative `url(FiraSans-*.ttf)`; weasyprint resolves them through `base_url=<template_dir>`. Co-locating means a single `base_url` works and the template directory is portable. System fonts were rejected for reproducibility \u2014 fonts must match across dev host, container, and future deploys.\n\n**Lazy weasyprint import, after path validation.** weasyprint's `cffi` pulls Pango/GLib at import time. The user's macOS host doesn't have those native libs (the Docker container does). Moving `from weasyprint import HTML` *inside* the tool function \u2014 and *below* the path-prefix / extension validation \u2014 keeps `tools.py` import-safe everywhere and lets the validation-only unit tests run on the host without system deps.\n\n**Backend-relative return string.** The tool returns `Rendered PDF to /interview_battlecard/<r>/<j>.pdf`, not the on-disk path (which would be `/deps/next-role/backend/app/career_agent/interview_battlecard/\u2026` inside the container). The container mount prefix is noise to the LLM and confuses follow-up tool calls that expect backend-absolute paths.\n\n# Files of interest\n\n| Concern | Path |\n|---|---|\n| New tool factory | `backend/app/career_agent/tools.py` (`make_render_battlecard_pdf`) |\n| Tool wired into main agent only (not subagents) | `backend/app/career_agent/agents.py` |\n| Template, CSS, five FiraSans fonts | `backend/app/career_agent/templates/battlecard/` |\n| Skill rewrite: JSON shape contract + two-step flow | `backend/app/career_agent/skills/career-agent/interview-battlecard/SKILL.md` |\n| Flow step 5 + File Structure block updated | `backend/app/career_agent/README.md` |\n| Unit tests (validation + render; render-only tests skip on no-deps hosts) | `backend/tests/career_agent/test_tools_battlecard_pdf.py` |\n\n# Decisions worth remembering\n\n- **`/interview_battlecard/` was already routed to `LocalShellBackend`.** No new route in `CompositeBackend`. The README v0 claim that it \"uses FilesystemBackend so the eventual binary output lands on disk\" was implicit fall-through to the default \u2014 kept as-is; just deleted the \"future phase\" note.\n- **JSON schema lives in SKILL.md, not pydantic.** Jinja2 silently tolerates missing optional fields; pydantic validation would catch LLM drift but adds a wrap around what is currently a deterministic LLM-emit problem. Revisit if rendering errors start cropping up; for v1 the SKILL.md spec is the contract.\n- **Drop the v0 markdown output entirely.** Earlier consideration: keep `.md` alongside `.json` + `.pdf` for grep-ability. Rejected \u2014 three artifacts is noise, and the JSON+PDF pair already covers \"edit\" + \"review\" use cases. Existing `.md` files are left in place (regenerated per run, not migrated).\n- **Tool returns backend-relative path, not on-disk.** Caught during review \u2014 `Path` object's `__str__` was the on-disk absolute. Switched to `json_path.removesuffix(\".json\") + \".pdf\"` so the LLM gets a usable path back.\n- **Render-only tests gated by `pytest.mark.skipif`.** `_weasyprint_importable()` tries `import weasyprint` and catches `OSError`. Four validation tests always run; two render tests skip on Mac unless Pango is installed, but pass cleanly inside the backend container in CI.\n- **Not exposed to subagents.** Stage 5 is main-agent-only per CAREER_AGENT.md. Deliberately omitted from `_SUBAGENT_TOOLS` so no future declarative subagent silently picks it up.\n- **Empty-content check removed from the tool.** `FilesystemBackend.read` returns line-numbered content (e.g. `[\"1\\t   \", \"2\\t  \"]`), so `content.strip()` on a whitespace-only file is non-empty. The JSON decode error message is just as informative for that case; the redundant check is gone.\n\n# Deferred (intentional non-goals for v1)\n\n- **Pydantic schema for the JSON.** Add once LLM drift becomes observable; not needed today.\n- **UI \"regenerate from edited JSON\" button.** User asks the agent to re-render after editing in Workspace > Files. Trigger for revisit: if users start editing JSON frequently enough that the round-trip through chat feels heavy.\n- **Multiple templates / theme picker.** Single template only for v1. The `.html.j2` + `.css` are designed to be swappable as a unit if/when more themes are wanted.\n- **PDF rendering for the resume battlecard JSON via the same template.** Out of scope \u2014 resumes already have rendercv.\n- **LangSmith evals against the rendered PDF.** Tracked under the deferred `@pytest.mark.eval` marker; rendering quality is binary today (does it open, does it have the right rounds).\n- **Migration of existing `.md` battlecards.** They're outputs; agent regenerates on next Stage-5 run for that resume \u00d7 JD.\n\n# How to verify end-to-end\n\n1. `docker compose up -d` (the user's standard local-dev stack \u2014 weasyprint's Pango/GLib system libs are baked into `next-role-backend`).\n2. From `backend/`: `docker exec next-role-backend-1 bash -lc 'cd /deps/next-role/backend && uv run pytest tests/career_agent/test_tools_battlecard_pdf.py -v'` \u2014 6/6 pass in the container. On the macOS host, `uv run pytest tests/career_agent/test_tools_battlecard_pdf.py` shows 4 passed, 2 skipped.\n3. In the frontend, kick off Stage 5 for an existing resume \u00d7 JD pair that already has a tailored resume + interview-coach prep doc.\n4. Watch the agent call `overwrite_file(\"/interview_battlecard/<r>/<j>.json\", \u2026)` then `render_battlecard_pdf(\"/interview_battlecard/<r>/<j>.json\")`. The tool replies `Rendered PDF to /interview_battlecard/<r>/<j>.pdf` \u2014 backend-relative.\n5. In Workspace > Files, both `<jd>.json` and `<jd>.pdf` appear under `/interview_battlecard/<resume>/`. Click the PDF \u2014 A4 landscape, one page per round, five colored section cards, FiraSans.\n6. Edit the JSON in Workspace > Files (e.g. drop a watch-out), ask the agent to re-render \u2192 PDF refreshes in place; JSON is unchanged otherwise.", "12_multi_turn_updates": "**Extends:** [Career-Agent Workflow Orchestration (v2)](08_agent_workflow.md), [Interview Battlecard PDF (v1)](11_interview_battlecard_pdf.md)\n\n# Why\n\nThe v2 workflow takes the user from intake to a finished interview kit (research report, tailored resume PDF, interview prep doc, battlecard PDF) in one autonomous pass. After that pass, users want to iterate without restarting: \"add a 4th round to the battlecard\", \"add React to my resume skills\", \"drop the Twitter link\", \"expand the research on team org structure\", \"add common questions to round 2 of my prep doc\".\n\nBefore this change, the prompts and skills assumed a one-shot pipeline. Every subagent's system_prompt was stamped *\"Single-shot \u2014 do not call `write_todos`. Your final reply MUST be exactly one line: `Wrote <X> to: <path>`\"*; every skill described a from-scratch authoring workflow; `CAREER_AGENT.md` had no follow-up path. Only the battlecard SKILL.md had a single sentence about user-edits-then-re-render. The agent would either refuse update requests or quietly recreate artifacts from scratch, losing user intent and ignoring prior tailoring.\n\n# What the user sees\n\nAfter all five stages are done, the user can ask in chat for any in-place change to any artifact, and the agent applies it without re-running upstream stages:\n\n- **Battlecard** \u2014 \"add a Tech deep-dive round, 60 min\". The main agent re-reads the JSON, edits it, re-renders the PDF.\n- **Research report** \u2014 \"add a subsection on the team's org structure under Maya Chen\". Main agent spawns `hiring-recon` in update mode; the report is edited in place; every other section is untouched.\n- **Tailored resume** \u2014 \"drop the Twitter link\" or \"add React 19 as the leading skill in the AI/ML category\". `resume-tailor` is spawned in update mode; the YAML is edited, then `prepare_render_settings` + `rendercv render` refresh the PDF.\n- **Interview prep doc** \u2014 \"add 3 common behavioral questions with model answers under Round 2\". `interview-coach` is spawned in update mode; the doc is edited.\n\nThe user-visible signal that an update happened (vs. a fresh create) is the reply verb: `Wrote <artifact> to: <path>` for first-time creation, `Updated <artifact> at: <path>` for in-place edits. The main agent mirrors the verb when summarising back to the user.\n\nSkill-level preservation defaults that previously read as absolute (*\"Never drop a skill\"*, *\"Never drop a URL\"*, *\"No extra JSON keys\"*, *\"Single output file\"*) now yield to explicit user requests on a per-item basis. Truth/fabrication rules (don't invent metrics, titles, experience, company facts) stay absolute.\n\nNo frontend changes \u2014 the entire surface is conversational.\n\n# How \u2014 the key architectural choices\n\n**Route by file owner, not by user-intent classifier.** Each artifact already has a clear owner from the v2 workflow: the battlecard JSON is the main agent's (no subagent exists for it); the research report, tailored resume, and interview prep doc each have a dedicated subagent that already encapsulates the skill needed to author them. Updates route to the same owner. The main agent does not try to classify \"is this trivial enough to do myself\" \u2014 it owns battlecard edits because there's no subagent to delegate to, and it delegates everything else. Considered a generic \"update_file\" tool the main agent calls directly for all artifacts; rejected because each subagent already carries the domain skill (resume YAML validation, rendercv re-render, STAR-story preservation, falsifiable-fact discipline) and bypassing them would either duplicate that skill in the main prompt or silently lose it.\n\n**Subagents stay single-shot, but the contract distinguishes create vs update mode through phrasing in the task input.** Each subagent's `system_prompt:` now says *\"The caller's task may be to CREATE or UPDATE \u2014 read the task description to tell. In update mode, read output_path first and preserve everything except the parts the caller named.\"* The main agent's job is to phrase the spawn-task with verbs like *\"Update the existing X at \u2026\"* vs *\"Create \u2026\"*. Considered adding a structured `mode: create | update` field to the task input; rejected because the deepagents `task` tool takes a free-form description and adding structure means a custom wrapper. Phrasing-as-contract is brittle on paper but in practice trivial \u2014 the SKILL.md and the system_prompt both reinforce the verb, and the one-line reply contract (`Wrote \u2026` vs `Updated \u2026`) makes the mode observable in the trace.\n\n**Edit-by-default, overwrite-by-exception.** `FilesystemMiddleware.edit_file` (deepagents) does string-anchor replacement and is already available to every agent and subagent. The new Updates sections in each SKILL.md say *\"use `edit_file` for targeted insertions/replacements; use `overwrite_file` only when restructuring most of the file.\"* This keeps the diff small and reduces the risk of the LLM regenerating unrelated content. The battlecard skill specifically calls out that JSON-schema invariants (round order, types) must survive the edit.\n\n**Always read before editing, even when the artifact was generated this turn.** The battlecard update step starts with `read_file` even though the JSON content was in the LLM's context when it was created. Chat history may have been compacted; the user may have hand-edited via Workspace > Files between turns; `edit_file`'s string-anchor match fails silently if the cached content drifted. The cost of an extra `read_file` is trivial against the cost of a corrupted edit. Subagents always read first because they spawn in fresh context with no prior knowledge of the file.\n\n**User requests override skill preservation defaults; truth rules stay absolute.** Each SKILL.md splits its \"Hard rules\" / \"Unacceptable\" block into two sub-blocks: *Absolute* (no fabrication \u2014 applies to resume-tailor's \"don't claim untrue titles\" and \"don't change metrics\", hiring-recon's \"Unknown \u2014 no public signal\", interview-coach's \"every STAR story traces to the candidate's resume\", battlecard's \"company_facts must be falsifiable\") vs *Default* (preservation rules the user can override per-item \u2014 \"don't drop a skill\", \"don't drop a URL\", \"no extra JSON keys\", \"single output file\", length caps, single self-introduction). Considered keeping all rules absolute and asking the user to confirm any override; rejected because it makes the agent feel uncooperative \u2014 the user's stated preference about *their own resume* should win without a confirmation dance.\n\n# Files of interest\n\n| Concern | Path |\n|---|---|\n| Routing summary in main system prompt | `backend/app/career_agent/prompts.py` (`SYSTEM_PROMPT`, the new follow-up paragraph) |\n| Stage 6 procedure: per-artifact update flows + task-input templates | `backend/agents/career_agent/CAREER_AGENT.md` (`## Stage 6 \u2014 Updates and follow-ups`) |\n| Subagent system_prompts: create vs update mode, user-first clause, two-verb reply contract | `backend/app/career_agent/subagents.yaml` |\n| Battlecard update flow (main agent owns it) + Hard-rules split | `backend/app/career_agent/skills/career-agent/interview-battlecard/SKILL.md` (`## Updates`, `## Hard rules`) |\n| Research update flow + Rules split | `backend/app/career_agent/skills/hiring-recon/hiring-recon/SKILL.md` (`## Updates`, `## Rules`) |\n| Resume update flow + Unacceptable split + per-rule \"user can override\" exceptions | `backend/app/career_agent/skills/resume-tailor/resume-tailor/SKILL.md` (`## Updates`, \"Skills preservation rule\", \"URL preservation rule\", \"Truth-vs-tailoring guardrail\") |\n| Interview-prep update flow + Rules split | `backend/app/career_agent/skills/interview-coach/interview-coach/SKILL.md` (`## Updates`, `## Rules`) |\n| README pointer to Stage 6 | `backend/app/career_agent/README.md` (`## Multi-turn updates`) |\n\n# Decisions worth remembering\n\n- **Reply verb distinguishes create vs update.** Subagents reply `Wrote <artifact> to: <path>` on creation, `Updated <artifact> at: <path>` on in-place edit \u2014 note the verb *and* the preposition (`to:` \u2192 `at:`). The main agent's chat history sees only task input + this one line; the verb is how it knows what to tell the user. Considered collapsing back to one wording for simplicity; rejected because the user-facing summary then loses signal about whether existing work was preserved or replaced.\n- **The main agent does not run `write_todos` for single-file updates.** The `SYSTEM_PROMPT` already excluded \"easy follow-ups about work already produced\" from the TODO checklist; Stage 6 reinforces this. A single-artifact update is a one- or two-tool-call task; the TODO middleware's overhead would dominate.\n- **No cascading re-renders.** A research update could in principle warrant a battlecard refresh (new facts, new salary signal), and a resume tailoring change could warrant new STAR stories in the prep doc. Stage 6 explicitly says: do not auto-cascade \u2014 ask the user once if a downstream artifact looks stale, and let them confirm. The user owns the battlecard as the day-of artifact; silent regeneration of their hand-edits would be hostile.\n- **No new tools, no wiring changes.** `edit_file` was already exposed via deepagents' `FilesystemMiddleware` and documented in `prompts.FILESYSTEM`. `agents.py`, `tools.py`, and the backend route table are untouched. The entire feature is prompt + skill work.\n- **Per-rule exceptions over a blanket \"user can override anything\" clause.** Each preservation rule in the resume-tailor skill (skills, URLs, the bigger \"Unacceptable\" list) carries its own *Exception: if the user explicitly asks to drop one, drop only what they named* sentence, and the unacceptable list itself is split into \"Absolute\" (truth) and \"By default\" (preservation) sub-blocks. Considered one global \"user requests override\" line at the top; rejected because the granularity matters \u2014 *dropping a Twitter link* is fine on request, *claiming an untrue title* is never fine even if the user asks.\n- **Updates section appended to each SKILL.md, not woven into the existing workflow.** Each `## Updates` subsection sits between the create-mode procedure and the final `## Rules` block. Two reasons: skim-friendly for a future reader (the create flow is the dominant path on first read), and additive so the existing create flow stays exactly as v2 documented it \u2014 no regression risk on the first-run path.\n- **README has one paragraph, not a duplicate procedure.** The README's new `## Multi-turn updates` block is six lines and points at `CAREER_AGENT.md` Stage 6 for detail. Duplicating Stage 6's task-input templates in the README would create a second source of truth that drifts.\n\n# Deferred (intentional non-goals for v1)\n\n- **Cascading update prompts.** Stage 6 says \"ask the user once whether to refresh the battlecard\" after an upstream update, but the agent has no structured detector for *when* a refresh is warranted. Today it relies on the LLM's judgment; if this turns out to miss obvious cascades (renamed top skill, new salary signal), add explicit triggers in Stage 6.\n- **Diff preview before applying.** The agent edits the file directly. A \"here's what I'm about to change \u2014 confirm?\" preview was considered for high-blast-radius edits (full-file overwrites, schema-shape changes) but rejected for v1 \u2014 the user can always revert via Workspace > Files or ask the agent to undo in the next turn.\n- **Versioned snapshots / undo history.** No history beyond what the user manually keeps. If we start seeing accidental overwrites, a per-edit snapshot under `/workspace/snapshots/` is the natural follow-up.\n- **Update mode for `parse_document` / `extract_jd`.** Re-running with the same `output_path` / `save_as` already overwrites cleanly (Stage 2 procedure), so no new code path is needed. Documented as-is in Stage 6's \"Processed resume/JD/intake updates\" line.\n- **Structured `mode:` field in the task spawn.** Phrasing-as-contract is enough today; revisit if subagents start misclassifying create vs update.\n- **A battlecard subagent.** The battlecard stays main-agent-owned for both create (Stage 5) and update (Stage 6). The skill is short, the JSON is small, and spawning a subagent for what's effectively a single `edit_file` + `render_battlecard_pdf` would add latency without isolating useful context.\n\n# How to verify end-to-end\n\n1. `docker compose up -d`. Open a thread that already has a full Stages 1\u21925 run for one resume \u00d7 JD pair (all artifacts visible in Workspace > Files: processed CV/JD, intake, research, tailored resume YAML+PDF, interview prep doc, battlecard JSON+PDF).\n2. **Battlecard update (main agent owns it).** Send: *\"Add a 4th round \u2014 Tech deep-dive, 60 min.\"* In the LangGraph trace, confirm the main agent: (a) calls `read_file(\"/interview_battlecard/<r>/<j>.json\", limit=1000)`, (b) calls `edit_file` (or `overwrite_file` if the round insertion forces a restructure) on the same path, (c) calls `render_battlecard_pdf(\"/interview_battlecard/<r>/<j>.json\")`. The PDF in Workspace > Files refreshes; rounds 1\u20133 are unchanged.\n3. **Research update (`hiring-recon`).** Send: *\"Add a subsection on the team's org structure under Maya Chen in the research report.\"* Confirm a single `task` call to `hiring-recon` with task input containing *\"Update the existing research report at /research/<r>/<j>.md\"* + the named change. Subagent's one-line reply is `Updated research report at: /research/<r>/<j>.md`. The `## Hiring team` section grows; `## Company snapshot`, `## Match analysis`, etc. are byte-identical to before.\n4. **Resume update with user-override (`resume-tailor`).** Send: *\"Drop the Twitter / X link from my resume.\"* Confirm `task` spawns `resume-tailor` in update mode. Subagent's trace shows it `read_file`s the YAML, removes only the Twitter `social_networks` (or `custom_connections`) entry, re-runs `prepare_render_settings`, then `execute(\"rendercv render \u2026\")`. Reply: `Updated tailored resume PDF at: /tailored_resume/<r>/<j>.pdf`. The PDF re-renders without the link; every other skill, bullet, and URL survives.\n5. **Interview-prep update (`interview-coach`).** Send: *\"Add 3 common behavioral questions with short model answers under Round 2 of my prep doc.\"* Confirm `task` to `interview-coach` in update mode; reply is `Updated interview prep doc at: /interview_coach/<r>/<j>.md`. Round 2 grows; the self-introduction at the top and other rounds are unchanged.\n6. **No regression on first-run flow.** In a fresh thread with a fresh CV+JD pair, run all 5 stages end-to-end as in [PRD 08](08_agent_workflow.md)'s verification \u2014 every stage emits exactly its original `Wrote \u2026` reply, every output lands at its original path, no Stage-6 paths are touched.", "13_execute_virtual_path_translation": "**Extends:** [Tailored Resume \u2014 YAML + PDF via rendercv](07_tailored_resume_pdf.md)\n\n# Why\n\n`LocalShellBackend(root_dir=CAREER_AGENT_DIR, virtual_mode=True)` makes the filesystem tools (`read_file`, `write_file`, `edit_file`, `overwrite_file`, `list_files`) speak in **virtual paths** \u2014 `/tailored_resume/foo.yaml` resolves to `<CAREER_AGENT_DIR>/tailored_resume/foo.yaml`. The `execute` tool injected by deepagents' `FilesystemMiddleware` does no such translation: the command string is handed verbatim to `subprocess.run(..., cwd=root_dir, shell=True)`. So `rendercv render /tailored_resume/foo.yaml` is read as a real absolute path on container disk and fails with `FileNotFoundError`.\n\n[PRD 07](07_tailored_resume_pdf.md) papered over this with two crutches: `prepare_render_settings` returning a real on-disk path so the LLM could paste it verbatim into `execute`, plus a long SKILL.md lecture instructing the LLM to switch path conventions. It worked, but the dual convention (virtual paths everywhere except inside `execute`) periodically confused the LLM into pasting the wrong path. The goal here is a single path convention end-to-end and the SKILL.md lecture gone.\n\n# What the user sees\n\nNothing user-visible. Same Workspace outputs (`<jd>.yaml`, `<jd>.pdf`, `<jd>.typ`), same chat-level replies. The only observable change is that the agent's `execute(\"rendercv render \u2026\")` calls now carry virtual paths (`/tailored_resume/<r>/<j>.yaml`) instead of real container paths (`/deps/next-role/backend/app/career_agent/tailored_resume/<r>/<j>.yaml`); the rendered PDF lands at the same place either way.\n\n# How \u2014 the key architectural choice\n\n**Subclass `LocalShellBackend`, rewrite `/`-prefixed tokens in the command before delegating to the parent.** A new `VirtualPathShellBackend` overrides `execute()`: `shlex.split` the command, and for each token starting with `/`, resolve `<root_dir>/<token[1:]>` \u2014 if that path is under `root_dir` *and* either it or its parent already exists, rewrite the token to its on-disk absolute form. Otherwise leave it alone. Then `shlex.join` and call `super().execute(...)`. The middleware's auto-injected `execute` tool stays untouched because it calls `executable.execute(...)` polymorphically; swapping the backend class is the entire wiring change.\n\nWhy this shape rather than the obvious alternatives:\n\n- **Subclass, not monkey-patch.** `agents.py` already monkey-patches deepagents prompt constants at module-load (`_apply_prompt_overrides()`). Patching `FilesystemMiddleware._create_execute_tool` similarly would work, but the side effect is process-global \u2014 any other deep agent in the same process is affected. A backend subclass scopes the change to the one `_backend = CompositeBackend(default=VirtualPathShellBackend(...))` line.\n- **Subclass, not a custom `execute` in `tools=[\u2026]`.** The middleware injects an `execute` tool whose name we'd have to shadow via `ToolNode`'s last-wins dict; the framework offers no flag to disable the auto-injection. Working though that ordering is implicit and the framework gives no guarantee. The backend-level swap is structural.\n- **Existence-checked rewrite, not strip-leading-slash.** `cwd=root_dir` is already set; just dropping the leading slash on every `/`-prefixed token would resolve `/tailored_resume/foo.yaml` correctly but break legitimate `/tmp/x`, `/etc/passwd`, `/usr/bin/python` calls (they'd resolve under `root_dir`). The existence check naturally separates the two: a virtual path's target (or its parent dir) lives under `root_dir`; a real system path does not.\n- **Not a prefix whitelist.** `{ /tailored_resume/, /processed/, /research/, \u2026 }` would be a second source of truth that must stay in sync with the actual layout. Existence is the layout \u2014 no separate registry.\n\n# Files of interest\n\n| Concern | Path |\n|---|---|\n| `VirtualPathShellBackend` subclass (translation + execute override) | `backend/app/career_agent/shell_backend.py` |\n| Backend wiring swap | `backend/app/career_agent/agents.py` (`_backend = CompositeBackend(default=VirtualPathShellBackend(...))`) |\n| `prepare_render_settings` returns verbatim execute command with virtual path | `backend/app/career_agent/tools.py` (`make_prepare_render_settings`, return line) |\n| SKILL.md drops the \"use on-disk path NOT backend path\" lecture (steps 4 + Updates step 5) | `backend/app/career_agent/skills/resume-tailor/resume-tailor/SKILL.md` |\n| Unit tests: translate / passthrough / `..`-escape / quoted args / end-to-end execute | `backend/tests/career_agent/test_shell_backend.py` |\n| Existing prepare_render_settings tests retargeted to the new return string | `backend/tests/career_agent/test_tools.py` |\n\n# Decisions worth remembering\n\n- **Subclass lives in its own module, not inline in `agents.py`.** `agents.py` calls `create_deep_agent(...)` eagerly at module load, which needs OpenAI credentials. Tests that exercise the translator import from `shell_backend.py` directly and never trip that eager construction. Same reason `tools.py` exists separately.\n- **The `settings:` block inside the YAML keeps real on-disk paths.** `prepare_render_settings` injects `output_folder: <abs>` and `typst_path: <abs>` into the YAML; these are read by rendercv as final write destinations, not as shell arguments \u2014 they never pass through the translator. Translating them would break rendercv (it'd treat `/tailored_resume/...` as a literal directory to create).\n- **`shlex.split` / `shlex.join`, not regex.** A regex on `/[\\w/.-]+` would mangle quoted arguments containing slashes (`--config=\"/a/b c\"` \u2192 broken quoting). `shlex` round-trips quoting safely; unbalanced quotes fall through unchanged so the shell surfaces the real error.\n- **Path-traversal (`/../../etc/passwd`) is left untouched, not rewritten.** A `..`-escape resolves outside `root_dir`; `Path.relative_to` raises `ValueError` and the token is returned as-is. The user gets the same behaviour they'd get from `subprocess.run` directly \u2014 no new attack surface, no surprising rewrite.\n- **`prepare_render_settings`'s return is now the verbatim execute command.** `Prepared for rendering. Run: execute(\"rendercv render <yaml_path>\")` \u2014 the LLM copies the literal string, no synthesis. Cheaper than asking the LLM to compose the command from a path. Matches the user's standing \"don't make the LLM regenerate large tool args\" rule (which generalises to \"don't make the LLM compose strings a tool already knows\").\n- **No prompt change for `EXECUTION` (`prompts.py:172\u2013179`).** That prompt doesn't mention path translation either before or after; the SKILL.md was the only authored place that taught the dual convention.\n\n# Deferred (intentional non-goals for v1)\n\n- **Translation inside flag values (`--output=/tailored_resume/foo.pdf`).** `shlex` keeps that as one token; the leading `/` test misses it. Not encountered in the rendercv command shape we ship. If a future command needs it, extend `_rewrite_token` to detect `key=/path` pairs or instruct callers to use space-separated form (`--output /tailored_resume/foo.pdf`).\n- **Translation for `StoreBackend`-routed prefixes (`/memory/`, `/processed/`, etc.).** Those routes go to a `StoreBackend`, which has no shell. The translator only sees commands that hit the default `LocalShellBackend` (which is where `rendercv`, `weasyprint`, etc. live). If a future tool needs to shell against a Store-backed prefix, that prefix would need its own materialisation step first \u2014 not a translator problem.\n- **Sandbox / HITL on `execute`.** [PRD 07](07_tailored_resume_pdf.md) already inherited `LocalShellBackend`'s unrestricted shell; this PRD doesn't change that posture. The deepagents docs flag HITL as the recommended safeguard; left for whenever we expose the agent beyond solo development.\n\n# How to verify end-to-end\n\n1. `cd backend && uv run pytest tests/career_agent/test_shell_backend.py` \u2014 8 cases (existing path rewrite, parent-only rewrite, real-path passthrough, `..`-escape rejection, quoted args, flags, unbalanced quotes, end-to-end `execute` via virtual path). All pass.\n2. `cd backend && uv run pytest tests/career_agent/` \u2014 full career_agent suite (66 pass + 2 skipped). Confirms the two `prepare_render_settings` tests now assert the virtual-path return contract.\n3. `docker compose up -d`, open the frontend, trigger a tailored-resume flow. In the LangGraph trace, the `resume-tailor` subagent now emits `execute(\"rendercv render /tailored_resume/<r>/<j>.yaml\")` (virtual path); the subprocess succeeds; the PDF lands at `<CAREER_AGENT_DIR>/tailored_resume/<r>/<j>.pdf` exactly as before.\n4. Re-render the same YAML a second time \u2014 `prepare_render_settings` is still idempotent; `execute` with the virtual path still resolves correctly. Sanity-check that a hand-edit followed by Stage-6 update mode produces the same path-shape in the trace.", "14_multi_select_file_delete": "# Why\n\nThe Workspace > Files panel lets users delete files one at a time \u2014 hover a card, click the trash icon, confirm the dialog, wait for the refresh. After a run with the [Multi-Turn Updates](12_multi_turn_updates.md) workflow a thread typically accumulates 10+ artifacts (processed CV/JD/intake, research, tailored resume YAML+PDF, interview-prep doc, battlecard JSON+PDF, plus the original uploads), and cleaning house between iterations means N click-confirm cycles. The single-delete path is fine for the one-off; what's missing is a way to fan out a single confirmation across many files.\n\n# What the user sees\n\nA subtle checkbox appears in the top-left corner of each file card on hover, mirroring the existing trash-icon affordance in the top-right. Clicking the checkbox selects the card \u2014 the checkbox stays visible, and the card gets a ring outline. The card body itself still opens the file preview; selection and open are separate click targets.\n\nWhen at least one file is selected, a slim action bar appears above the grid: `N selected` on the left; `Select all`, `Clear`, and a destructive `Delete` on the right. The bar uses the same `bg-muted-secondary` rounded chip styling as the existing section headers \u2014 it's not modal.\n\nKeyboard shortcuts that match Finder / Drive:\n\n- **Shift-click** a second checkbox to range-select between it and the last directly-clicked card (anchor pivots on plain clicks, not on shift-clicks).\n- **Cmd/Ctrl + A** to select all (only while the panel has focus \u2014 engaging selection auto-focuses the wrapper).\n- **Esc** to clear the current selection.\n\nConfirming a bulk delete opens the same Radix `Dialog` used by the single-file path, with the title and body branching on count: `Delete N files?` and a bulleted list of basenames (capped at 5 + `and N more`). Single-delete reads exactly as before. On partial failure the toast reads `Deleted X of N (Y failed)`, and the selection is narrowed to the still-present failed paths so the user can retry; on full success the selection clears.\n\nThe bar's `Delete` button is disabled while the agent is streaming (`editDisabled`), matching the per-card trash icon. The checkboxes themselves stay enabled \u2014 users can stage a selection while the agent thinks and fire it once the run lands.\n\n# How \u2014 the key architectural choices\n\n**Drive-style hover checkboxes, not an explicit \"Select\" mode toggle.** Three patterns were on the table: (a) hover-revealed checkboxes with no mode switch (Drive, Dropbox), (b) an explicit \"Select\" button in the section header that flips the whole panel into bulk mode (iOS Photos), (c) invisible-but-Cmd-click-discoverable selection (Finder power-user). The Drive shape scales from 1\u2192many with zero ceremony \u2014 there is no mode to enter and exit, and the card body click still opens the file in the same gesture model as v0. The Photos shape was rejected because it adds an extra click and a state the user has to remember to leave; the Finder shape was rejected because the affordance is invisible.\n\n**No backend bulk-delete endpoint \u2014 fan out on the frontend with one refresh at the end.** The `DELETE /api/files/delete?path=\u2026` route (LangGraph-managed, see `backend/CLAUDE.md`) takes one path per call. A new `removeFiles(paths)` helper in `useChat.ts` runs `Promise.allSettled` over per-path `deleteAgentFile` calls and `refreshFiles()`s **once** after they all settle. Considered (a) looping the existing `removeFile` from the UI \u2014 rejected because each `removeFile` triggers its own `refreshFiles`, so N deletes mean N refetches; (b) adding a backend bulk endpoint \u2014 rejected because the backend schema is owned by `langchain/langgraph-api:3.13` and adding a custom route would be a bigger commitment than the savings (one HTTP round-trip per file is cheap; the wasted refreshes were the actual cost).\n\n**Custom `role=\"checkbox\"` button, not a new `@radix-ui/react-checkbox` dependency.** The codebase already styles primitives one-off (the existing trash icon is a plain `<button>` with `aria-label`). Pulling Radix Checkbox in would require `pnpm --dir frontend add` + `docker compose restart frontend` per the project conventions, plus a small shadcn-style wrapper file, for a single surface that's effectively a 5\u00d75 button with a `Check` icon. The custom button declares `role=\"checkbox\"` and `aria-checked` so screen readers see it the same way.\n\n**One delete dialog for 1-or-many.** `pendingDelete` widened from `string | null` to `string[] | null`. The single-card trash icon now calls `setPendingDelete([path])`; the bulk-bar Delete calls `setPendingDelete([...selected])`. The dialog title and body branch on `pendingDelete.length`. Considered keeping a separate `pendingBulkDelete` state \u2014 rejected because the two paths share the same loading state, same Cancel semantics, and same `editDisabled` gate; two dialogs would have meant two of every prop.\n\n# Files of interest\n\n| Concern | Path |\n|---|---|\n| `removeFiles(paths)` helper \u2014 `Promise.allSettled` + single `refreshFiles()` | `frontend/src/app/hooks/useChat.ts` (`removeFiles`) |\n| Selection state, action bar, keyboard handlers, unified dialog | `frontend/src/app/components/TasksFilesSidebar.tsx` (`FilesPopover`) |\n| Corner checkbox + ring outline + delete affordance on each card | `frontend/src/app/components/TasksFilesSidebar.tsx` (`FileCard`) |\n| Threads `removeFiles` through props | `frontend/src/app/components/workspace/FilesSection.tsx`, `Workspace.tsx` |\n| Reused per-file delete primitive | `frontend/src/app/lib/uploadFiles.ts` (`deleteAgentFile`) |\n\n# Decisions worth remembering\n\n- **Shift-click extends, plain click toggles, anchor only moves on plain click.** A pure \"selection range from anchor \u2192 current\" without anchor stability means a second shift-click would re-anchor mid-range; users expect successive shift-clicks to pivot from the *first* anchor (Finder behavior). Plain clicks set the anchor; shift-clicks read it but don't move it.\n- **Selection auto-focuses the wrapper once `selected.size > 0`.** The wrapper has `tabIndex={-1}` and an `onKeyDown` for Esc / Cmd+A. Without the auto-focus, the first checkbox click leaves focus on the checkbox button and `keydown` bubbles up correctly \u2014 but if the user clicks the card *body* of a selected file to open it and then dismisses the viewer, focus may be elsewhere. Calling `wrapperRef.current?.focus()` whenever the selection grows from zero keeps the shortcuts live without forcing the user to click into empty grid space.\n- **Partial-failure UX narrows the selection to the failures, doesn't clear.** After a bulk delete with errors, the surviving selection equals the set of paths that didn't delete. The bar still says `N selected` (= remaining failures) and the cards still show their checkmarks. The user can immediately retry just those, see why they failed in the toast, or `Clear` and walk away. Clearing entirely on partial success would lose the \"what's left\" signal.\n- **`useEffect` prunes the selection on `files` change.** When `refreshFiles` returns and the `files` map drops a path (deleted-by-this-action, or deleted out-of-band by the agent), the selection Set could keep a stale entry that would never be reachable to deselect. The effect compares the Set against the new keys and drops anything missing, but only sets state if something actually changed (no-op re-renders are avoided by the `changed` flag).\n- **Sticky action bar inside the scroll wrapper, not anchored to the panel header.** `position: sticky; top: 0` on the bar means it pins to the top of the file grid as the user scrolls a long list, but it lives *inside* `FilesPopover` so it disappears when the Files section is collapsed (`filesOpen=false`) \u2014 no orphan bar on a hidden grid.\n- **Reply / toast wording matches the rest of the app.** Single delete keeps `Deleted <basename>`; bulk full-success says `Deleted N files`; partial says `Deleted X of N (Y failed)` (toast level `warning`). Total failure is a single `error`. The wording mirrors the `Wrote / Updated` distinction from [PRD 12](12_multi_turn_updates.md) \u2014 concrete count + outcome.\n- **Checkbox button stops propagation; the card body click is independent.** `e.stopPropagation()` on the checkbox `onClick` is what keeps a checkbox click from also opening the file preview. Without it, the same click would toggle selection *and* fire the surrounding `onOpen`, which is hostile.\n\n# Deferred (intentional non-goals for v1)\n\n- **Backend bulk-delete endpoint.** N parallel HTTP `DELETE`s with a single refresh is fast enough at the file counts we see (10\u201320 typical, 100s at the high end is hypothetical). If we ever batch-clean thousands, a bulk endpoint becomes worth the LangGraph customization.\n- **Drag-to-select / marquee.** Density is low (cards are ~220px wide, ~10 visible at once); the checkbox + shift-click pair covers the same intent without a new gesture.\n- **Touch / long-press selection.** Workspace is desktop-first; no mobile signal yet.\n- **Undo / trash bin.** The backend `DELETE` is hard \u2014 files are unlinked from disk. The two-step confirmation dialog is the only safety net. If we start seeing \"I deleted the wrong file\" reports, a per-thread snapshot folder (sibling to [PRD 12](12_multi_turn_updates.md)'s deferred snapshot idea) becomes the natural follow-up for both single and bulk delete.\n- **Selection persistence across panel collapse / thread switch.** Collapsing the Files section unmounts `FilesPopover` and drops the selection. Acceptable for a destructive action \u2014 re-selecting after navigating away is a small price for not leaving a loaded \"delete N files\" gun cocked.\n- **`Cmd+Click` / `Ctrl+Click` on the card body to toggle without the checkbox.** Power-user shortcut; not requested, and the always-visible-on-hover checkbox makes it redundant for discovery.\n\n# How to verify end-to-end\n\n1. `docker compose up -d`; grab the frontend host port from `docker ps`. Open Workspace > Files in a thread with \u22653 files.\n2. Hover a card \u2192 corner checkbox appears top-left. Click it \u2192 card shows a ring, checkbox stays visible. The action bar appears above the grid: `1 selected \u00b7 Select all \u00b7 Clear \u00b7 Delete`.\n3. Click a second card's checkbox \u2192 bar reads `2 selected`. Click `Delete`. Dialog title is `Delete 2 files?`; body is a bulleted list of the two basenames. Cancel \u2014 dialog closes, bar still shows `2 selected`, both cards still checked.\n4. Click `Delete` again, confirm. Toast reads `Deleted 2 files`; both cards disappear; the file count in the section header drops by 2; the panel does one refetch, not two.\n5. Click a card body of a *selected* file (before deleting) \u2192 the file viewer opens (the click did not just toggle selection).\n6. Shift-click test: click the first card's checkbox, then shift-click the third. The middle card also gets selected (range from anchor `1` \u2192 `3`).\n7. Cmd/Ctrl + A while the panel has focus \u2192 all cards selected. Press Esc \u2192 all cleared. The bar disappears.\n8. Partial-failure simulation: in DevTools, throttle network or block one `DELETE` call. Confirm a bulk delete of 2 \u2192 toast `Deleted 1 of 2 (1 failed)`, the failed card stays in the grid *and* stays selected; the succeeded card disappears.\n9. With the agent running (send a message and let it stream), the bar's `Delete` button is disabled and the per-card trash icon is disabled, while the checkboxes remain interactive.\n10. Single-card trash icon still works and routes through the same dialog (title now says `Delete file?`, body keeps the original `<filename> will be permanently removed` copy).", "15_configurable_llm_models": "# Why\n\nThe main agent and every declarative subagent were hardcoded \u2014 `_MODEL = \"openai:gpt-5.6-terra\"` in `agents.py` and `model: openai:gpt-5.6-luna` per entry in `subagents.yaml`. Trying a different provider (Anthropic via Bedrock, Google, etc.) meant editing source and rebuilding the backend image. Cheap A/B experiments \u2014 \"does Sonnet 5 produce a better tailored resume than gpt-5.6-terra?\" \u2014 were too expensive to attempt casually, so they didn't happen.\n\n# What the user sees\n\nA new **Models (Optional)** section in the Configuration dialog, divided from the deployment fields by a horizontal rule. Two free-text inputs:\n\n- **Main agent** \u2014 placeholder `openai:gpt-5.6-terra`.\n- **Subagents** \u2014 placeholder `openai:gpt-5.6-luna` (one value applied to all declarative subagents).\n\nAbove them, one shared help line: `Format <provider>:<model> \u2014 e.g. anthropic:claude-sonnet-5. Leave blank to use the default. See all supported providers.` \u2014 the trailing link opens the `init_chat_model` reference docs in a new tab.\n\nBlank field \u2192 the agent's bake-time default still wins. Settings persist in `localStorage` under the existing `deep-agent-config` key. A typo (`not-a-real-provider:foo`) does not crash the run \u2014 the backend logs a warning and falls back to the default.\n\n# How \u2014 the key architectural choices\n\n**`@wrap_model_call` middleware that reads `configurable.{main_agent_model,subagent_model}` and calls `request.override(model=init_chat_model(...))`.** Picked over LangGraph's typed `context_schema=` channel because the JS SDK 1.9.2 (`@langchain/langgraph-sdk`) doesn't expose a top-level `context` parameter on remote `stream.submit` calls \u2014 only `config.configurable`. Going with `context_schema` would have forced the frontend into an undocumented workaround. The middleware reads `RunnableConfig` via `langgraph.config.get_config()` (the `Runtime` injected into middleware deliberately does not include `config` \u2014 only `context`/`store`/etc.).\n\n**Middleware threaded into the main agent AND every declarative subagent, not just the main agent.** This is the gotcha that bit the first cut: deepagents builds each declarative subagent via its own `create_agent(..., middleware=spec.get(\"middleware\", []))` in `deepagents/middleware/subagents.py:650` \u2014 declarative subagents do **not** inherit the parent agent's middleware list. Until the fix, setting Subagents=\u2026 silently no-op'd. The override middleware is instantiated once and passed to both `create_deep_agent(middleware=\u2026)` and `load_subagents(default_middleware=\u2026)`.\n\n**Main vs subagent routing via `metadata.lc_agent_name`.** Deepagents stamps that key onto every subagent runnable (`with_config({\"metadata\": {\"lc_agent_name\": name}})`). Absent in the runtime config \u2192 it's a main-agent call \u2192 use `main_agent_model`. Present \u2192 use `subagent_model`. No separate middleware classes needed.\n\n# Files of interest\n\n| Concern | Path |\n|---|---|\n| Override middleware | `backend/app/career_agent/middleware.py` (`ModelOverrideMiddleware`, `_resolve_model`) |\n| Wiring main + subagent share | `backend/app/career_agent/agents.py` (`_model_override_middleware`, lines ~125\u2013150) |\n| Subagent middleware threading | `backend/app/career_agent/utils.py` (`load_subagents` `default_middleware=` param) |\n| Settings UI section | `frontend/src/app/components/ConfigDialog.tsx` (`ModelsSectionHelp`, the **Models** block) |\n| Persisted config shape | `frontend/src/lib/config.ts` (`mainAgentModel`, `subagentModel` on `StandaloneConfig`) |\n| Per-submit config builder | `frontend/src/app/hooks/useChat.ts` (`buildSubmitConfig`, used by all five `stream.submit` sites) |\n\n# Decisions worth remembering\n\n- **`configurable` channel, not `context_schema`.** The LangGraph v1 docs recommend `context_schema=` for new code, but the JS SDK 1.9.2 doesn't carry a top-level `context` arg on `runs.stream` / `useStream().submit`. We use `config.configurable` \u2014 still the supported legacy path \u2014 and read it via `get_config()` inside middleware. Revisit once the JS SDK exposes `context` first-class.\n- **Middleware on the main agent isn't inherited by declarative subagents.** Documented in this PRD because nothing in the deepagents docs warns about it, and the failure mode is silent (override accepted by the SDK, ignored by the subagent's own `create_agent`). The `default_middleware=` param on `load_subagents` mirrors the existing `default_tools=` shape so a future contributor sees the pattern.\n- **One Subagents slot, not one per declarative subagent.** Considered exposing hiring-recon / resume-tailor / interview-coach individually. Rejected \u2014 the real workflow split is \"main orchestrator (smart) vs grunts (cheap)\", not per-subagent tuning. The middleware can branch on `lc_agent_name` later if needed.\n- **Module-level `init_chat_model` cache, keyed by the override string.** A single run issues dozens of model calls; rebuilding the client each time would burn env-var reads and network plumbing. Cache lives for the worker's lifetime.\n- **Free-text input + provider docs link, not a dropdown.** `init_chat_model`'s real provider list lives in `langchain.chat_models.base` and the docs deliberately don't mirror it exhaustively (it drifts). A hardcoded UI allowlist would lie within a release.\n- **\"Models\" as a grouped section, not two inline rows.** First draft put each model input as a peer of the LangSmith API Key field with its own duplicated help line + link. Visually noisy and DRY-violating. Final: divider + section heading + one shared help line, then the two inputs with short labels.\n- **Soft failure on bad strings.** `_resolve_model` returns `None` on any `init_chat_model` exception; the middleware passes the request through unchanged. A typo in Settings logs a warning and falls back \u2014 it does not brick the run.\n\n# Deferred (intentional non-goals for v1)\n\n- **Per-subagent model overrides.** Two slots cover the dominant use case; the middleware is ready to branch by `lc_agent_name` when someone needs it.\n- **Migrating to `context_schema=`.** Will happen when `@langchain/langgraph-sdk` documents `context` on the remote SDK call surface.\n- **Provider-credential UI.** Users still need `ANTHROPIC_API_KEY` / `GOOGLE_API_KEY` / AWS creds in the backend `.env`. Exposing credential entry in the Settings dialog is both a security and a UX rabbit hole.\n- **Cross-device sync.** Stored in `localStorage` like every other field on this dialog; not worth a backend persistence API for a personal tool.\n- **Client-side validation of the `provider:model` string.** Backend handles bad strings gracefully; a regex would just drift from `init_chat_model`'s actual grammar.\n\n# How to verify end-to-end\n\n1. `docker compose up -d`; grab the frontend host port from `docker ps`.\n2. Open the Settings dialog. Leave both Model fields blank, send a message, confirm normal completion. LangSmith trace (or container logs) shows the bake-time defaults on every model call.\n3. Set **Main agent** to `bedrock_converse:global.anthropic.claude-sonnet-5`, save, start a fresh thread, send a message. Trace: main agent runs Anthropic; any subagent it spawns (e.g. `hiring-recon`) still runs `openai:gpt-5.6-luna`.\n4. Set **Subagents** to a different model (e.g. `bedrock_converse:global.anthropic.claude-haiku-4-5-20251001-v1:0`), trigger a subagent. Subagent now runs Haiku; main agent still on Sonnet.\n5. Set **Main agent** to `not-a-real-provider:foo`, send a message. Run completes (fallback to default); `docker compose logs backend | grep ModelOverrideMiddleware` shows the warning.\n6. Refresh the browser, reopen Settings \u2014 both fields still populated from `localStorage`.\n7. Backend unit tests: `cd backend && uv run pytest tests/career_agent/test_middleware_model_override.py tests/career_agent/test_utils.py` \u2014 16 pass.", "16_disable_subagent_streaming": "> **Superseded by [18_langchain_react_migration](18_langchain_react_migration.md)** \u2014\n> default flipped to `False` (subagents stream again) after the frontend migrated to\n> `@langchain/react`'s v2 stream runtime, whose fragment-array accumulation + per-tick batched\n> flushes remove the O(n\u00b2) concat this PRD worked around. The toggle machinery is kept\n> verbatim as the rollback lever (`DISABLE_SUBAGENT_STREAMING = True` or per-run\n> `configurable.disable_subagent_streaming`).\n\n**Extends:** [05_chat_streaming_throttle](05_chat_streaming_throttle.md)\n\n# Why\n\nThe chat UI hangs when **two or more subagents run in parallel and each streams a large\ntool-call argument** \u2014 the canonical case is `resume-tailor` + `interview-coach` both writing\na full file body into `overwrite_file`'s `new_content`. [PRD 05](05_chat_streaming_throttle.md) added an 80 ms render throttle\nthat fixed the *rendering* rate, and explicitly deferred a \"content-skip placeholder\" as the\nnext lever. But the hang came back as payloads grew, and the deferred lever turned out to be\nthe wrong one.\n\nTracing it end-to-end, the cost is **inside the LangGraph SDK, upstream of the throttle**:\n`useStream` (LangGraph Platform path) feeds every streamed token into\n`MessageTupleManager.add()`, which does `prev.concat(chunk)` per token\n(`@langchain/langgraph-sdk/dist/ui/messages.js:85`). For an `AIMessageChunk` carrying\n`tool_call_chunks`, `concat` re-copies the entire growing args string every token \u2192 **O(n\u00b2)**\nper file, \u00d7N parallel subagents. No frontend render change can fix work that happens before\nrendering. So the fix moved to the backend: stop subagents from streaming tokens at all.\n\n# What the user sees\n\nDuring the parallel-subagent phase the chat surface stays responsive \u2014 no freeze, clicks land.\nThe trade-off, accepted deliberately: **subagent output no longer streams token-by-token.** A\nsubagent's text and tool calls now appear *per LLM step* (each step's message arrives whole)\ninstead of letter-by-letter. The **main agent is unchanged** \u2014 its narration and its own tool\ncalls still stream live. In practice subagents mostly emit tool calls with little prose, so the\nper-step cadence reads as \"stepped,\" not broken.\n\n# How \u2014 the key architectural choices\n\n- **Disable streaming on the subagent *model*, not in the frontend.** `disable_streaming`\n  makes the model defer `astream` \u2192 `ainvoke`, so LangGraph emits one complete `messages` event\n  per step (message events fire even under `invoke`) \u2014 the per-token `concat` never runs. This\n  is the documented LangChain pattern for \"control which agents stream their output,\" and it is\n  decoupled from SDK internals, so it survives SDK upgrades. The rejected frontend paths (below)\n  were both coupled to the just-rewritten SDK.\n- **Fold it into the existing `ModelOverrideMiddleware`, no new middleware.** That class is\n  already the single shared instance att
