ached to *both* the main agent and every subagent\n  (`agents.py:147,150`), and it already branches main-vs-subagent on `metadata.lc_agent_name`.\n  The subagent branch is the exact, proven insertion point \u2014 adding a separate middleware would\n  reintroduce an ordering dependency (it must see the model *after* any `subagent_model`\n  override is applied).\n- **Set the flag via `model_copy`, not `.bind()` and not mutation.** `_streaming_disabled`\n  reads `self.disable_streaming` off the model attribute, so `.bind(disable_streaming=\u2026)`\n  (which only adds call-kwargs) would silently do nothing. `model_copy` returns a fresh instance\n  so the shared/cached model keeps streaming for the main agent \u2014 critical because the main\n  agent and `resume-tailor` share `openai:gpt-5.6-terra` and the same `_MODEL_CACHE` entry.\n- **Ship it behind a default-on toggle, not hardcoded.** The behavior is gated by\n  `DISABLE_SUBAGENT_STREAMING` (module default `True`) with an optional per-run\n  `configurable.disable_subagent_streaming` override \u2014 mirroring how `_MODEL` (bake default)\n  pairs with `configurable.subagent_model`. This is a deliberately reversible workaround: once\n  the SDK/FE is permanently fixed, flip the default to `False` (or set the configurable key per\n  run / via assistant config) to restore live subagent streaming without touching the override\n  logic. No new settings module or env var was introduced \u2014 the backend has none, and this\n  middleware already reads `configurable`, so the toggle lives where its siblings do.\n\n# Files of interest\n\n| Concern | Path |\n|---|---|\n| The reversible toggle (default `True`) | `backend/app/career_agent/middleware.py` (`DISABLE_SUBAGENT_STREAMING`) |\n| Disable-streaming for subagents; main-vs-subagent branch | `backend/app/career_agent/middleware.py` (`_maybe_override`) |\n| The `model_copy(disable_streaming=True)` helper | `backend/app/career_agent/middleware.py` (`_without_streaming`) |\n| Reads `is_subagent` + override + streaming flag from config | `backend/app/career_agent/middleware.py` (`_read_config`) |\n| Middleware wired onto main agent + every subagent | `backend/app/career_agent/agents.py:129,147,150` |\n| Unit tests (override + streaming, copy-not-mutation) | `backend/tests/career_agent/test_middleware_model_override.py` |\n| Root-cause O(n\u00b2) concat (SDK, for reference) | `node_modules/@langchain/langgraph-sdk/dist/ui/messages.js:85` |\n\n# Decisions worth remembering\n\n- **The hang is an SDK bug, upstream of the [PRD 05](05_chat_streaming_throttle.md) throttle.** This is the non-obvious fact the\n  code can't show: the throttle (and any render-side placeholder) gate work that happens *after*\n  the SDK's per-token `concat`. We confirmed `useStream` (LGP path, `react/stream.lgp.js`) routes\n  through `MessageTupleManager`, so the O(n\u00b2) is on the hot path. Don't re-attempt a frontend\n  render fix for this class of hang.\n- **`disable_streaming=True` over `\"tool_calling\"`.** Operationally identical here \u2014 deepagents'\n  react loop always binds tools, so every subagent call would bypass streaming under either \u2014 so\n  we picked the simpler, unambiguous value. The flag was applied to subagents only; the main\n  agent's branch never touches it.\n- **We considered preserving subagent text and rejected it once the true cost was clear.** The\n  decision moved BE \u2192 \"preserve text\" (FE) \u2192 BE: an early lean toward keeping subagent text\n  streaming was abandoned after finding the only ways to do it were (a) `pnpm patch` the SDK's\n  `concat` to O(n), or (b) a custom-fetch SSE rewriter dropping subagent tool-arg deltas \u2014 both\n  fragile against the SDK's recent (1.9.x) streaming rewrite, with no clean custom-`fetch` hook.\n  The per-step cadence was accepted as the cheaper, durable trade.\n- **Graceful fallback in `_without_streaming`.** Mirrors `_resolve_model`'s ethos: if `model_copy`\n  ever raises (e.g. an unexpected configurable-wrapper model), log and return the model unchanged\n  rather than crash a live run over a streaming tweak.\n\n# Deferred (intentional non-goals for v1)\n\n- **Preserving live subagent token streaming.** The `DISABLE_SUBAGENT_STREAMING` toggle\n  re-enables it instantly, but the hang returns until the underlying O(n\u00b2) is fixed \u2014 either the\n  SDK `concat` patch (accumulate fragments, join lazily \u2192 O(n)) or an upstream fix. Flipping the\n  toggle back on is the *point* of the toggle: do it once the FE/SDK fix lands. Also revisit if a\n  single **main-agent** large tool-arg write starts hanging \u2014 the main agent still streams, so it\n  still pays the SDK O(n\u00b2) for one stream (mitigated today by the [PRD 05](05_chat_streaming_throttle.md) throttle).\n- **A frontend Settings switch for the toggle.** `configurable.disable_subagent_streaming` is\n  already honored, so wiring a UI control is just adding it to `buildSubmitConfig` in\n  `useChat.ts` next to the model selectors ([PRD 15](15_configurable_llm_models.md)). Not built \u2014 it's an operator/dev knob today,\n  not an end-user one.\n- **Upstream fix.** The O(n\u00b2) `concat` is a LangGraph SDK bug worth reporting to\n  `langchain-ai/langgraph`; a merged fix would let us drop this middleware branch entirely.\n\n# How to verify end-to-end\n\n1. `cd backend && uv run pytest tests/career_agent/test_middleware_model_override.py` \u2014 green\n   (covers subagent-default, subagent-override, main-agent-untouched, copy-not-mutation).\n2. `pre-commit run --files backend/app/career_agent/middleware.py backend/tests/career_agent/test_middleware_model_override.py` \u2014 ruff + `ty` pass.\n3. `docker compose up -d`, grab the frontend port from `docker ps`. Backend hot-reloads \u2014 confirm\n   the `career_agent` graph re-imports cleanly in `docker logs next-role-backend-1`.\n4. Run a flow to the parallel `resume-tailor` + `interview-coach` phase (both write large files).\n   The chat surface stays responsive; subagent text/tool calls appear **per step** (whole), and\n   the **main agent still streams token-by-token** (its narration + the battlecard write).", "17_preference_memory": "# Why\n\nThe career agent is configured by files \u2014 `CAREER_AGENT.md` (procedure + brand voice) is always loaded as\nmemory ([PRD 08](08_agent_workflow.md)). But that memory is *repo-owned* and identical for everyone; there was no per-user\n**personalization**. A user who wanted salary ranges in research, AI skills emphasized in the resume,\npredicted Q&A in interview prep, or a terse battlecard had to re-state it on every prep run. We wanted\nClaude-Code-style auto memory: notice a durable preference once, persist it, and apply it on every\nfuture run \u2014 as a low-latency *add-on*, not a feature that taxes every turn. Only the main agent owns\nmemory; subagents stay stateless and receive the relevant preferences in their task input.\n\n# What the user sees\n\nNo new UI \u2014 it's behavioral. When the user states a standing preference (\"from now on keep my\nbattlecards concise\", \"always include the company's salary range\", or an explicit \"remember\u2026\"), the\nagent saves it, gives a one-line ack (\"Noted \u2014 I'll keep battlecards concise from now on.\"), and then\nhonors it automatically on this run and every future one (research / tailored resume / interview prep /\nbattlecard). Preferences **persist across conversations** \u2014 a brand-new chat already knows them. They\nlive in a human-readable, user-editable file at `/memory/preferences.md` (visible in Workspace > Files),\ngrouped by stage heading.\n\nDeliberately *not* saved: one-off this-run-only instructions (\"for THIS resume, drop the Twitter link\"),\nanything derivable from the CV/JD, and pair-specific notes (those stay in `/processed/` and the intake\nfile). And deliberately *not built*: a per-fact memory store, a new tool/button, or an `ls`/`grep`\ndiscovery flow \u2014 see below.\n\n# How \u2014 the key architectural choices\n\n- **One always-loaded file, not per-file + index.** The original plan mirrored Claude Code: a file per\n  preference (`/memory/<slug>.md`) plus an always-loaded `MEMORY.md` index. Live testing killed it \u2014\n  gpt-5.6-terra would not maintain that shape by prompting alone: it wrote the preference into `CAREER_AGENT.md`,\n  wrote nothing (just acknowledged), or \u2014 once the index was seeded \u2014 collapsed everything into the\n  single index file and skipped the per-slug file. The model strongly gravitates to *one* file. So\n  preferences live in a single `/memory/preferences.md`, sectioned by stage. Retrieval and application\n  cost **0 tool calls** (it's in the system prompt every session); saving is **one `edit_file`**.\n- **Loaded as a memory source, not discovered at runtime.** `memory=[\"CAREER_AGENT.md\", \"/memory/preferences.md\"]`\n  injects the file into the system prompt. The drafted alternative \u2014 `ls` \u2192 `grep` description \u2192 `read`\n  on every turn \u2014 costs ~3 round-trips *each time* the agent wants preferences. deepagents loads memory\n  sources once per thread, so always-loading is free per turn and is how Claude Code's own index works.\n- **Seed the file from a `before_agent` hook, never the LLM.** The agent reliably *edits* an existing\n  preferences file but cannot reliably *create* one on a clean slate (it fumbles toward `CAREER_AGENT.md` or\n  starts the intake workflow). `EnsurePreferencesFileMiddleware` writes the scaffold in\n  `before_agent`/`abefore_agent` \u2014 a single cheap store write (no model round-trip \u2192 no added latency),\n  idempotent because the backend's `write` refuses to overwrite an existing file. This is what makes\n  saving reliable: the model only ever has to edit.\n- **Apply by folding preferences into subagent task descriptions.** Subagents have no memory; the main\n  agent copies the relevant preference lines into each subagent's task input (which subagents already\n  treat as user instructions, per [PRD 06](06_subagents_with_skills.md)). The battlecard, which the main agent builds itself, applies\n  them directly. `CAREER_AGENT.md` Stage 3/4/6 templates carry a `User preferences:` reminder at each\n  delegation point.\n\n# Files of interest\n\n| Concern | Path |\n|---|---|\n| The memory contract \u2014 what to remember, when to save, how to apply | `backend/app/career_agent/prompts.py` (`MEMORY`, block 7) |\n| Preferences file wired as a 2nd always-loaded memory source | `backend/app/career_agent/agents.py` (`create_deep_agent(memory=\u2026)`) |\n| Monkey-patch that makes deepagents use our `MEMORY` prompt | `backend/app/career_agent/agents.py` (`_apply_prompt_overrides`) |\n| Seeds the `/memory/preferences.md` scaffold before the model runs | `backend/app/career_agent/middleware.py` (`EnsurePreferencesFileMiddleware`, `PREFERENCES_PATH`, `_PREFERENCES_SCAFFOLD`) |\n| `User preferences:` reminders at the delegation points | `backend/agents/career_agent/CAREER_AGENT.md` (Stage 3 / Stage 4 / Stage 6) |\n| Guards: `MEMORY.format()`, override reaches middleware, seeder | `backend/tests/career_agent/test_prompts.py`, `test_middleware.py` |\n\n# Decisions worth remembering\n\n- **Single-file won because the model wouldn't cooperate with per-file, not because it's simpler.** The\n  user explicitly chose per-file first (granularity/auditability); we switched only after four live\n  attempts proved gpt-5.6-terra won't bootstrap or maintain it by prompt. If per-file is ever wanted, the\n  reliable path is a `save_preference(slug, description, body)` helper tool that writes the file and the\n  index in one Python step \u2014 moving the fragile two-write dance out of the LLM.\n- **Saving had to be made imperative *and* exempt from \"don't write files yet.\"** A soft \"save\n  preferences\" prompt produced only a prose ack. The fix: \"when a trigger fires you MUST record it in\n  `/memory/preferences.md` in the SAME turn \u2014 replying in prose is a failure,\" plus an explicit override\n  of the Stage-1 intake rule (that rule is about CV/JD artifacts; a preference needs no CV/JD), plus a\n  blunt \"never write preferences into CAREER_AGENT.md\" because the agent's first instinct was to append there.\n- **deepagents 0.6.3+ freezes the memory prompt into a kwdefault \u2014 the patch must reach it.**\n  `setattr(_mem_mw, \"MEMORY_SYSTEM_PROMPT\", \u2026)` worked on 0.6.1 (read as a bare module global) but\n  silently no-op'd on 0.6.3+, which captures the prompt into `MemoryMiddleware.__init__.__kwdefaults__[\"system_prompt\"]`\n  (same trap as Todo/SubAgent middleware). A container-vs-lock version skew (image shipped 0.6.3 while\n  `uv.lock` pinned 0.6.1) hid it in local tests. `_apply_prompt_overrides` now patches the kwdefault too,\n  guarded so it's a no-op on versions without the param. `test_memory_prompt_override_reaches_the_middleware`\n  guards both paths. (Skew later resolved by aligning everything to 0.6.8.)\n- **Memory is a once-per-thread snapshot, on purpose.** `MemoryMiddleware.before_agent` loads sources\n  once and caches them in `memory_contents` state; `modify_request` re-injects that cache every call but\n  never re-reads. So a mid-thread save is *not* reflected in that thread's system prompt \u2014 the agent\n  already has it in conversation context \u2014 and a new thread reloads it fresh. This stability is what keeps\n  the system-prompt prefix cacheable (`add_cache_control=True`); a per-turn reload would bust the cache.\n- **No delete primitive is needed.** deepagents exposes no delete tool/method; with single-file,\n  \"remove a preference\" is just editing out its bullet \u2014 which sidesteps the orphaned-tombstone problem\n  a per-file design would have hit.\n\n# Deferred (intentional non-goals for v1)\n\n- **Per-user namespacing.** The memory namespace is the constant `(\"career_agent\",\"memory\")` \u2192 a single\n  global store. Correct for a solo-user product (preferences persist across every thread). Multi-tenant\n  use would derive the namespace from a user id (the `StoreBackend` namespace factory already receives\n  runtime/config).\n- **Per-fact / index granularity.** Rejected for v1; revisit only if preferences grow large or numerous\n  enough that one always-loaded file becomes a real token cost \u2014 then load an index and read bodies on\n  demand, paired with a `save_preference` helper tool to keep the writes reliable.\n- **End-to-end apply verification.** The save \u2192 cross-thread recall loop is verified; folding prefs into a\n  full multi-subagent prep run was not exercised (a costly real run). Recall confirms prefs reach the\n  orchestrator's context, and the CAREER_AGENT.md templates wire the hand-off.\n- **A `delete_file` tool.** Unnecessary while single-file. Worth adding only alongside a per-file design.\n\n# How to verify end-to-end\n\n1. `cd backend && uv run pytest tests/career_agent/test_prompts.py tests/career_agent/test_middleware.py` \u2014 green.\n2. `pre-commit run --files backend/agents/career_agent/{agents,prompts,middleware}.py backend/agents/career_agent/CAREER_AGENT.md` \u2014 ruff + `ty` pass.\n3. `docker compose up -d`; grab the LangGraph host port from `docker ps`. Backend hot-reloads \u2014 confirm `graph_id=career_agent` re-imports cleanly in `docker logs next-role-backend-1`.\n4. From a clean store, send any message (\"hi\") \u2192 `EnsurePreferencesFileMiddleware` creates `/memory/preferences.md` (check Workspace > Files, or the `next-role-postgres` store under namespace `career_agent/memory`).\n5. State a standing preference (\"from now on keep my battlecards very concise\") \u2192 the agent makes **one** `edit_file` under the matching section, leaves `CAREER_AGENT.md` untouched, and acks in one line.\n6. Open a **new thread** \u2192 ask what it already knows about your preferences \u2192 it recalls them with **0 tool calls** (they're in the loaded `<agent_memory>` block).\n7. (Patch sanity) `docker exec next-role-backend-1 python -c \"import deepagents.middleware.memory as m; from backend.app.career_agent import agents; print('It contains two things' in (m.MemoryMiddleware.__init__.__kwdefaults__ or {}).get('system_prompt',''))\"` \u2192 `True` (the effective prompt is ours, not the deepagents default).", "18_langchain_react_migration": "**Supersedes:** [16_disable_subagent_streaming](16_disable_subagent_streaming.md), partially [05_chat_streaming_throttle](05_chat_streaming_throttle.md)\n\n# Why\n\n[PRD 16](16_disable_subagent_streaming.md) disabled subagent token streaming because the legacy `@langchain/langgraph-sdk/react`\n`useStream` re-ran an O(n\u00b2) per-token `concat` (`MessageTupleManager.add` \u2192\n`AIMessageChunk.concat`), freezing the browser whenever `resume-tailor` + `interview-coach`\nstreamed large tool-call args in parallel. That PRD's stated endgame was \"flip the toggle back\nonce the FE/SDK is fixed for good.\" LangChain shipped that fix as a new package:\n`@langchain/react`, a v2-native stream runtime that accumulates content-block fragments in\narrays (rope-concat per block) and batches store flushes per macrotask \u2014 the O(n\u00b2) is\nstructurally gone, verified by reading the installed dist before migrating. Two goals, in order:\nmigrate the frontend onto the new runtime, then re-enable subagent streaming and prove in a real\nbrowser that the freeze is dead.\n\n# What the user sees\n\nSubagent output streams live again: nested tool boxes inside a subagent card appear while the\nLLM is still emitting their args, and the args grow incrementally instead of landing whole per\nstep. The chat surface stays responsive through the parallel phase \u2014 measured zero long tasks\n(worst 79 ms all-session), 8 ms worst input delay. Everything else is behavior parity: optimistic\nmessage echo, subagent cards with Running/Complete badges, files sidebar, thread switching,\nhard-reload hydration. One server-side caveat: main-agent *prose* now arrives per content block\nrather than per token (see Decisions) \u2014 tool args, the payload that caused the freeze, stream\nfine.\n\n# How \u2014 the key architectural choices\n\n- **Migrate to the v2 runtime instead of patching the legacy SDK.** [PRD 16](16_disable_subagent_streaming.md) had already rejected\n  `pnpm patch` of the O(n\u00b2) `concat` as fragile. `@langchain/react` is the upstream fix: a\n  different protocol (`POST /threads/{id}/stream/events`, channels `values`/`messages`/`tools`/\n  `lifecycle`), supported by our `langchain/langgraph-api:3.13` image (0.9.0 \u2014 confirmed live via\n  `openapi.json` before committing to the plan). Messages become `@langchain/core` `BaseMessage`\n  instances; interrupts resume via `respond()`; hydration and reattach-to-in-flight-runs are\n  automatic, so `reconnectOnMount`/`fetchStateHistory`/`onFinish`/`filterSubagentMessages` all\n  disappear rather than being ported.\n- **Subagent UI = discovery map + scoped selector hooks, with live args derived from\n  `tool_call_chunks`.** `stream.subagents` is keyed by the spawning `task` tool-call id, which\n  replaces `getSubagentsByMessage`. Each `SubagentCard` mounts `useToolCalls(stream, snapshot)` +\n  `useMessages(stream, snapshot)` (mount = ref-counted subscribe). The dual subscription is\n  load-bearing: the `tools` channel only emits `tool-started/finished/error` \u2014 **no arg deltas**\n  \u2014 so a call whose args are still streaming exists only as `tool_call_chunks` on the subagent's\n  messages channel. Chunk-derived entries (partial-JSON args via `parsePartialJson`) render until\n  the tools channel takes over at `tool-started`.\n- **Flip the backend default; keep the toggle as a rollback lever.** `DISABLE_SUBAGENT_STREAMING\n  = False` in `middleware.py` \u2014 no logic changes, comments rewritten as rollback docs. Rollback is\n  one hot-reloaded line (effective on the next subagent model call) or per-run\n  `configurable.disable_subagent_streaming: true`; the FE renders both cadences transparently.\n- **Delete dead surface instead of migrating it** (user-confirmed). `runSingleStep`,\n  `continueStream`, `markCurrentThreadAsResolved`, `getMessagesMetadata` had zero UI consumers\n  and depended on removed submit options (`interruptBefore/After`, `command`); the GenUI\n  `LoadExternalComponent` path was unreachable (backend never emits `values.ui`). Rebuilding any\n  of these later means raw `client.runs.*` / `useMessageMetadata`, not the old options.\n\n# Files of interest\n\n| Concern | Path |\n|---|---|\n| Hub rewrite: v2 `useStream`, `respond()`, throttle deletion, assistantId-hydrate guard | `frontend/src/app/hooks/useChat.ts` |\n| Per-subagent card: scoped hooks + chunk-derived pending tool calls | `frontend/src/app/components/SubagentCard.tsx` |\n| Task-call \u2192 snapshot association, pending-discovery fallback indicator | `frontend/src/app/components/ChatMessage.tsx` |\n| `BaseMessage` extraction (`tool_calls` + `tool_call_chunks`), GenUI/hot-scroll removal | `frontend/src/app/components/ChatInterface.tsx` |\n| `.text` accessor, `parsePartialArgs`/`toResultString` helpers | `frontend/src/app/utils/utils.ts` |\n| Sources from scoped tool calls (`SubagentSourcesProbe` consumer) | `frontend/src/app/utils/sources.ts` (`extractSourcesFromToolCalls`) |\n| Per-subagent sources probes replacing legacy `sub.messages` merge | `frontend/src/app/components/Workspace.tsx` |\n| `stream_mode` body-rewrite workaround removal (0.8.1-era, dead on the new protocol) | `frontend/src/providers/ClientProvider.tsx` |\n| Toggle flip + rollback-lever comments | `backend/app/career_agent/middleware.py` (`DISABLE_SUBAGENT_STREAMING`) |\n| Default/rollback test matrix | `backend/tests/career_agent/test_middleware_model_override.py` |\n\n# Decisions worth remembering\n\n- **Pin the direct `@langchain/langgraph-sdk` to the exact version `@langchain/react` bundles**\n  (1.9.20, plus `@langchain/core` `^1.1.48` per peers). Installing `@langchain/react` alone left\n  two SDK copies in node_modules; a `Client` constructed from one copy crossing into the other's\n  `StreamController` breaks instance identity. Keep them locked together on every future bump\n  (noted in `frontend/CLAUDE.md`).\n- **Hold `threadId` back until the assistant resolves.** Found in browser testing: on reload the\n  controller hydrated the URL's thread with `assistantId: \"\"` (assistant still fetching) and threw\n  `ThreadStream requires an assistantId option` \u2014 the legacy hook tolerated the empty string. Fix\n  in `useChat.ts`: `threadId: activeAssistant ? (threadId ?? null) : null`; the assistantId change\n  recreates the controller, which hydrates on `activate()`.\n- **langgraph-api 0.9.0 emits no `text` deltas on the v2 bridge.** Wire replay of\n  `/stream/events` showed all `content-block-delta`s carry tool-call `args` fields (550\u20131189 per\n  run); narration text arrives whole per block. Per-block prose cadence is server behavior \u2014 don't\n  chase it in the FE; re-check on langgraph-api upgrades and consider an upstream report.\n- **[PRD 05](05_chat_streaming_throttle.md) is only *partially* superseded.** The 80 ms throttle existed to slow the legacy SDK's\n  per-token churn; the v2 runtime batches flushes itself, so the throttle died. But the same\n  commit's hardening stays: `ToolCall` identity caches (a store flush still fires several times\n  per second mid-stream \u2014 without the caches every completed message re-renders per flush),\n  pending-state `JSON.stringify` guards, and `pointerdown` click hardening (Safari swallows\n  `click` under load regardless of SDK).\n- **Two-gate verification, baseline first.** Gate A ran the full SAP-JD pipeline on the migrated\n  FE with streaming still disabled \u2014 isolating migration regressions from streaming behavior and\n  producing a metrics baseline (2 long tasks, worst 88 ms). Only then was the toggle flipped for\n  Gate B's freeze test (zero long tasks during the parallel phase; streaming proven at wire +\n  UI levels). Debugging a freeze and a migration bug simultaneously would have been far slower.\n- **`defaultHeaders` on the hook was dead code.** Both legacy and v2 hooks ignore it whenever a\n  `client` is passed (headers live on the `Client`); the `x-auth-scheme` header was never sent.\n  Dropped rather than ported.\n\n# Deferred (intentional non-goals for v1)\n\n- **Per-token main-agent prose.** Blocked on the server bridge emitting text deltas (see\n  Decisions); nothing to do in the FE today.\n- **Step-mode / GenUI rebuild.** Deleted as dead code; if either returns, build on\n  `client.runs.*` (interrupt_before) / `useMessageMetadata` / the v2 `Client` re-exports \u2014 the\n  removed implementations targeted APIs that no longer exist.\n- **Frontend Settings switch for the rollback toggle.** Carried over from [PRD 16](16_disable_subagent_streaming.md):\n  `configurable.disable_subagent_streaming` is honored per-run; wiring it into `buildSubmitConfig`\n  is trivial if it ever needs to be user-facing. Operator knob today.\n\n# How to verify end-to-end\n\n1. `cd backend && uv run pytest tests/career_agent/test_middleware_model_override.py` \u2014 13 green\n   (default pass-through + module/per-run rollback paths).\n2. `docker compose up -d`; both containers hot-reload. Open the frontend port from `docker ps`.\n3. Run a flow to the parallel `resume-tailor` + `interview-coach` phase (CV upload + JD URL +\n   timeline). During the phase: both cards show **Running** with nested tool boxes whose args grow\n   live; clicks land; no freeze. Optionally inject a `PerformanceObserver({type:'longtask'})`\n   before submitting \u2014 expect no entry > 1 s during the phase.\n4. Wire check (replace `<tid>`): `curl -N -X POST http://localhost:<port>/threads/<tid>/stream/events\n   -H 'Content-Type: application/json' -d '{\"channels\":[\"messages\"],\"namespaces\":[],\"since\":0}'`\n   \u2014 subagent namespaces carry `content-block-delta` events with incremental `args` fields.\n5. Hard-reload mid-thread: messages, tool boxes, and subagent cards rehydrate; no\n   `ThreadStream requires an assistantId` overlay error.\n6. Rollback drill: set `DISABLE_SUBAGENT_STREAMING = True` (hot-reloads), rerun a subagent \u2014\n   nested output arrives per step, whole; flip back.", "19_bulk_delete_dialog_full_paths": "**Extends:** [Multi-Select Delete for Workspace Files](14_multi_select_file_delete.md)\n\n# Why\n\n[PRD 14](14_multi_select_file_delete.md) specified the bulk-delete confirmation dialog as \"a bulleted list of basenames\". That spec hid a collision: the agent routinely writes same-named artifacts into different directories \u2014 a battlecard run and a tailored-resume run both emit `<jd-slug>.pdf` under their own folders. Selecting both for deletion rendered two `<li>` rows keyed by the same basename string, and React flagged it (`Encountered two children with the same key\u2026`), surfacing as a `1 Issue` dev-overlay badge ([#13](https://github.com/tam159/next-role/issues/13)). Beyond the warning, non-unique keys let React duplicate or omit rows \u2014 and the user saw two identical lines in a permanent-deletion preview with no way to tell which file was which.\n\n# What the user sees\n\nThe `Delete N files?` dialog now lists each selected file by its **full virtual path** (`/tailored_resume/<slug>/<jd-slug>.pdf`), one row per file, in a dialog widened to `sm:max-w-2xl` for the multi-file case. Paths wrap at hyphen boundaries (`break-words`), and the taller list (`max-h-72`) fits all five preview rows without scrolling. The 5-row cap with `and N more` is unchanged. The single-file dialog (`Delete file?`) keeps the compact width and still shows just the basename, exactly as before.\n\n# How \u2014 the key architectural choice\n\n**Render full paths for every row, keyed by path \u2014 not collision-only disambiguation.** Three shapes were considered: (a) key rows by path but keep displaying basenames \u2014 fixes the React error yet still shows two identical lines for a destructive action; (b) key by path and show a dimmed directory prefix only on colliding basenames \u2014 cleanest list, but needs a collision-counting pass and gives the same list two visual modes; (c) always show full paths. (c) was chosen (explicit user call): in a permanent-deletion preview, ambiguity is worse than noise, the full path is what the file cards' tooltips already show, and the implementation *removes* code (the basename-mapping `pendingNames` memo) instead of adding a counting pass.\n\n# Files of interest\n\n| Concern | Path |\n|---|---|\n| Dialog rows keyed + rendered by full path; `pendingNames` memo \u2192 plain `pendingPaths` | `frontend/src/app/components/TasksFilesSidebar.tsx` (`FilesPopover` delete dialog, lines ~270\u2013400) |\n| Basename for the unchanged single-file copy | `frontend/src/app/lib/fileCategories.ts` (`splitFilePath`) |\n\n# Decisions worth remembering\n\n- **Keys come from `pendingDelete`, never from derived display strings.** The paths are unique by construction (spread from the `selected` `Set`). Any display transform \u2014 basename, truncation \u2014 can collide, which was exactly the v1 bug. A repo-wide grep confirmed this list was the only basename-keyed render; the file-card grid already keys by path.\n- **Single-file dialog keeps the basename.** [PRD 14](14_multi_select_file_delete.md) promised \"single-delete reads exactly as before\", and a lone `<span>` can't key-collide. The basename now comes from the existing `splitFilePath` helper instead of an inline `split(\"/\").pop()`.\n- **Wider fixed dialog + `break-words`, not a user-resizable one.** The first cut kept `max-w-md` and wrapped with `break-all`, which chopped paths mid-token and forced scrolling at three rows \u2014 hard to read in exactly the dialog that guards a permanent delete. The bulk branch now widens to `sm:max-w-2xl`; the `sm:` prefix matters, because the shadcn `DialogContent` base carries `sm:max-w-lg` and tailwind-merge only replaces same-variant classes \u2014 an unprefixed `max-w-*` override silently loses on desktop (the pre-existing `max-w-md` was in fact rendering at `lg`). Rows wrap at hyphen boundaries via `break-words` (slugs are hyphen-heavy, so lines break legibly; over-long unbroken runs still force-break). Drag-to-resize was considered and rejected: native CSS `resize` fights Radix's `translate(-50%,-50%)` centering \u2014 the box re-centers while dragging so the handle drifts away from the cursor \u2014 and a clean version needs custom handles, position pinning, and size persistence: a lot of interaction surface for a confirmation glanced at for seconds. Content is bounded anyway (`DELETE_PREVIEW_LIMIT` = 5 rows), so a fixed wider cap fits everything.\n\n# Deferred (intentional non-goals for v1)\n\n- **Smart path truncation (middle-ellipsis, common-prefix folding).** Raw paths read fine at current workspace depth (2\u20133 segments). Revisit if nesting grows or paths start drowning the dialog.\n\n# How to verify end-to-end\n\n1. Open a thread whose workspace holds two same-named files in different directories (a battlecard + tailored-resume run produces `<jd-slug>.pdf` in both folders).\n2. Select both (plus others) in Workspace > Files and click `Delete` in the action bar.\n3. The dialog lists full paths in the widened box \u2014 the two same-named files are distinguishable, all five rows visible without scrolling, lines breaking at hyphens. The browser console (relayed to `docker compose logs frontend` as `[browser]` lines) shows no `Encountered two children with the same key` error, and the dev overlay shows no issue badge.\n4. Cancel \u2192 the selection is preserved. The per-card trash icon still opens the single-file dialog showing only the basename.", "20_ui_modernization": "**Extends:** [Color-coded Workspace File Cards](09_file_category_colors.md), [Configurable LLM Models](15_configurable_llm_models.md)\n\n# Why\n\nThe app worked but looked like a generic LangGraph chat shell: a teal/green palette, a single Inter typeface, dark mode only via `prefers-color-scheme` (no toggle), and chrome that read as boilerplate (a \"GenAI-Accelerated Career Advancement\" text header, plain tool boxes, a resizable 3-panel layout). Claude Design produced a hi-fi handoff (`design_handoff_nextrole_ui/`) for a warm, editorial look. The goal was to adopt that visual language **and** add real theme/accent controls **while preserving every existing behavior** \u2014 streaming, subagent discovery, tool-approval interrupts, the three-source file workspace, thread hydration, and the streaming-perf work from [PRD 05](05_chat_streaming_throttle.md). Crucially the app already had the design's conceptual structure (chat + workspace with Plan/Files/Sources), so this is a **restyle, not a rebuild**.\n\n# What the user sees\n\nA warm \"paper + espresso\" interface with a **logo-matched emerald accent**. New top bar: the NextRole rocket logo + wordmark, the active thread's title/sub, a **theme toggle** (light/dark/system), settings, and an emerald \"New thread\" button. A **Settings** modal adds an Appearance section (theme + **4 selectable accents**: emerald/indigo/blue/coral, persisted) alongside the existing model/connection config. The empty state is an editorial **hero** (\"Land your *next role*, faster.\" in Newsreader serif) with suggestion chips. Assistant turns show a logo avatar (once per turn) and a vertical **tool-activity timeline rail** (status node + connector + mono tool name, expandable). Threads moved to a left **slide-over drawer** that can be **pinned** into a persistent docked column. Workspace cards were refreshed (Plan progress bar + todo timeline, Files as a 2-up grid colored by folder with a format badge, Sources with letter badges). **File paths the agent writes in replies are clickable** and open the file preview. Full light/dark theming throughout.\n\nDeliberate negative space: the **assistant pill is a read-only \"team\" roster, not a switcher** (the design's \"4 assistants\" are really our 1 agent + 3 `task`-tool subagents); the **composer has no paperclip** (hidden \u2014 uploads live in Workspace \u2192 Files); the **Next.js dev indicator is hidden**; **temperature / system-instructions were not added**.\n\n# How \u2014 the key architectural choices\n\n**Repaint by token *value*, via a brand-accent namespace that feeds both token layers.** The whole palette swap is almost entirely a CSS-variable value change in `globals.css` \u2014 component classes barely changed, so the app re-tinted in one place. The app runs two parallel token layers (the `--color-*`/`--bg-*` set consumed by `tailwind.config.mjs` extends, and the Radix HSL set `--primary`/`--background`/\u2026 consumed by `components/ui/*`). A new `--brand-accent*` namespace holds the selectable accent and feeds **both** `--color-primary` and the Radix `--primary`/`--ring` (HSL), so brand color flows everywhere from one source \u2014 without reusing Radix's `--accent`, which is a *muted hover surface*, not the brand.\n\n**Theme and accent are two orthogonal mechanisms.** Light/dark moved off `@media (prefers-color-scheme)` to a `.dark` class driven by `next-themes` (explicit toggle, `system` default). Accent is separate: an `AccentProvider` sets a `data-accent` attribute (emerald default) persisted to `localStorage`, with the per-accent token blocks (`:root[data-accent=\"\u2026\"]` / `.dark[data-accent=\"\u2026\"]`) in `globals.css`. An inline pre-paint `<script>` in `layout.tsx` restores the saved accent before first paint to avoid FOUC.\n\n**The tool timeline rail is markup-only over frozen streaming logic.** `ToolCallBox`/`SubagentCard` were restyled into a rail (status node + hairline connector, reusing `PlanSection`'s `before:` idiom) without touching their `React.memo`, the `processedMessages` caches, the pending-guarded `parseToolError`/`previewValue`, or the pointer/click dedupe from [PRD 05](05_chat_streaming_throttle.md).\n\n# Files of interest\n\n| Concern | Path |\n|---|---|\n| Palette + dark `.dark` block + 4 accent blocks + tokens | `frontend/src/app/globals.css` |\n| `darkMode: [\"class\"]`, fonts, `brand-accent`/surface token utilities | `frontend/tailwind.config.mjs` |\n| 3 fonts (next/font), provider wrap, accent pre-paint script | `frontend/src/app/layout.tsx` |\n| Theme + accent providers | `frontend/src/providers/ThemeProvider.tsx`, `AccentProvider.tsx` |\n| 2-panel layout, threads pin/dock, drawer-close effect | `frontend/src/app/page.tsx` (`handleThreadSelect`, `threadsPinned`) |\n| Top bar, brand logo, read-only roster pill | `frontend/src/app/components/TopBar.tsx`, `LogoMark.tsx` |\n| Hero, composer (circular send, gated attach), `COMPOSER_ATTACH_ENABLED` | `frontend/src/app/components/ChatInterface.tsx` |\n| Avatar once-per-turn, bubbles, rail container | `frontend/src/app/components/ChatMessage.tsx` (`showAvatar`) |\n| Tool rail row + status node + icon map | `frontend/src/app/components/ToolCallBox.tsx` (`TOOL_ICON_MAP`, `statusNode`) |\n| Threads slide-over + pin | `frontend/src/app/components/ThreadsDrawer.tsx`, `ThreadList.tsx` |\n| Settings modal + appearance section | `frontend/src/app/components/ConfigDialog.tsx`, `AppearanceSettings.tsx` |\n| Workspace cards (chip/progress/file color/sources) | `frontend/src/app/components/workspace/*`, `TasksFilesSidebar.tsx` (`FileCard`) |\n| Clickable file paths | `frontend/src/providers/FilePreviewProvider.tsx`, `frontend/src/app/utils/filePaths.ts`, `MarkdownContent.tsx` |\n| Hide dev indicator | `frontend/next.config.ts` (`devIndicators: false`) |\n| Design-system spec + pointer | `frontend/DESIGN.md`, `frontend/CLAUDE.md` |\n\n# Decisions worth remembering\n\n- **`bg-primary`/`text-primary` are the *paper* tokens, not the brand.** In `tailwind.config.mjs` the `backgroundColor`/`textColor` namespaces map `primary` \u2192 `--bg-primary`/`--text-primary` (canvas/ink), so `bg-primary` renders near-white. Brand-colored elements must use `bg-brand-accent`/`text-brand-accent`/`text-on-accent` or the new Button `variant=\"primary\"`. This bit twice (the washed-out progress bar and workspace chips both used `bg-primary`). Radix `colors.primary` (= `hsl(var(--primary))`) *is* the brand and drives focus rings.\n- **Emerald is the default accent, not the design's indigo (user call).** The green matches the rocket logo and the README diagram palette; indigo was demoted to a selectable option. Implemented by making `:root`/`.dark` default to emerald and adding explicit `[data-accent=\"indigo\"]` blocks \u2014 so SSR defaults to emerald with no flash.\n- **Assistant avatar renders once per turn, pinned to the top.** First cut stamped the logo on every assistant message and let it drift mid-stream. Best practice (claude.ai/ChatGPT/Gemini) is identity once per turn; we thread the existing `showAvatar` flag to `ChatMessage` and pin it with `items-start` so it stays put while text streams.\n- **Threads drawer-select used two nuqs setters and dropped `threadId`.** Calling `setThreadId(id)` then `setSidebar(null)` in one handler made the second setter rebuild the query from a render-time snapshot and clobber the first \u2014 the drawer closed but no thread loaded. Fix: the handler only sets `threadId`; a `useEffect` closes the drawer *after* it commits. (Pinned dock avoids this entirely since it never closes on select.)\n- **Clickable file paths are validated against the real file set.** A remark plugin (`remarkFilePaths`) wraps path-like text, but `MarkdownContent` only renders a link when `FilePreviewProvider.resolveFile` matches an existing file \u2014 so a hallucinated/misspelled path (`/procesed/x.md`) stays plain text. Two non-obvious fixes: react-markdown's default `urlTransform` sanitized our `nextrole-file:` sentinel scheme to an empty href (pass a custom `urlTransform`), and opening the Radix preview modal synchronously from the triggering click self-dismissed it (defer with `setTimeout(0)`).\n- **Files are colored by folder category, not file type (user reverted a type-based cut).** Keeps the [PRD 09](09_file_category_colors.md) grouping (`getFileCategory` \u2192 `iconVar`) so a folder's artifacts share a hue; the new format badge (PDF/JSON/YAML/MD) carries the type. The palette migrated with the theme; `tailored_resume` now follows the accent.\n- **Composer attach is gated, not deleted.** `COMPOSER_ATTACH_ENABLED = false` hides the paperclip while keeping the upload code wired (flip to re-show); the redundant capability lives in Workspace \u2192 Files. The Next.js \"N\" indicator is hidden via `devIndicators: false` (errors still report) rather than an env toggle, because the frontend container only receives the explicit `NEXT_PUBLIC_*` vars.\n- **`DESIGN.md` lives in `frontend/`, referenced (not `@import`-ed) from `frontend/CLAUDE.md`.** Co-located with the code it documents (matching the per-app CLAUDE.md convention); a pointer instead of a CLAUDE.md `@import` keeps the ~600-line spec out of every session's context until design work actually needs it.\n\n# Deferred (intentional non-goals for v1)\n\n- **Temperature + system-instruction controls.** In the design's Settings but not backend-wired (`middleware.py` only reads `configurable.main_agent_model`/`subagent_model`). Adding them means agent-runtime work; revisit when that's in scope.\n- **A real assistant/agent switcher.** The deployment exposes one selectable assistant; the roster pill stays read-only until multiple graphs/assistants exist.\n- **Env-var toggle for the dev indicator / re-showing the composer attach.** Both are one-line flips today; wire an env path only if toggling becomes frequent.\n- **Motion tokens.** Streaming caret, tool sweep, progress sheen, and drawer slide are encoded ad hoc, not formalized.\n\n# How to verify end-to-end\n\n1. `docker compose up -d`; open the frontend host port from `docker ps`. (After pulling, restart the frontend once \u2014 `next-themes` was added and `next.config.ts` changed, both read at boot.)\n2. Empty state shows the serif hero + chips; a chip fills the composer; there is **no paperclip** and **no \"N\" dev indicator** bottom-left.\n3. Open Settings \u2192 toggle Light/Dark/System and click each accent swatch; the whole app re-tints live and **persists across reload with no flash**. Default accent is emerald.\n4. Open a thread with tool activity: the tool rail shows status nodes + mono names; `write_todos`/`overwrite_file` use the write icon, `read_file` a book, `execute` a terminal; expanding a row shows the mono detail. The assistant logo avatar appears once at the top of the turn.\n5. Open the threads drawer, **select a thread \u2192 it loads and the drawer closes**. Re-open, click **pin** \u2192 it docks as a persistent column and **stays open** when switching threads.\n6. Ask the agent to list the files it created; the paths render as emerald links \u2014 clicking one opens the file preview. A made-up path renders as plain text.\n7. Send a fresh message and watch it stream (working indicator \u2192 Stop button \u2192 avatar + streamed reply); confirm via React DevTools that only the streaming row re-renders (streaming perf intact).\n8. Run `pnpm --dir frontend build` + `type-check` + `lint` \u2014 all clean.", "21_own_agent_server": "**Extends:** [18_langchain_react_migration](18_langchain_react_migration.md)\n\n> Design, topology, config knobs, and maintenance rules live in\n> [`backend/ARCHITECTURE.md`](../../backend/ARCHITECTURE.md) and\n> [`backend/README.md`](../../backend/README.md). This PRD records only the why and the\n> decisions those documents don't explain.\n\n# Why\n\nThe backend image was `FROM langchain/langgraph-api:3.13` \u2014 a closed base image owning the\nHTTP/SSE API, run queue, checkpointing, migrations, and process lifecycle. NextRole is open\nsource; shipping on code we can't read, patch, or version-pin (the `:3.13` tag is mutable)\nwas the single biggest dependency risk in the repo. This change moves the entire server\nin-repo (`backend/server/`), builds our own `python:3.13-slim` + `uv` image, and replaces the\nofficial image's in-process Go data-plane sidecar with a Python `core-server` compose service.\n\n# What the user sees\n\nNothing changes at the product surface \u2014 same endpoints (`/docs`, `/mcp`, `/a2a/{assistant}`),\nsame port, same deterministic `career_agent` assistant id, existing threads intact. What\nchanged around the edges: `docker compose ps` shows a new `core-server` service; the DB schema\nships as one consolidated migration (local dev DB was reset by agreement \u2014 no important data);\nand two UX regressions found during the swap are fixed *better than before*: multi-turn\nstreaming survives idle gaps and SDK stream rotations, and subagent history panes now restore\ncomplete, ordered tool activity from durable checkpoints instead of showing nothing.\n\n# How \u2014 the key architectural choices\n\n- **Two compose services from one image, not a faithful single-container clone.** The official\n  image hides a Go gRPC data plane inside the container; we run the Python reimplementation\n  (`server/core_server/`) as its own service. Same image, different command \u2014 one build, and\n  the two planes scale/restart independently (core-server has no hot reload; uvicorn does).\n- **Two-concept backend root with split quality gates.** `agents/` (the product) keeps the\n  full strict ruff/ty bar; everything under `server/` (the platform) runs with a scoped\n  `per-file-ignores` block and a ty path-exclude. Generated gRPC stubs\n  (`server/grpc_common/proto/`) are excluded at **both** the ruff-config and pre-commit-hook\n  level \u2014 hooks pass filenames explicitly, which bypasses ruff's own `exclude`, and an F401\n  autofix once stripped the side-effect `empty_pb2` imports that register protobuf well-known\n  types, breaking every server import.\n- **Streaming: pub/sub for live, a structural Redis-stream log for replay.** Live delivery\n  (token text, streamed tool args) rides the per-run pub/sub channels; a capped per-thread log\n  (`thread:{tid}:events`, structural events only) backs replay for SDK stream rotations,\n  reconnects, and history panes. Chunked `messages/*` events are live-only by measurement:\n  logging them was 95% of 66 MB per run and trimmed the earliest subagents' tool events out of\n  the cap. Getting this split wrong twice (idle-exit killing streams; XREAD-only delivery\n  dropping chunks) produced the two worst regressions of the migration \u2014 see Decisions.\n\n# Files of interest\n\n| Concern | Path |\n|---|---|\n| Server platform (all of it) | `backend/server/` (`api`, `runtime`, `runtime_postgres`, `grpc_common`, `core_server`) |\n| Image (two-stage uv, venv at `/opt/venv`) | `backend/Dockerfile` |\n| `core-server` service + backend env/healthcheck | `docker-compose.yml` |\n| Consolidated schema (future changes: `000002+`) | `backend/storage/migrations/000001_init.up.sql` |\n| Event fan-out: pub/sub + structural XADD | `backend/server/core_server/servicers/runs.py` (`_fanout_event`) |\n| Two-phase thread stream: replay log \u2192 tail pub/sub | `backend/server/core_server/servicers/threads.py` (`Stream`) |\n| Namespaced history from the checkpointer | `backend/server/api/grpc/ops/threads.py` (`State.list`, ValueError fallback) |\n| Agent-shell PATH fix (venv tools resolvable) | `backend/agents/career_agent/shell_backend.py` (`default_shell_env`) |\n| Server smoke tests (regression net) | `backend/tests/server/test_smoke.py` |\n\n# Decisions worth remembering\n\n- **Docs are provenance-free by request.** `ARCHITECTURE.md`/`README.md` present the server as\n  NextRole's own; license machinery was excised entirely (call sites in `api/metadata.py` and\n  `runtime_postgres/lifespan.py`), and `PLAN = \"enterprise\"` is a constant. Env vars keep their\n  `LANGGRAPH_*`/`LANGSERVE_*` names deliberately \u2014 they're the SDK ecosystem's contract.\n- **Naming converged in two user-driven steps.** First `backend/app/` \u2192 `backend/agents/`;\n  then the de-prefixed server packages (`langgraph_api` \u2192 `api`, \u2026) were grouped under a single\n  `server/` parent. Also this exposed a latent repo bug: the ruff `exclude` array had always\n  lived under `[tool.ruff.lint]`, which the *formatter* ignores \u2014 moved to top-level\n  `[tool.ruff]`.\n- **One squashed migration, generated from the live schema \u2014 not concatenated history.** The\n  60 incremental migrations were replaced by a single `000001_init.up.sql` built from\n  `pg_dump --schema-only` of the v60 database and verified by reset-and-diff (identical up to\n  a cosmetic CHECK-constraint deparse). Consequence: the `pre-vendor` rollback tag now pairs\n  with a fresh DB.\n- **Subagent transcripts never reach the parent's context.** A supervisor-style\n  `SUBAGENT_OUTPUT_MODE=\"full_history\"` was built, verified live, and *reverted on request*:\n  tool names/args in the parent's context risk teaching the model to imitate tool syntax, and\n  transcripts ride every subsequent turn. The parent re-reads artifact files on demand; UI\n  visibility is fully served by the event log + namespaced `/history` (checkpoint-backed \u2014\n  the JS SDK's `fetchSubagentHistory` contract, which the old server 400'd on).\n- **The LLM stream watchdog stays at its 120 s default.** A one-off Azure stall\n  (`StreamChunkTimeoutError`, `chunks_received=2`) was first \"fixed\" by raising\n  `LANGCHAIN_OPENAI_STREAM_CHUNK_TIMEOUT_S` to 600 \u2014 then reverted once the real UI bug (the\n  thread-stream idle-exit) was found: fail-fast beats a 10-minute hang. If stalls recur, the\n  right lever is queue-level retriability, not a longer leash.\n- **Old base image could bake PII.** `backend/.dockerignore` now blocks the upload/output\n  content dirs (`**/upload/`, `**/tailored_resume/`, \u2026) from image layers \u2014 a latent exposure\n  in the previous `ADD . /deps/next-role` build, fixed en passant.\n\n# Deferred (intentional non-goals for v1)\n\n- **FE: subagent panes in long threads.** All subagent conversations are stored and servable\n  (verified via `POST /threads/{id}/history` with `checkpoint.checkpoint_ns`), but the SDK's\n  namespace discovery scans only the latest ~20 parent checkpoints, so early-turn panes show\n  no activity. Separate FE PR; requirement already written.\n- **Queue-level retry for provider stream stalls.** `StreamChunkTimeoutError` hard-fails the\n  run (not in the retriable set). Revisit if Azure stalls recur: re-pend from the last\n  checkpoint instead of raising the watchdog timeout.\n- **Renaming the `LANGGRAPH_*` env/config surface.** Hundreds of keys in `api/config`; kept\n  verbatim for SDK compatibility. Revisit only if the SDK contract itself changes.\n\n# How to verify end-to-end\n\n1. `docker compose up -d` \u2014 `backend` and `core-server` report healthy; backend logs show\n   migrations no-op and \"gRPC server is ready\".\n2. `curl localhost:${LANGGRAPH_LOCAL_PORT}/ok` \u2192 `{\"ok\":true}`; `/docs` renders; `/mcp`\n   answers an `initialize` handshake; `/a2a/career_agent` speaks JSON-RPC.\n3. In the UI: send a message, then a follow-up after >10 s idle \u2014 both stream. Ask for a file\n   write and watch the `overwrite_file` card appear mid-run with its args growing (the\n   tool-arg streaming this migration twice broke and fixed).\n4. Run a full prep (parallel subagents), then cold-reload the thread: every subagent card\n   shows complete, ordered tool activity.\n5. `cd backend && uv run pytest` (unit) and `uv run pytest -m integration` (smoke incl. the\n   idle-stream regression test) \u2014 green.", "22_frontend_test_suite": "# Why\n\nThe backend has had pytest and a required `backend-tests` check since early on; the frontend had literally zero test infrastructure \u2014 no runner, no `test` script. Every frontend change (including the dependency-upgrade waves the `upgrade-frontend-deps` skill automates) was verified only by type-check + lint + build + manual browser checks, which catch API drift but not behavior regressions in the parsing/routing logic the app has accumulated (source extraction, tool-error parsing, agent-file routing, path-traversal guards). This ships a 367-test Vitest suite, wires it in as a third required CI check, and adds tests to the skill's per-wave gate (\"Gate G\").\n\n# What the user sees\n\nDeveloper-facing only. `pnpm test` / `test:watch` / `test:coverage` in `frontend/`; test files colocated next to their source (`foo.test.ts(x)`); a `frontend-tests` check on every PR that **skip-passes on backend-only and docs-only changes**. The PR template's test checklist now names both stacks, and testing docs live in `frontend/CLAUDE.md#testing` (conventions), `CONTRIBUTING.md#testing` (workflow), and `frontend/README.md`. Deliberately absent: tests do **not** run in pre-commit (matches the backend convention \u2014 tests are CI's job, hooks stay fast) and there is no coverage threshold gate.\n\n# How \u2014 the key architectural choices\n\n**Vitest 4, not Jest.** The app depends on ESM-only packages (`react-markdown@10`, `remark-gfm@4`, deep-ESM `react-syntax-highlighter` imports) and is itself `\"type\": \"module\"`; Jest would need `transformIgnorePatterns` surgery and ESM flags. Vitest handles ESM natively, and the repo already ships Vitest 4 in `backend/server/api/js`.\n\n**Two projects split by file extension.** `.test.ts` runs in node (pure modules, route handlers); `.test.tsx` runs in jsdom (rendering, browser APIs) with a shared setup file (jest-dom + Radix polyfills). Vitest 4 removed `environmentMatchGlobs`, so `test.projects` is the supported mechanism \u2014 and the extension-as-switch means no per-file `@vitest-environment` docblocks. A `.tsx` test without JSX is fine when jsdom is needed.\n\n**Real temp-dir sandbox for the `/api/files/*` handlers, not fs mocks.** `_lib.ts` computes `REPO_ROOT` from `process.cwd()` **at import time**, so tests spy on `process.cwd()`, mock `@/app/config/agentFiles` with a fixture, and only then dynamically `await import(\"./route\")`. Real filesystem resolution keeps the security assertions honest \u2014 the traversal/sibling-prefix cases test what `path.resolve` actually does, not what a mock was told to do.\n\n**Required check via detect-job + job-level `if`.** `frontend-tests.yml` clones `backend-tests.yml`'s shape (paths-filter detect job feeding a job `if:`) \u2014 never `on:`-level path filtering, which leaves a required check stuck \"Expected\" (see PRD-less lesson recorded in the workflow headers and `.claude` memory from PR #32).\n\n# Files of interest\n\n| Concern | Path |\n|---|---|\n| Runner config (projects split, alias, coverage) | `frontend/vitest.config.ts` |\n| jsdom polyfills + jest-dom | `frontend/vitest.setup.ts` |\n| Sandbox pattern anchor (traversal guards) | `frontend/src/app/api/files/_lib.test.ts` |\n| Heaviest mock surface (`useStream`, file CRUD matrix) | `frontend/src/app/hooks/useChat.test.tsx` |\n| Extracted-for-testing parsers | `frontend/src/app/utils/toolErrors.ts`, `frontend/src/app/print/file/printPayload.ts` |\n| Required check workflow | `.github/workflows/frontend-tests.yml` |\n| Gate G now includes `pnpm test` | `.claude/skills/upgrade-frontend-deps/SKILL.md` (\u00a72, \u00a78) |\n\n# Decisions worth remembering\n\n- **Colocated tests, not a `tests/` mirror tree.** Deliberate divergence from the backend's convention (user's call): it's the frontend-ecosystem norm, imports stay short, and the filename extension doubles as the environment switch. The Next.js build ignores colocated non-route files, verified via `pnpm build`.\n- **`globals: true`.** RTL's auto-cleanup only activates when a global `afterEach` exists; globals give it for free and jest-dom extends the global `expect` via one setup import. Cost is one tsconfig `types` entry (`vitest/globals`).\n- **Testability refactor kept to three moves.** `parseToolError`/`previewValue` out of `ToolCallBox`, print-payload parsing out of the print route page (which also stopped `FileViewDialog` importing from a route module), and an exported `formatTime`. Everything else embedded in components is covered through rendered output \u2014 no export-for-tests sprawl.\n- **`vitest` \u2194 `@vitest/coverage-v8` are an exact-version lockstep pair** (coverage is an exact peer of the runner) \u2014 same failure shape as the `@langchain/react`/SDK pair; recorded as an `upgrade-frontend-deps` ground rule so `pnpm update` doesn't split them.\n- **The new workflow reads Node from `frontend/.nvmrc` (24)** instead of hardcoding; `ci.yml` still pins 22 \u2014 left alone deliberately to keep the PR reviewable (follow-up chore).\n- **Never enable global `restoreMocks`** \u2014 it silently undoes `beforeAll` spies (the sandbox's `process.cwd` spy) after the first test.\n- **Tests follow code, not the plan.** Writing them surfaced real quirks, asserted as-is rather than \"fixed\": an unreachable state-routing branch in `useChat.setFiles`, two distinct `useThreads` fallback titles (`Untitled Thread` vs `Thread <id8>`), delete's `EISDIR` branch being Linux-only (darwin throws `EPERM`, so it's covered via a mocked `unlink`), and the composer attach button being dead code behind `COMPOSER_ATTACH_ENABLED = false`.\n\n# Deferred (intentional non-goals for v1)\n\n- **Playwright/browser E2E.** The `agent-browser` skill already covers visual + full-flow verification (and the upgrade skill's baseline-screenshot workflow); a second browser harness isn't worth the CI weight until component tests prove insufficient.\n- **Coverage thresholds.** `pnpm test:coverage` reports (text + html); gating on a number invites threshold-gaming before the suite's shape has settled.\n- **A `frontend-build` CI job.** CI still never runs `next build`; kept out of `frontend-tests` to keep the required check fast (~35s). Revisit if a build-only breakage ever slips through.\n- **`page.tsx` / `layout.tsx` tests.** Whole-app integration (and `next/font` mocking) for near-zero logic \u2014 agent-browser territory.\n- **Minor skipped branches** \u2014 clipboard copy (no `navigator.clipboard` in jsdom), shift-range file selection, docx error states.\n\n# How to verify end-to-end\n\n1. `cd frontend && pnpm test` \u2014 33 files / 367 tests green in ~2s, reporter shows both `node` and `jsdom` project labels.\n2. `pnpm test:coverage` \u2014 report renders; `coverage/` stays untracked (gitignored) and unlinted.\n3. `pnpm type-check && pnpm lint && pnpm build` \u2014 clean; build's route list contains no `.test.` entries.\n4. Open a PR touching only `frontend/**` \u2014 `frontend-tests` executes; `backend-tests` reports success via skip. A docs-only PR shows `frontend-tests` success-via-skip (not stuck \"Expected\").\n5. Post-merge: `gh api repos/tam159/next-role/branches/main/protection/required_status_checks/contexts` lists `code-quality`, `backend-tests`, `frontend-tests`.", "23_progressive_tool_disclosure": "**Extends:** [UI/UX Modernization](20_ui_modernization.md)\n\n# Why\n\nThe transcript rendered every main-agent tool call and every subagent's INPUT/ACTIVITY/OUTPUT panel fully expanded, forever. A real prep run (a dozen root tool calls + three subagents) buried the final answer \u2014 the only thing non-technical users care about \u2014 under screens of machinery. But the machinery can't just disappear: watching it stream is what makes the agent feel alive, and the expanded trail is the first-step debugging view before reaching for LangSmith. Industry research (Vercel AI Elements `Reasoning`/`Tool`, assistant-ui `ToolGroup`, ChatGPT deep research) converged on one pattern: **expanded while running, auto-collapsed to a summary when done, always re-expandable**. Separately, each subagent rendered as two disconnected boxes (a header chip + a separate detail panel) that couldn't collapse as a unit.\n\n# What the user sees\n\nWhile the agent works, today's live view: tool rows appear with spinners on the timeline rail, subagent cards stream INPUT/ACTIVITY. The moment a unit finishes **it** collapses (per-unit, not at run end): a consecutive run of main-agent tool calls becomes one rail row \u2014 \"12 tool calls \u00b7 `write_todos` \u00b7 `list_files` \u00b7 `parse_document` +3\" with a status node and an \"n failed\" pill when applicable \u2014 and a subagent becomes just its header: identity icon, name, status badge, \"n tools\" pill, duration. A run of exactly one call stays a plain collapsed `ToolCallBox`, no wrapper. Runs span AI messages and break only on assistant prose, a subagent card, or a user message.\n\nExpanding a collapsed run shows the execution timeline: per-step clusters, with simultaneous calls opening under a \"\u2442 N IN PARALLEL\" micro-label and closing with a hairline break. Subagent ACTIVITY gets the same parallel markers (but no inner collapse). Subagents have identity icons \u2014 hiring-recon = Radar, resume-tailor = Scissors, interview-coach = MessagesSquare, anything undeclared = Bot. All disclosure chevrons follow one convention: **right when collapsed, rotating down when expanded** (previously the tool rail used down\u2192up while cards used right\u2192down). Manual toggles win permanently; a pending tool-approval pins its group open; reloaded threads mount already collapsed with no animation. AI prose is never collapsed.\n\n# How \u2014 the key architectural choices\n\n**Collapse is pure presentation state derived from signals the frontend already has \u2014 zero backend change.** A shared `useAutoCollapse(isRunning, {forceExpanded})` hook mounts expanded iff running, auto-collapses once on the running\u2192terminal transition (render-phase adjustment keyed off a derived boolean, so the `processedMessages` identity caches can't mask a transition), and re-expands on terminal\u2192running (interrupt resume). \"Running\" is `isLoading`-gated \u2014 `!!isLoading && \u2026` \u2014 which makes history reload, the Stop button, and an interrupt pause all read as terminal for free. Subagents key off `snapshot.status` (the authority; trailing namespaced events can't hold a card open).\n\n**Collapsed bodies stay mounted** (`Collapse.tsx`: CSS grid-rows `1fr`\u2194`0fr` transition + `inert`), instead of conditional unmount. This preserves `ToolCallBox` expand state and the ref-counted namespaced subscriptions (the Workspace sources probe shares them), renders history at `0fr` with no entry animation, and keeps DOM cost \u2264 the old always-expanded rendering. Consequence for tests: assert `aria-expanded`/`inert`, never text absence.\n\n**Run grouping is computed in `ChatInterface`, not `ChatMessage`, because runs span messages.** A walk over `processedMessages` merges consecutive non-`task` calls into `batches: ToolCall[][]` keyed by head message id (one batch = one AI message = calls issued in parallel), breaking *before* a message with prose (prose renders above its own calls) and *after* one that spawns a subagent (the card renders below them). The same identity-caching discipline as `processedMessages` keeps `React.memo` effective. An `openEndedHeadId` marks a transcript that ends inside a run, holding the tip group open across the model's think-pauses between batches \u2014 without it the group would flicker collapsed/expanded between steps.\n\n# Files of interest\n\n| Concern | Path |\n|---|---|\n| Auto-collapse state machine | `frontend/src/app/hooks/useAutoCollapse.ts` |\n| Always-mounted animated disclosure | `frontend/src/app/components/Collapse.tsx` |\n| Run summary row + singleton short-circuit + interrupt pin | `frontend/src/app/components/ToolCallGroup.tsx` |\n| Batch clusters, \"N in parallel\" labels, closing hairline | `frontend/src/app/components/ToolCallBatchList.tsx` |\n| Cross-message run building + open-ended tip | `frontend/src/app/components/ChatInterface.tsx` (`toolBatchesByHead`, lines ~320\u2013375) |\n| Merged one-card subagent, `QueuedSubagentCard`, icon map, activity batching | `frontend/src/app/components/SubagentCard.tsx` (`SUBAGENT_ICON_MAP`, `nestedBatches`) |\n| Head-message rendering of the run | `frontend/src/app/components/ChatMessage.tsx` (`toolBatches` prop) |\n| Shared pointerdown-first toggle | `frontend/src/app/hooks/usePointerToggle.ts` |\n| Chevron convention (right\u2192down) applied to rows/args/sidebar | `frontend/src/app/components/ToolCallBox.tsx`, `TasksFilesSidebar.tsx` |\n| `formatDuration` | `frontend/src/app/utils/utils.ts` |\n| Component specs (tool-call-group, subagent-card, chevron rule) | `frontend/DESIGN.md` |\n\n# Decisions worth remembering\n\n- **Per-unit collapse, not collapse-at-run-end (user call).** Each unit tidies itself the moment it finishes, so during a long run the only expanded thing is the active one \u2014 matching ChatGPT/assistant-ui. The literal alternative (everything stays open until the run ends) was offered and rejected.\n- **Runs merge across messages (user correction).** v1 of the group collapsed per AI message, which still left ~10 rows per turn (each `write_todos` was its own \"group\"). The user wanted one unit per consecutive run *with* the parallelism still visible when expanded \u2014 hence batches preserved inside the merged group instead of flattening.\n- **The queued subagent card must be hook-free.** `useToolCalls(stream, undefined)` subscribes to the ROOT namespace, so the pre-discovery path can't reuse the main card component. `QueuedSubagentCard` renders the same header markup (pixel-stable queued\u2192running transition) with no hooks.\n- **Durations under 1s are suppressed.** History-reseeded `SubagentDiscoverySnapshot`s carry hydration timestamps (`startedAt \u2248 completedAt`), so every historical card showed a bogus \"<1s\". Live runs always exceed 1s, so the guard costs nothing real.\n- **Subagent ACTIVITY batches come from the replayed message list, degrading to flat.** `AssembledToolCall` carries no step marker, so parallelism is recovered by walking the subagent's AI messages (`tool_calls` + streaming `tool_call_chunks`); calls absent from replay append as single steps \u2014 old threads beyond the event-log window just look like today's flat list. Verified empirically that namespaced replay delivers messages for historical threads (hiring-recon showed 2/3/4/5-in-parallel clusters after reload).\n- **Approval requests attach only to `status === \"interrupted\"` calls.** The old name-keyed lookup hit every same-name box in the last message; with merged runs it would also hit completed same-name calls from earlier messages. Interrupt maps now go to every `ChatMessage` (stable identities; the head of a run isn't necessarily the last message) and route by status.\n- **One chevron convention: right = collapsed, down = expanded (user spotted the inconsistency).** The tool rail used down\u2192up while subagent/workspace cards used right\u2192down. Standardized on the disclosure (file-tree) convention product-wide \u2014 including `ToolCallBox`'s inner Arguments rows and the sidebar section toggles \u2014 and wrote the rule into `DESIGN.md`.\n- **The React-Compiler lint shaped the hook.** `react-hooks/refs` forbids ref access during render: the user-override flag became state (it drives render decisions), `forceExpanded` became a `toggle` dependency instead of a mirrored ref, and the dynamic icon lookup had to be a static property access (`SUBAGENT_ICON_MAP[name] ?? Bot`) so `react-hooks/static-components` can prove it isn't a component created mid-render.\n\n# Deferred (intentional non-goals for v1)\n\n- **Scroll compensation during auto-collapse.** Chrome/Firefox native scroll anchoring plus the 300ms height animation handle it; Safari (no anchoring) may show a shift when scrolled up mid-run. The contained fix \u2014 scrollTop adjustment in `Collapse` \u2014 is designed but unbuilt; add it if Safari verification shows an objectionable jump.\n- **Auto-opening `ToolCallBox` on a late-arriving `actionRequest`.** A box only auto-opens if the request exists at mount; the group-level pin already keeps the approval reachable, so the effect was skipped to keep `ToolCallBox` internals untouched.\n- **Collapse inside subagent ACTIVITY.** The card is the collapse unit; nesting another accordion inside it adds interaction depth for no scanning benefit (user agreed).\n- **A \"Stopped\" badge for stuck-running snapshots.** After Stop, a subagent snapshot can stay `running` while the collapsed card's badge still says \"Running\" \u2014 pre-existing data limitation, kept for parity.\n\n# How to verify end-to-end\n\n1. `docker compose up -d`; open the frontend host port from `docker ps`. Open a past thread with subagent activity: everything renders **already collapsed, no animation** \u2014 \"N tool calls \u00b7 names\" rail rows and one-line subagent cards (Radar/Scissors/MessagesSquare icons, \"n tools\" pill, no \"<1s\" duration).\n2. Expand a run: per-step clusters with \"\u2442 N IN PARALLEL\" labels and a hairline closing each parallel cluster; expand a subagent: one card opens beneath its header with INPUT / ACTIVITY (parallel markers) / OUTPUT. All chevrons point right closed, down open.\n3. Send a message that triggers two sequential tool steps then prose (e.g. \"read X, then list Y, then answer\"). Watch: first call streams as a bare row \u2192 second arrives and the group forms, **staying expanded through the think-pause** \u2192 the group collapses the moment prose starts streaming.\n4. Manually expand a finished unit and collapse a running one \u2014 both stick through the rest of the run. Reload mid-thread: collapsed everywhere.\n5. `pnpm --dir frontend test` (403 tests) and `pre-commit run --files $(git ls-files --modified --others --exclude-standard)` \u2014 clean.", "24_collapsible_threads_panel": "**Extends:** [UI/UX Modernization](20_ui_modernization.md)\n\n# Why\n\nThe UI modernization moved threads out of the old 3-panel layout into a left drawer that could be pinned into a docked column. That worked, but it left thread navigation as two different surfaces: an unpinned Radix slide-over controlled by URL state, and a pinned in-layout column rendered through a separate branch. The result was visually modal for something users need constantly, and mechanically fragile around thread selection and the top-bar threads button.\n\nThis change makes thread history part of the workspace chrome. The threads surface is always the same panel: collapsed by default, docked into the content row on desktop, overlaying the content row on smaller screens, and controlled from the top bar. Pinning is now only a persistence preference for \"keep this open\", not a separate rendering mode.\n\n# What the user sees\n\nThe top-bar threads button toggles a left **Threads** panel below the top bar. On desktop, it animates open as a 320px docked column and the chat/workspace split keeps working to its right. On tablet/mobile widths, the same panel overlays the content row with the app scrim and shadow; clicking the scrim closes it while the top bar remains visible and clickable.\n\nThe panel header is identical whether pinned or unpinned: status filter, pin/unpin button, and close button are always present. Pinning keeps the panel open when selecting threads and restores it open on the next visit. Closing from the top-bar toggle, the header X, or the mobile scrim always unpins, because a closed panel cannot also mean \"persistently open\". When unpinned, selecting a thread closes the panel after setting the `threadId`.\n\n# How \u2014 the key architectural choices\n\n**One mounted panel replaces drawer + dock branches.** `HomePageInner` now renders a single `ThreadList` inside an always-present wrapper. The wrapper animates width from `0` to `var(--sidebar-width)` while the inner `aside` keeps a fixed 320px width, so thread-card contents do not reflow mid-animation. The collapsed wrapper is marked `inert`, but stays mounted so the thread list can keep reporting interrupt counts to the top-bar badge.\n\n**Panel open state is local UI state, not URL state.** The old drawer used a `sidebar` query param alongside `threadId`; same-tick `nuqs` updates had already caused selection bugs where one query setter rebuilt from a stale snapshot and clobbered the other. Panel visibility is not valuable as a shareable URL, so `useThreadsPanel` owns `open` locally and only leaves `threadId` in the URL.\n\n**Pinned means \"persistently open\", not \"use a different component\".** `useThreadsPanel` stores the pinned preference in `localStorage` and lazily initializes both `pinned` and `open` from it, so returning users get the panel open on first paint. Closing always clears the preference; pin/unpin flips persistence without changing the current open state.\n\n# Files of interest\n\n| Concern | Path |\n|---|---|\n| Single panel rendering, desktop dock, small-screen scrim | `frontend/src/app/page.tsx` (`HomePageInner`, lines ~41\u2013190) |\n| Open/pinned state machine and persisted preference | `frontend/src/app/hooks/useThreadsPanel.ts` (`useThreadsPanel`, lines ~15\u201356) |\n| Top-bar toggle state + `aria-expanded` / `aria-controls` | `frontend/src/app/components/TopBar.tsx` (lines ~90\u201396) |\n| Shared pin + close header controls | `frontend/src/app/components/ThreadList.tsx` (lines ~249\u2013270) |\n| Removed Radix slide-over wrapper | `frontend/src/app/components/ThreadsDrawer.tsx` |\n| Regression coverage for panel state and header controls | `frontend/src/app/hooks/useThreadsPanel.test.tsx`, `frontend/src/app/components/ThreadList.test.tsx` |\n| Design-system language for `threads-panel` | `frontend/DESIGN.md` |\n\n# Decisions worth remembering\n\n- **The drawer URL was deleted instead of repaired.** The previous bug was not just an implementation mistake; it came from modeling a transient chrome state (`sidebar`) as URL state beside a real navigation state (`threadId`). Keeping only `threadId` in `nuqs` removes the stale-query failure mode and makes the top-bar icon a simple toggle.\n- **Collapsed panels stay mounted.** Conditional unmount would have been simpler, but it would stop `ThreadList` from polling/reporting interrupt counts while closed. `inert` gives the accessibility affordance of a non-interactive collapsed subtree while preserving the data flow that powers the red interrupt badge.\n- **Close is available while pinned.** The prior pinned column hid the X because \"pinned\" was treated as a special docked mode. The new model treats pin as persistence only, so users can always close the panel from the same place; closing also unpins to avoid the contradictory state of \"closed but pinned open\".\n- **Small screens reuse the panel instead of resurrecting a drawer.** The old Radix drawer brought modal behavior, but maintaining a separate mobile surface would recreate the branch split this change removes. The responsive variant is the same DOM with absolute positioning, shadow, and scrim under `lg`.\n\n# Deferred (intentional non-goals for v1)\n\n- **User-resizable thread width.** The panel is fixed at `--sidebar-width` / 320px to keep the chat/workspace split predictable. Revisit only if thread titles or metadata regularly need more horizontal space.\n- **Shareable panel visibility.** URLs continue to represent the active assistant/thread, not whether navigation chrome is open. Revisit only if a real workflow needs links that open with thread history visible.\n- **Formal motion tokens.** The 200ms width and scrim fades live in Tailwind classes, consistent with the existing ad hoc motion noted in `DESIGN.md`.\n\n# How to verify end-to-end\n\n1. `docker compose up -d`; open the frontend host port from `docker ps`.\n2. On desktop width, click the top-bar threads icon: the panel opens below the top bar, pushes the chat/workspace row right, and the button reports expanded state. Click the icon or header X: the panel closes.\n3. Open the panel, click pin, select a thread: the thread loads and the panel stays open. Reload: the panel starts open. Close it: the panel closes and the pinned preference is cleared.\n4. Open the panel unpinned and select a thread: the `threadId` changes and the panel closes after selection.\n5. Narrow below `1024px`: opening the panel overlays the content row with scrim + shadow; clicking the scrim closes it while the top bar remains usable.\n6. Run `pnpm --dir frontend test frontend/src/app/hooks/useThreadsPanel.test.tsx frontend/src/app/components/ThreadList.test.tsx`.", "25_object_storage_artifacts": "**Extends:** [21_own_agent_server](21_own_agent_server.md)\n\n# Why\n\nCloud-deployment step 1. Binary artifacts (uploaded CV/JD files, rendered resume and battlecard PDFs) lived on local disk under `backend/agents/career_agent/`, reachable only because docker-compose bind-mounts the whole repo into *both* the frontend and backend containers \u2014 a shared-disk assumption that cannot deploy anywhere. Byte-moving logic was also triplicated (agent `CompositeBackend`, agent PDF tools writing disk directly, five Next.js `/api/files/*` routes doing raw `node:fs`), and the Next.js routes held the only HTTP path for file bytes. This PRD moves the three binary prefixes (`/upload/`, `/tailored_resume/`, `/interview_battlecard/`) into S3-compatible object storage \u2014 SeaweedFS locally, S3 / GCS / Azure in the cloud via the same client \u2014 with one path\u2194key mapping owned by Python.\n\n# What the user sees\n\nNothing changes in the UI \u2014 workspace listing, PDF preview, upload (composer paperclip + Files button), edit, and delete all behave as before. What's different underneath: files survive in a bucket (named volume locally) instead of the repo tree; uploads no longer materialize under `backend/agents/career_agent/upload/`; and a new SeaweedFS filer UI (`http://localhost:${OBJECT_STORE_UI_LOCAL_PORT}`) lets you eyeball raw objects. Keys are deterministic: `/upload/cv.pdf` \u2194 `users/default/career_agent/upload/cv.pdf`. Deploying to a cloud bucket is an `OBJECT_STORE_*` env change, not a code change.\n\n# How \u2014 the key architectural choices\n\n**A custom deepagents backend (`ObjectStoreBackend`), mounted as `CompositeBackend` routes \u2014 not a FUSE mount or a disk-sync layer.** deepagents ships no S3 backend (the community catalog has only MongoDB), but `BackendProtocol` is the documented extension point and the existing route architecture is exactly the recommended shape, so the change is additive: three routes swap physical stores while `/render_intermediate/`, all Postgres `StoreBackend` routes, and the `execute` shell stay put. FUSE (privileged containers on macOS, flaky subprocess semantics) and write-through disk sync (two sources of truth that drift) were rejected.\n\n**The Python server owns the file HTTP surface, mounted via the `LANGGRAPH_HTTP` custom-app hook \u2014 the five Next.js routes are deleted, not converted.** The \"minimal\" alternative (swap `node:fs` for an S3 SDK inside the Next routes) would have left the storage layer written twice, put credentials in the frontend, and hit Vercel's ~4.5 MB serverless body cap on 10 MB uploads \u2014 all of it redone at deploy time. Instead `backend/agents/files_api.py` (plain Starlette, zero imports from `server/`) serves `/files/{list,read,upload,write,delete}` with the exact response shapes the frontend already consumed, so `FileViewDialog`/`useChat` didn't change; the browser now calls the deployment URL for files exactly as it already did for store/threads/runs. `enable_custom_route_auth` is the ready-made auth hook for multi-user later.\n\n**Rendering became one tool, `render_resume_pdf` (read \u2192 hydrate \u2192 rendercv \u2192 verify \u2192 publish), replacing `prepare_render_settings` + raw `execute`.** rendercv is a subprocess and needs a real filesystem, so
