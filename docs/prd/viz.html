the tool writes a render copy into a throwaway `TemporaryDirectory`, injects the `settings:` block *only there*, and uploads the resulting `.pdf` (plus the `.typ` typesetting intermediate \u2014 `dont_generate_typst: true` breaks PDF output, a rendercv quirk) to the bucket next to the YAML. The stored YAML stays settings-free \u2014 the old flow baked machine-absolute paths into a durable artifact, which breaks re-rendering from any other host. There is deliberately **no** `/render_intermediate/` artifact area (v1 briefly had one; it accumulated PII-bearing render copies in the repo tree). The tool result names only the PDF, so the agent never cites the `.typ`. Single-tool over the previous three-step dance: the agent physically cannot render-and-forget-to-publish, and failures return one stage-named error (`Error (render): \u2026` carries rendercv's output for the fix-YAML-and-retry loop).\n\n# Files of interest\n\n| Concern | Path |\n|---|---|\n| Settings, lazy obstore client, path\u2194key mapping, byte helpers | `backend/agents/career_agent/object_storage.py` |\n| `BackendProtocol` implementation (per-area routes) | `backend/agents/career_agent/object_backend.py` |\n| Files HTTP API (mounted via `LANGGRAPH_HTTP`) | `backend/agents/files_api.py` |\n| Route mounting + tool wiring | `backend/agents/career_agent/agents.py` (routes, `_SUBAGENT_TOOLS`) |\n| `render_resume_pdf` pipeline + YAML auto-repair | `backend/agents/career_agent/tools.py` (`make_render_resume_pdf`, `_normalize_resume_yaml`) |\n| SeaweedFS service + bucket init + backend env | `docker-compose.yml` (`object-store`, `object-store-init`) |\n| Frontend artifact fetch/write via deployment URL | `frontend/src/app/lib/agentFiles.ts` (`filesApiUrl`, `fetchArtifactFiles`) |\n| Virtual-path upload/delete client | `frontend/src/app/lib/uploadFiles.ts` |\n| Contract tests over in-memory store (no emulator) | `backend/tests/career_agent/test_object_backend.py`, `backend/tests/test_files_api.py` |\n\n# Decisions worth remembering\n\n- **SeaweedFS as the local stand-in \u2014 because MinIO and LocalStack both died in 2026.** MinIO's community repo was archived (Apr 2026, source-only, console gutted); LocalStack went closed-source and its free tier loses S3 state on every restart \u2014 disqualifying for a store holding the user's uploads. RustFS (nice console) is still alpha. SeaweedFS: Apache-2.0, one container (`weed server -s3`), persistent volume, filer UI. Without `-s3.config` its auth is disabled, so the `OBJECT_STORE_*` dev creds are accepted-but-not-enforced \u2014 fine on the compose network, real IAM arrives with cloud provisioning.\n- **obstore over fsspec/boto3.** One Rust wheel with zero Python deps (s3fs's aiobotocore pin would fight the boto3 already locked for Bedrock), native S3+GCS+Azure (the user named all three), `MemoryStore` for emulator-free unit tests, `sign()` for future presigned URLs. Gotchas: missing keys raise builtin `FileNotFoundError` (`obstore.exceptions.NotFoundError` is a deprecated alias); `delete()` is idempotent, so the API head-checks to preserve its 404 contract; there is no create-bucket API \u2014 hence the curl-PUT init container (SeaweedFS only auto-creates buckets for authenticated admins).\n- **No Postgres path/URL registry.** The original plan assumed \"Postgres stores file path/url\"; review showed a registry is dual-write liability with no consumer \u2014 the key is a pure function of the virtual path and `ListObjectsV2` is the listing source of truth. The `users/default/` key segment is the multi-user seam: inject a real identity into one mapping function, no key migration.\n- **`OBJECT_STORE_*` is deliberately not `AWS_*`.** `AWS_ACCESS_KEY_ID` etc. are live Bedrock credentials read globally by boto3; pointing them at the emulator would break model calls. Two separate credential planes.\n- **`ObjectStoreBackend` must NOT subclass `SandboxBackendProtocol`, and `write` must refuse overwrite with the framework's exact error literal.** `CompositeBackend.execute` always dispatches to the *default* backend \u2014 a sandbox-flavored route would break the gating. And `tools._upsert` falls back to `edit` only when `write` returns the canonical \"already exists. Read and then make an edit\" message; a paraphrase silently breaks every re-parse/overwrite flow. Both are locked by tests.\n- **Deterministic YAML auto-repair before rendercv (added after dogfooding).** A real run burned 3\u20134 LLM roundtrips on one defect class: unquoted `colon + space` inside a bullet, which YAML parses as a one-pair mapping (\"Input should be a valid string\"). `_normalize_resume_yaml` repairs the mechanically-invertible classes (mid-string colons, trailing colons, bare numbers) in the scratch copy only \u2014 the stored YAML keeps the agent's text, the success message reports `auto-repaired N \u2026` as corrective feedback, and booleans are skipped (`Answer: yes` \u2192 `True` has no faithful inverse). The skill also gained a proactive quoting rule and a \"sweep the whole file for the same pattern\" instruction.\n- **Migration was a one-shot in-container script, not app code.** Six legacy files copied via the same `put_bytes`/`key_for_virtual_path` helpers; old disk copies left in place (gitignored, inert) for the user to delete.\n\n# Deferred (intentional non-goals for v1)\n\n- **Presigned URLs + lazy content fetch.** The workspace still eagerly fetches every file as base64 through the backend on refresh \u2014 same behavior as before, fine locally. Presign (`obstore.sign()`, \u226415 min) plus on-demand reads is the cloud-phase fix; it needs auth to be meaningful.\n- **Auth on `/files/*`.** Single-user posture unchanged; `enable_custom_route_auth` + `LANGGRAPH_AUTH` are the prepared hooks when multi-user lands.\n- **Managed-bucket provisioning** (versioning, SSE, Block Public Access, lifecycle rules, least-priv IAM) \u2014 belongs to cloud infra, not this repo.\n- **Azurite / fake-gcs-server compose profiles.** obstore is the portability layer; add provider-fidelity emulators only when an Azure/GCS target is concrete.\n- **Remote-sandbox renders.** rendercv still runs on whichever process hosts the shell backend (in a throwaway temp dir); moving it into an isolated sandbox is the roadmap's multi-tenant step.\n\n# How to verify end-to-end\n\n1. `docker compose up -d --build` \u2014 `object-store` healthy, `object-store-init` exits 0, bucket visible: `curl -s http://localhost:${OBJECT_STORE_LOCAL_PORT}/next-role-artifacts` returns `ListBucketResult`.\n2. `curl -s \"http://localhost:${LANGGRAPH_LOCAL_PORT}/files/list?prefixes=/upload/\"` \u2014 JSON `{files:[\u2026]}` with virtual paths; `/files/read` on a PDF returns base64, on a YAML returns utf-8; DELETE twice \u2192 200 then 404; `/files/read?path=/processed/x.md` \u2192 403.\n3. UI: upload a PDF from Workspace > Files \u2014 object appears in the bucket, **no file** under `backend/agents/career_agent/upload/`; card preview renders the PDF; delete works (confirm dialog).\n4. Full agent flow (CV + JD \u2192 tailor): the stored `/tailored_resume/<r>/<j>.yaml` has **no `settings:` block**, `.pdf` + `.typ` siblings land in the bucket, nothing is written under `backend/agents/career_agent/`, and the reply cites only the PDF path. A YAML with unquoted mid-string colons renders first try with an `auto-repaired N` note.\n5. `docker compose restart object-store` \u2192 objects persist; `docker compose stop object-store` \u2192 `/files/*` returns in-band 500s, agent tools return `Error (\u2026)` strings; `start` again \u2192 self-heals (~20 s warmup).\n6. `cd backend && uv run pytest` (unit, no emulator needed) and `uv run pytest -m integration` (against compose SeaweedFS); `pnpm --dir frontend test`.", "26_multi_user_auth": "**Extends:** [25_object_storage_artifacts](25_object_storage_artifacts.md), [21_own_agent_server](21_own_agent_server.md)\n\n# Why\n\nNextRole was built for local, single-user, trusted use \u2014 one global data layout, no accounts. Cloud deployment (AWS / Vercel / \u2026) needs real users, each seeing only their own threads, files, and memory. The object-storage PRD deliberately left a `users/default/` key seam for exactly this. This PRD realizes it end to end: accounts (Google + email/password), a JWT the backend verifies on every request, owner-scoped threads/runs/crons enforced in SQL, and per-user store namespaces + object keys \u2014 all **opt-in**, so `docker compose up` stays zero-login.\n\n# What the user sees\n\nNothing changes by default \u2014 with `AUTH_ENABLED` unset the app is exactly as before, no login screen. Flip it on and the app gates behind a `/login` page (Continue-with-Google when configured, plus email/password sign-up/sign-in); a user chip with a sign-out popover joins the top bar. Each user now has a private world: their thread list shows only their threads, uploads and rendered PDFs are theirs alone (two users can both upload `cv.pdf` without colliding), and saved memory/preferences don't bleed across accounts. An unowned resource is **invisible, not forbidden** \u2014 hitting someone else's thread id returns `404`, not `403`.\n\n# How \u2014 the key architectural choices\n\n**Activate the vendored server's dormant custom-auth framework \u2014 don't build a parallel auth layer.** The self-hosted agent server ([PRD 21](21_own_agent_server.md)) already ships the complete LangGraph custom-auth machinery (`@auth.authenticate`, `@auth.on.*` dispatch, filter\u2192proto conversion, the `AuthContext` ContextVar, `merge_auth` injecting the user into the run config) \u2014 it was just wired to `noop`. We wrote the handlers in `backend/agents/auth.py` and set `LANGGRAPH_AUTH`; the platform plumbing came for free. Identity is a Better Auth JWT verified against the frontend's JWKS.\n\n**The load-bearing fix: core-server ignored the authorization filters.** The ops layer *computed* auth filters and shipped them on request protos, but the native `core_server` servicers never read `request.filters` (`grep filters core_server/` \u2192 zero hits) \u2014 so turning auth on would authenticate users yet still serve everyone every row. `server/core_server/_filters.py` closes it: `AuthFilter` protos \u2192 **parameterized** JSONB predicates (values bound via `Jsonb`, never interpolated), wired into every read/write of threads/runs/crons/assistants. Two sites carried the real blast radius: `ThreadsServicerImpl.Stream` (gate ownership *before* subscribing, or any authenticated user streams anyone's live token-by-token events by id \u2014 both v1 `/stream` and v2 `/stream/events` reach it) and `RunsServicerImpl.Create` (enforce `thread_filters`/`assistant_filters` or a run injects into a thread you don't own).\n\n**Better Auth, self-hosted in the Next.js app \u2014 not a managed IdP or Auth.js.** Auth.js/NextAuth entered maintenance mode in Sept 2025 (team folded into Better Auth; new projects pointed there). A managed IdP (Clerk/Auth0) means a vendor, per-MAU cost, and a weak offline local-dev story. Better Auth owns its tables in *our* Postgres, does Google + email/password out of the box, and its JWT plugin (`/api/auth/token` + `/api/auth/jwks`) is a clean bridge to Python verification \u2014 so the architecture stays IdP-agnostic (swap the JWKS issuer later) while working fully offline.\n\n**Dual-mode by absence, and the two storage tiers scope differently on purpose.** With `LANGGRAPH_AUTH` unset every filter clause collapses to `\"\"` and every namespace/key falls back to its single-user form \u2014 byte-for-byte the pre-auth SQL and layout, a hard invariant. Because the backends are import-time singletons (no per-run factory), scoping resolves identity at **call time** from the run config (`backend/agents/career_agent/scope.py`). The KV store *prepends* the identity only when present (`(id, \"career_agent\", area)` vs the original 2-tuple \u2014 no `default` segment, so existing rows stay put); the object store *replaces* `default` in the already-present `users/<scope>/` segment. The frontend keeps sending logical `[\"career_agent\", \u2026]` namespaces and the `@auth.on.store` rewrite prepends identity server-side \u2014 so the FE needed no per-user store logic at all.\n\n# Files of interest\n\n| Concern | Path |\n|---|---|\n| AuthN + authZ handlers (JWKS verify, owner-stamp, store rewrite, default-deny) | `backend/agents/auth.py` |\n| `AuthFilter` proto \u2192 parameterized SQL predicate helper | `backend/server/core_server/_filters.py` |\n| Filter enforcement (incl. `Stream` gate, `Create` filters) | `backend/server/core_server/servicers/{threads,runs,crons,assistants}.py` |\n| Call-time identity + per-tier namespace/key scoping | `backend/agents/career_agent/scope.py` |\n| Object-key builders parameterized by scope | `backend/agents/career_agent/object_storage.py` |\n| Files API: request-user scope + 401 guard | `backend/agents/files_api.py` (`_scope`, `_authenticated`) |\n| `REQUIRE_AUTH` boot guard | `backend/server/api/config/__init__.py` |\n| Better Auth server/client, env gates, route, token plumbing | `frontend/src/lib/auth/{server,client,enabled,token}.ts`, `frontend/src/app/api/auth/[...all]/route.ts` |\n| Login page, session gate, user menu | `frontend/src/app/login/page.tsx`, `frontend/src/app/components/auth/{SessionGate,UserMenu}.tsx` |\n| Bearer injection on the SDK clients + raw file fetches | `frontend/src/providers/ClientProvider.tsx`, `frontend/src/app/hooks/useThreads.ts`, `frontend/src/app/lib/{agentFiles,uploadFiles}.ts` |\n| URL-override pin in auth mode | `frontend/src/lib/config.ts` (`getConfig`) |\n| Compose + env wiring; cloud hardening runbook | `docker-compose.yml`, `.env.example` |\n\n# Decisions worth remembering\n\n- **404, never 403, for unowned resources.** Filters narrow the `WHERE` clause, so a resource you don't own is indistinguishable from a missing one \u2014 no existence oracle. `403` is reserved for handler-level denies (assistant writes); `401` for a missing/invalid token.\n- **Pin the JWT algorithm to EdDSA; read `authorization`, not `request`.** Accepting the token header's `alg` would let a caller downgrade verification. And `@auth.authenticate` takes the `authorization` param (not `request: Request`) because the custom-auth backend raises on a `request` param for WebSocket scopes \u2014 the same handler must serve HTTP and WS.\n- **The `@auth.on.store` rewrite makes the frontend oblivious.** Because the FE reconstructs store paths from `item.key` (not the returned namespace) and the server prepends identity on both read and write, per-user KV isolation needed **zero** frontend store changes \u2014 a much smaller blast radius than threading identity through `agentFiles.ts`.\n- **Browsers can't set an `Authorization` header on a WebSocket handshake.** So streaming rides the SSE POST transport (which carries the bearer); the WS route stays for non-browser clients. Verified the `@langchain/react` v2 default resolves to SSE.\n- **Start fresh on existing local data (user's call).** No adoption/migration script. The pre-auth global rows stay under `career_agent.*` / `users/default/\u2026` \u2014 reachable in zero-login mode, invisible once you log in \u2014 and new per-user rows sit alongside under `<id>.career_agent.*` / `users/<id>/\u2026`. Confirmed the legacy row is untouched after enabling auth.\n- **Pin `deploymentUrl`/`assistantId` to env in auth mode.** `getConfig()` ignores a stored `deploymentUrl` override when auth is on: otherwise injected page script could point the SDK client (and its bearer) at an attacker origin. Model/UI prefs stay browser-local.\n- **Close the Studio backdoors explicitly.** `disable_studio_auth: true` in `LANGGRAPH_AUTH`, and never `LANGSMITH_LANGGRAPH_API_VARIANT=local_dev` in production \u2014 both otherwise grant an unauthenticated Studio user.\n- **`_filters.py` is the one server-package exception to \"no mirrored unit tests.\"** It's pure and injection-safety-critical, so it's unit-tested (`tests/server/test_filters.py`); this required adding `.` to pytest `pythonpath` so `server.*` imports resolve in tests.\n\n# Deferred (intentional non-goals for v1)\n\n- **Shell-execution sandboxing.** Multi-user mode isolates *data*, but `VirtualPathShellBackend` still runs renders via `subprocess` on the host. This \u2014 not auth \u2014 is the gate before opening signup to *untrusted* users; it's the roadmap's remote-sandbox step.\n- **Per-resource authz for MCP (`/mcp`) and A2A (`/a2a`).** They're authentication-gated only today; disable them in a shared deployment until scoping is wired into those handlers.\n- **Data adoption tooling.** Deliberately skipped per the start-fresh decision; a one-shot script (stamp owner metadata, re-key store prefixes, copy `users/default/*` objects) is the path if a real user's existing history ever needs to move.\n- **Managed-bucket provisioning, presigned delivery** (carried from [PRD 25](25_object_storage_artifacts.md)), **org/teams RBAC, admin UI, API keys for MCP clients, per-user quotas/rate limits (LLM cost!).** Product/infra surface beyond single-user-becomes-multi-user.\n\n# How to verify end-to-end\n\n1. **Zero-login unchanged**: with `AUTH_ENABLED=false` and no `LANGGRAPH_AUTH`, `docker compose up -d`; app loads with no login redirect, `GET /api/auth/get-session` \u2192 404, unauthenticated `POST /threads/search` and `GET /files/list` \u2192 200.\n2. **Enable auth**: set `AUTH_ENABLED=true` + `BETTER_AUTH_SECRET`, run the Better Auth migration (`pnpm --dir frontend dlx @better-auth/cli migrate --config src/lib/auth/server.ts`), set `LANGGRAPH_AUTH`, restart. `/` redirects to `/login`; sign up \u2192 app; `/api/auth/jwks` serves an Ed25519 key; decode `/api/auth/token` \u2192 `sub`/`iss`/`aud`/15-min `exp`.\n3. **Two-user isolation** (tokens A, B): A creates a thread; B \u2192 `404` on that thread's Get/Search/Patch/Delete/state/history, run Get/Delete, run-Create-into-A's-thread, and `/stream` (404 event) / `/stream/events` (consumer dies, no heartbeat); B's `threads/search` returns 0, A's returns 1. Assistants: both read (1 visible), B create/patch \u2192 `403`. Files: unauth `401`; A and B both upload `cv.pdf`, each reads only their own bytes, keys are `users/<A>/\u2026` vs `users/<B>/\u2026` (SeaweedFS filer). Store: both `PUT` `[\"career_agent\",\"memory\"]/preferences.md`; a `store`-table query shows `<A>.career_agent.memory` vs `<B>.career_agent.memory`, plus the untouched legacy `career_agent.memory`.\n4. **Boot guard**: `REQUIRE_AUTH=true` with `LANGGRAPH_AUTH` unset \u2192 backend refuses to start.\n5. **Tests**: `cd backend && uv run pytest` (incl. `tests/server/test_filters.py`, `tests/career_agent/test_scope.py`, `tests/test_files_api_auth.py`); `pnpm --dir frontend test` (auth components, token plumbing, config pin).", "27_first_run_upload_guidance": "**Extends:** [File Upload](01_file_upload.md)\n\n# Why\n\nNextRole only becomes useful once the user uploads a resume and a job description, but nothing in the UI drove that first action: the chat empty state offered suggestion chips, the hero subhead *said* \"Drop in your resume and a job post\" without an affordance, and the only upload control was a small ghost button in the Files card header. New users read the chips, typed a prompt, and got generic output because the agent had no documents.\n\nThe original idea was an animated arrow pointing from the chat to the Upload button. UX research (NN/g on attention animation, Appcues/Userpilot onboarding studies, empty-state literature) consistently rates coach marks/arrows as skipped and distracting; the reliable pattern for a critical first action is an actionable empty state \u2014 put the action where the user is already looking \u2014 plus at most a subtle pulsing hotspot on the real control. This feature ships that package instead of the arrow.\n\n# What the user sees\n\nWhile the user has **zero uploaded files** (paths under `/upload/`), the chat hero shows a dashed **upload card** between the subhead and the suggestion chips (\"Add your resume or a job description \u2014 click to browse or drop files\"). Click opens the picker; drag-and-drop uploads in place, filtering to PDF/DOC/DOCX/TXT/MD and toasting skipped files. The Files card shows a real empty state (icon, \"No files yet\", one line of copy, a primary **Upload files** button) instead of the old text-only line.\n\nOnce files exist, the hero card and empty state retire, and a dashed **Upload files** tile renders as the last item in the file grid \u2014 the persistent affordance for uploads #2+ (drag-and-drop works there too; the label swaps to \"Drop to upload\" while dragging). The Files header keeps an outlined **Upload** button in all states, carrying a small accent **pulse dot** until the user clicks any panel upload control. Every affordance uses the \"Upload\" verb \u2014 one action, one name. Deliberately absent: no arrow, no coach-mark overlay, no tour library, and the composer paperclip stays disabled (`COMPOSER_ATTACH_ENABLED`) \u2014 uploads live in the Workspace.\n\n# How \u2014 the key architectural choices\n\n**Guidance keys off uploads, not files, behind a `filesReady` gate.** `files` in `useChat` merges agent-generated state/store/artifact files, so \"has files\" is the wrong signal \u2014 `useUploadCue` filters for the `/upload/` prefix. The first `refreshFiles` runs before the assistant resolves (`graphId` null), skipping the artifact list entirely, so a naive \"fetch finished\" flag would flash the CTA at returning users; `filesReady` only flips after a fetch that ran with a non-null `graphId` (guidance appears ~1s after first paint \u2014 by design, never a flash-then-remove).\n\n**One upload path, shared as hooks.** `FilesSection.handleSelect` and `ChatInterface.handleAttach` were near-identical copies; both now consume `useFileUpload` (upload \u2192 toasts \u2192 `appendUploadNote` \u2192 `refreshFiles`), and the drop handling (drag state, extension filter, skipped-toast) lives in `useUploadDrop`, shared by the hero card and the grid tile so the two drop targets cannot drift.\n\n**The dot dismisses on click, not on upload.** The first cut auto-retired the dot when uploads appeared; owner testing immediately hit the gap \u2014 a user whose first upload came from the hero card never learned where the panel Upload button is, and after upload #1 all guidance vanished at once. The dot now persists (across sessions, through uploads) until the user clicks a panel upload trigger (header button, empty-state CTA, tile) \u2014 cancelling the picker still counts. Dismissal is `localStorage` `nr-upload-cue-dismissed-v2`; the key was bumped because v1 values were written under the old \"uploaded once\" meaning.\n\n# Files of interest\n\n| Concern | Path |\n|---|---|\n| Shared upload action + drag-and-drop hooks | `frontend/src/app/hooks/useFileUpload.ts` (`useFileUpload`, `useUploadDrop`) |\n| Cue gating and click-to-dismiss persistence | `frontend/src/app/hooks/useUploadCue.ts` |\n| `filesReady` signal (graphId-gated) | `frontend/src/app/hooks/useChat.ts` (lines ~119\u2013123, ~170) |\n| Hero upload card + shared hidden input | `frontend/src/app/components/ChatInterface.tsx` (empty-state block) |\n| Files empty state, outlined Upload button, pulse dot | `frontend/src/app/components/workspace/FilesSection.tsx` |\n| Upload tile in the file grid (`onAddFiles`/`onDropFiles`) | `frontend/src/app/components/TasksFilesSidebar.tsx` (`FilesPopover`) |\n| `UPLOAD_ACCEPT` + `isAcceptedUploadName` drop filter | `frontend/src/app/lib/uploadFiles.ts` |\n| Design language: `upload-dropzone`, `files-empty-state`, `file-add-tile`, `upload-cue-dot` | `frontend/DESIGN.md` |\n| Regression coverage | `frontend/src/app/hooks/useFileUpload.test.tsx`, `useUploadCue.test.tsx`, `frontend/src/app/components/ChatInterface.test.tsx`, `TasksFilesSidebar.test.tsx` |\n\n# Decisions worth remembering\n\n- **The arrow was rejected, not deferred.** A cross-panel animated pointer is the coach-mark antipattern (skipped, naggy, fragile across the resizable panel layout). If guidance ever feels insufficient, strengthen the actionable surfaces \u2014 do not add arrows or a tour library; `DESIGN.md` records this as a hard rule on `upload-cue-dot`.\n- **Empty states are permanent UX; only the dot is dismissible.** The hero card and Files empty state render whenever the user has zero uploads \u2014 deleting every file brings them back. The dot alone is persisted-dismissed, and deleting files must not resurrect it.\n- **The tile answers \"where do the next files go\".** After upload #1 the empty states retire, and the owner's testing showed the ghost header button alone read as hidden. The in-grid tile (Drive/Dropbox pattern) is the persistent in-content affordance; the header button (upgraded ghost \u2192 outline) stays as the card-level command \u2014 the only entry when the card is collapsed, and the dot's anchor. Two entry points are intentional redundancy (NN/g multiple-entry-points), but they must share one label verb: \"Upload\".\n- **Composer paperclip stayed disabled.** The hero card reuses the same hidden input the paperclip would use (moved out of the `COMPOSER_ATTACH_ENABLED` gate), so flipping the flag back on remains a one-line change without a second upload path.\n\n# Deferred (intentional non-goals for v1)\n\n- **Whole-panel or window-level drop targets.** Drag-and-drop is scoped to the hero card and the tile; a global handler risks hijacking drops meant for the browser and needs drag-enter choreography. Revisit if users demonstrably drop files onto the file list itself.\n- **Per-user dismissal.** The dot's dismissal is per browser (`localStorage`), while `hasUploads` is per-user server truth. A second user on the same browser misses the dot but still gets the non-dismissible empty states. Suffix the key with a user id only if that becomes a real complaint.\n- **Resume-vs-JD completeness guidance** (e.g. \"you added a resume \u2014 now add the job description\"). Needs content-type detection of uploads; the agent already asks for what it's missing.\n\n# How to verify end-to-end\n\n1. `docker compose up -d`; open the frontend port from `docker ps`. With auth enabled, sign up a throwaway user (fresh per-user state).\n2. Fresh user: hero shows the dashed upload card between subhead and chips; Files card shows the empty-state block; the outlined Upload button carries a pulsing accent dot (static under `prefers-reduced-motion`).\n3. Upload via the hero card (click or drop a PDF): card and empty state retire, the file card appears with the **Upload files** tile beside it, the composer pre-fills \"Uploaded: \u2026\", and the dot **remains**.\n4. Drop a `.pdf` + `.exe` together on the tile: the PDF uploads, a toast reports one skipped unsupported file.\n5. Click any panel upload control, then cancel the picker: the dot disappears and stays gone across reloads (`localStorage` `nr-upload-cue-dismissed-v2` = `1`). Delete all files: empty states return; the dot does not.\n6. Hard-reload with uploads present: no CTA flash at first paint. Run `pnpm --dir frontend test`.", "README": "# What this folder is\n\nOne PRD per shipped feature \u2014 the *why*, the user-visible surface, the key architectural choices, and the decisions the code can't explain. The folder is a knowledge bundle in the [Open Knowledge Format (OKF)](https://github.com/GoogleCloudPlatform/knowledge-catalog/tree/main/okf): every document carries YAML frontmatter (`type`, `title`, `description`, `tags`, `timestamp`, plus `status`/`scope`/`version`), and the relative links between documents form a graph of how features extend and supersede each other.\n\nTwo audiences, two entry points:\n\n- **AI coding tools** read with progressive disclosure: start at `index.md` (one line per PRD \u2014 title + description), open only the PRDs relevant to the task, and follow their `Extends:`/`Supersedes:` links for lineage. Never bulk-read the folder.\n- **Humans** open the committed [`viz.html`](viz.html) \u2014 an interactive graph of the whole bundle.\n\nGood starting points for the two halves of the product: [Career-Agent Workflow Orchestration](08_agent_workflow.md) (the agent's 5-stage spine) and [UI/UX Modernization](20_ui_modernization.md) (the frontend's design system).\n\n# Visualize the graph\n\nOpen `docs/prd/viz.html` in a browser \u2014 it's committed, self-contained, and needs only internet access (Cytoscape.js and marked load from a CDN at view time). After adding or editing PRDs, regenerate it:\n\n```bash\n# From the repo root \u2014 needs only uv (installs the OKF tooling on first run):\nuvx --from \"git+https://github.com/GoogleCloudPlatform/knowledge-catalog.git#subdirectory=okf\" \\\n  reference-agent visualize --bundle docs/prd --name \"NextRole PRDs\"\n```\n\nstderr reports `Wrote N concept(s), M edge(s), \u2026 \u2192 docs/prd/viz.html` \u2014 N should equal the PRD count plus one (this guide). If you have a local clone of the [knowledge-catalog repo](https://github.com/GoogleCloudPlatform/knowledge-catalog), `uvx --from /path/to/knowledge-catalog/okf reference-agent visualize \u2026` works offline.\n\n![NextRole PRD knowledge graph \u2014 feature PRDs and their extends/supersedes lineage in the OKF viewer](../images/next-role-prd-graph.png)\n\n# How to read the graph\n\n- **Nodes** are PRDs (gray) plus this guide (green). Node size tracks document length.\n- **Arrows point at the PRD being built upon** \u2014 an edge exists for every `Extends:`/`Supersedes:` relation and every inline PRD mention.\n- **Click a node** for the detail pane: description, tags, the rendered document, and a \"Cited by\" list of every PRD that links back to it.\n- **Search** matches title, file id, and tags (try `streaming` or `superseded`); the type filter and layout switcher live in the toolbar.\n- Superseded PRDs carry a `superseded` / `partially-superseded` tag and open with a banner naming their successor. Two nodes (Print-as-PDF, Frontend Test Suite) are genuinely standalone \u2014 isolated nodes are honest, not missing links.\n\n# The format contract\n\n- **Filenames**: `NN_snake_case.md`, zero-padded, next number in sequence.\n- **Frontmatter** (order: `type, title, description, tags, timestamp`, then extensions): `type: PRD` plain; `title`/`description`/`status`/`scope` always double-quoted; `timestamp` single-quoted ISO 8601 with offset; `tags` a flow list of lowercase words; `version` plain (`v1`, `v2`, \u2026).\n- **Relations line** at the top of the body where applicable: `**Extends:** [Title](NN_feature.md)` / `**Supersedes:** \u2026` \u2014 targets are *relative* links, which is what draws the graph edges. Links out of this folder (repo docs, GitHub URLs) are fine but never become edges.\n- **Body sections at H1**, in the write-prd template order. No H1 title in the body \u2014 the title lives in frontmatter.\n- **This folder is bundle-only.** Any stray `.md` dropped here becomes a graph node. Never create `log.md` here, and never add frontmatter to `index.md` \u2014 both names are reserved by OKF. Example links inside code fences use placeholder targets (like `NN_feature.md` above) because the edge scanner reads fences too.\n\n# Adding or updating a PRD\n\n1. Run `/write-prd` \u2014 the skill emits this format and proposes the next `NN_` filename.\n2. Add the PRD's line to `index.md` (title-alphabetical within the `# PRD` section, description copied from frontmatter). To rebuild the index from scratch instead:\n\n   ```bash\n   uvx --from \"git+https://github.com/GoogleCloudPlatform/knowledge-catalog.git#subdirectory=okf\" \\\n     python -c \"from pathlib import Path; from reference_agent.bundle.index import regenerate_indexes; regenerate_indexes(Path('docs/prd'))\"\n   ```\n\n3. Regenerate `viz.html` (command above) \u2014 expect the concept count to go up by one.\n4. Superseding an old PRD? Give the new one a `**Supersedes:**` line, and flip the old one's `status`, add the `superseded` tag, and open its body with a banner blockquote \u2014 `16_disable_subagent_streaming.md` / `18_langchain_react_migration.md` are the worked pair."}, "types": ["PRD", "Reference"], "palette": {"BigQuery Dataset": "#8b5cf6", "BigQuery Table": "#3b82f6", "Reference": "#10b981"}};
</script>
<script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} â€” OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  // Populate type filter
  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  // Build reverse-link index for backlinks
  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  // Look up node label/type by id
  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      {
        selector: "node",
        style: {
          "background-color": "data(color)",
          "label": "data(label)",
          "color": "#0f172a",
          "font-size": 11,
          "text-valign": "bottom",
          "text-margin-y": 4,
          "text-wrap": "wrap",
          "text-max-width": 120,
          "width": "data(size)",
          "height": "data(size)",
          "border-width": 1,
          "border-color": "#0f172a",
        },
      },
      {
        selector: "node:selected",
        style: {
          "border-width": 3,
          "border-color": "#f59e0b",
        },
      },
      {
        selector: "edge",
        style: {
          "width": 1.5,
          "line-color": "#cbd5e1",
          "target-arrow-color": "#cbd5e1",
          "target-arrow-shape": "triangle",
          "curve-style": "bezier",
          "arrow-scale": 0.9,
        },
      },
      {
        selector: "edge:selected",
        style: {
          "line-color": "#f59e0b",
          "target-arrow-color": "#f59e0b",
          "width": 2.5,
        },
      },
      {
        selector: ".dim",
        style: { "opacity": 0.15 },
      },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => {
    if (evt.target === cy) clearSelection();
  });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) {
      cy.elements().removeClass("dim");
      return;
    }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay =
        (d.label || "").toLowerCase() + " " +
        d.id.toLowerCase() + " " +
        (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      const src = edge.source();
      const tgt = edge.target();
      edge.toggleClass("dim", src.hasClass("dim") || tgt.hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) {
      cy.elements().removeClass("dim");
      return;
    }
    cy.nodes().forEach((n) => {
      n.toggleClass("dim", n.data("type") !== t);
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "â€”";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "â€”";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "â€”";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = nodeIndex[src]?.label || src;
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }

    cy.animate({ center: { eles: node }, zoom: Math.max(cy.zoom(), 1.0) }, { duration: 200 });
  }

  function rewriteInternalLinks(root) {
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.startsWith("/") && href.endsWith(".md")) {
        const target = href.slice(1, -3);
        if (nodeIndex[target]) {
          a.className = "internal";
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => {
            e.preventDefault();
            showDetail(target);
          });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  // Auto-show the first node (a dataset if available, else first concept)
  const initial =
    bundle.nodes.find((n) => n.data.type === "BigQuery Dataset") ||
    bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();

</script>
</body>
</html>
