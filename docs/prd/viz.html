<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>OKF Bundle Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  font-size: 14px;
  color: #0f172a;
  background: #f8fafc;
  display: flex;
  flex-direction: column;
  height: 100vh;
}
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: #fff;
  border-bottom: 1px solid #e2e8f0;
  flex-shrink: 0;
}
.title strong { font-size: 16px; margin-right: 8px; }
.muted { color: #64748b; font-size: 12px; }
.controls { display: flex; gap: 8px; }
.controls input, .controls select, .controls button {
  font-size: 13px;
  padding: 5px 8px;
  border: 1px solid #cbd5e1;
  border-radius: 4px;
  background: #fff;
}
.controls input { width: 220px; }
.controls button { cursor: pointer; background: #f1f5f9; }
.controls button:hover { background: #e2e8f0; }

main {
  display: flex;
  flex: 1;
  min-height: 0;
}
#graph {
  flex: 1 1 60%;
  background: #fff;
  border-right: 1px solid #e2e8f0;
  min-width: 0;
  position: relative;
}
#detail {
  flex: 0 0 40%;
  overflow-y: auto;
  padding: 18px 22px;
  background: #fff;
}
#detail-empty {
  text-align: center;
  margin-top: 40px;
}

.detail-header { margin-bottom: 12px; }
.detail-header h1 {
  font-size: 18px;
  margin: 4px 0 2px;
  font-weight: 600;
}
.type-chip {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  color: #fff;
  background: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
dl.frontmatter {
  display: grid;
  grid-template-columns: 90px 1fr;
  row-gap: 4px;
  column-gap: 12px;
  margin: 8px 0 12px;
  font-size: 13px;
}
dl.frontmatter dt {
  color: #64748b;
  font-weight: 500;
}
dl.frontmatter dd { margin: 0; }
dl.frontmatter a { color: #2563eb; word-break: break-all; }

.tag {
  display: inline-block;
  padding: 1px 6px;
  margin: 0 4px 2px 0;
  border-radius: 4px;
  background: #f1f5f9;
  color: #475569;
  font-size: 11px;
}

hr { border: none; border-top: 1px solid #e2e8f0; margin: 14px 0; }

#detail-body { font-size: 13px; line-height: 1.55; }
#detail-body h1 {
  font-size: 16px; margin: 18px 0 6px;
  padding-bottom: 4px; border-bottom: 1px solid #e2e8f0;
}
#detail-body h2 { font-size: 14px; margin: 14px 0 4px; }
#detail-body h3 { font-size: 13px; margin: 12px 0 4px; }
#detail-body p { margin: 6px 0; }
#detail-body code {
  background: #f1f5f9;
  padding: 1px 4px;
  border-radius: 3px;
  font-size: 12px;
  font-family: ui-monospace, "SF Mono", Consolas, monospace;
}
#detail-body pre {
  background: #0f172a;
  color: #e2e8f0;
  padding: 10px 12px;
  border-radius: 6px;
  overflow-x: auto;
  font-size: 12px;
}
#detail-body pre code { background: transparent; color: inherit; padding: 0; }
#detail-body ul, #detail-body ol { padding-left: 22px; margin: 6px 0; }
#detail-body li { margin: 2px 0; }
#detail-body table { border-collapse: collapse; margin: 8px 0; }
#detail-body th, #detail-body td {
  border: 1px solid #e2e8f0; padding: 4px 8px; font-size: 12px;
}
#detail-body a.internal { color: #2563eb; cursor: pointer; }
#detail-body a.external { color: #2563eb; }

#detail-backlinks { margin-top: 18px; }
#detail-backlinks h2 { font-size: 13px; color: #64748b; margin-bottom: 6px; }
#detail-backlinks ul { padding-left: 18px; }
#detail-backlinks a { color: #2563eb; cursor: pointer; }

</style>
</head>
<body>
<header>
  <div class="title">
    <strong id="bundle-name"></strong>
    <span class="muted">OKF bundle</span>
  </div>
  <div class="controls">
    <input id="search" type="search" placeholder="Search title / id / tag">
    <select id="filter-type">
      <option value="">All types</option>
    </select>
    <select id="layout">
      <option value="cose">cose (force)</option>
      <option value="concentric">concentric</option>
      <option value="breadthfirst">breadth-first</option>
      <option value="circle">circle</option>
      <option value="grid">grid</option>
    </select>
    <button id="reset">Reset view</button>
  </div>
</header>

<main>
  <section id="graph"></section>
  <section id="detail">
    <div id="detail-empty" class="muted">Click a node to see its details.</div>
    <article id="detail-content" hidden>
      <header class="detail-header">
        <span class="type-chip" id="detail-type"></span>
        <h1 id="detail-title"></h1>
        <div class="muted" id="detail-id"></div>
      </header>
      <dl class="frontmatter">
        <dt>Description</dt><dd id="detail-description"></dd>
        <dt>Resource</dt><dd id="detail-resource"></dd>
        <dt>Tags</dt><dd id="detail-tags"></dd>
      </dl>
      <hr>
      <div id="detail-body"></div>
      <section id="detail-backlinks" hidden>
        <h2>Cited by</h2>
        <ul id="backlinks-list"></ul>
      </section>
    </article>
  </section>
</main>

 "tags": ["frontend", "ui"], "color": "#94a3b8", "size": 82}}, {"data": {"id": "24_collapsible_threads_panel", "label": "Collapsible Threads Panel", "type": "PRD", "description": "One always-mounted Threads panel \u2014 docked on desktop, overlay on mobile \u2014 replaces the drawer/dock split; pinning is just persistence.", "resource": "", "tags": ["frontend", "ui"], "color": "#94a3b8", "size": 63}}, {"data": {"id": "25_object_storage_artifacts", "label": "Object Storage for Binary Artifacts", "type": "PRD", "description": "Move binary artifacts (uploads, PDFs) into S3-compatible object storage \u2014 SeaweedFS locally \u2014 behind an ObjectStoreBackend and a Python files API.", "resource": "", "tags": ["backend", "storage", "files"], "color": "#94a3b8", "size": 83}}, {"data": {"id": "26_multi_user_auth", "label": "Multi-User Authentication & Per-User Isolation", "type": "PRD", "description": "Opt-in accounts (Google + email/password) with JWT-verified, owner-scoped threads, files, and memory \u2014 zero-login mode stays byte-identical.", "resource": "", "tags": ["backend", "frontend", "auth", "storage"], "color": "#94a3b8", "size": 83}}, {"data": {"id": "27_first_run_upload_guidance", "label": "First-Run Upload Guidance", "type": "PRD", "description": "Actionable empty states, an in-grid upload tile, and a dismissible pulse cue drive the critical first upload \u2014 no coach-mark arrows.", "resource": "", "tags": ["frontend", "ui", "files"], "color": "#94a3b8", "size": 70}}, {"data": {"id": "README", "label": "PRD Bundle Guide", "type": "Reference", "description": "How this folder works: an OKF knowledge bundle of per-feature PRDs \u2014 AI tools start at index.md, humans open viz.html.", "resource": "", "tags": ["guide", "docs"], "color": "#10b981", "size": 54}}], "edges": [{"data": {"id": "03_jd_url_extraction__02_document_processing", "source": "03_jd_url_extraction", "target": "02_document_processing"}}, {"data": {"id": "04_initialize_subagents__07_tailored_r "20_ui_modernization"}}, {"data": {"id": "24_collapsible_threads_panel__20_ui_modernization", "source": "24_collapsible_threads_panel", "target": "20_ui_modernization"}}, {"data": {"id": "25_object_storage_artifacts__21_own_agent_server", "source": "25_object_storage_artifacts", "target": "21_own_agent_server"}}, {"data": {"id": "26_multi_user_auth__25_object_storage_artifacts", "source": "26_multi_user_auth", "target": "25_object_storage_artifacts"}}, {"data": {"id": "26_multi_user_auth__21_own_agent_server", "source": "26_multi_user_auth", "target": "21_own_agent_server"}}, {"data": {"id": "27_first_run_upload_guidance__01_file_upload", "source": "27_first_run_upload_guidance", "target": "01_file_upload"}}, {"data": {"id": "README__08_agent_workflow", "source": "README", "target": "08_agent_workflow"}}, {"data": {"id": "README__20_ui_modernization", "source": "README", "target": "20_ui_modernization"}}], "bodies": {"01_file_upload": "# Why\n\nThe career agent's flow (`backend/app/career_agent/README.md`) starts with the user uploading a CV and optional JD into `upload/`. Without this entry point, nothing else (process \u2192 research \u2192 custom resume \u2192 interview prep) can run. This is the first user-facing feature on the agent.\n\n# What the user sees\n\n**One upload surface: the Upload button in Workspace > Files** (`FilesSection.tsx`). The Files section is always visible (even empty) so the affordance is discoverable. After a successful upload, an `Uploaded: <names>\\n` note is appended into the chat composer with the cursor parked on a fresh line \u2014 so the user can immediately type their instruction and Send.\n\nAccepted: `.pdf`, `.doc`, `.docx`, `.txt`, `.md`. Max 10 MB each. Re-uploading the same filename overwrites. Files appear in the Files grid; clicking opens a preview dialog (PDF via `<iframe>`, DOCX via `mammoth`, text/markdown rendered, `.doc` falls through to \"Use Download\").\n\n**No paperclip in the chat composer.** A paperclip there carries strong industry baggage (\"attach to this message\") that doesn't match our model (persistent files in the agent's filesystem). We deliberately route all uploads through the Workspace so the mental model stays clean: *files live in the workspace, messages live in the chat*. The infrastructure (`uploadAgentFiles`, `appendUploadNote`, the upload route) is unchanged \u2014 re-introducing a chat-side surface later is a small JSX add.\n\n**Deletion** (also v1) has two surfaces with shared confirmation:\n\n1. **Hover-revealed trash icon** on each file card \u2014 primary path, single click \u2192 confirm.\n2. **Delete button in the preview dialog header** \u2014 for when the user is already inspecting and decides to remove.\n\nBoth open the same `Delete file?` confirmation (filename in mono, destructive-styled Delete button). No undo-toast pattern; the confirm step is the only friction. The dialog is reused (`@radix-ui/react-dialog` via `components/ui/dialog.tsx`) \u2014 no new primitive added.\n\n# How \u2014 the key architectural choice\n\n**The frontend writes directly to the agent's on-disk path; no Python HTTP endpoint exists.**\n\n`docker-compose.yml` already mounts the entire repo into the frontend container (`.:/deps/next-role`), so a Next.js API route running in the FE container can `fs.writeFile` to `backend/app/career_agent/upload/<filename>`. The agent's `FilesystemBackend(root_dir=CAREER_AGENT_DIR)` (in `agents.py`) reads the same path on its next tool call. No LangGraph custom routes, no FastAPI sibling, no PDF parser shipped in v1.\n\nThe path allowlist that gates writes lives in `frontend/src/app/config/agentFiles.ts` under `AGENT_FILE_SOURCES.career_agent.disk` \u2014 the existing `resolveSafe()` in `frontend/src/app/api/files/_lib.ts` enforces it.\n\n# Files of interest\n\n| Concern | Path |\n|---|---|\n| Upload API route (multipart POST) | `frontend/src/app/api/files/upload/route.ts` |\n| Delete API route (DELETE) | `frontend/src/app/api/files/delete/route.ts` |\n| Shared client helpers (`uploadAgentFiles`, `deleteAgentFile`) | `frontend/src/app/lib/uploadFiles.ts` |\n| Disk allowlist for `career_agent` | `frontend/src/app/config/agentFiles.ts` |\n| Workspace upload button + handler | `frontend/src/app/components/workspace/FilesSection.tsx` |\n| Composer focus signal (`focusComposerNonce`) consumer | `frontend/src/app/components/ChatInterface.tsx` |\n| File grid + trash icon + confirm dialog | `frontend/src/app/components/TasksFilesSidebar.tsx` (`FilesPopover`) |\n| Preview rendering (PDF/DOCX/MD/text) + Delete button | `frontend/src/app/components/FileViewDialog.tsx` |\n| `removeFile` callback (resolves virtual \u2192 disk path) | `frontend/src/app/hooks/useChat.ts` |\n| Agent's filesystem-backed root | `backend/app/career_agent/agents.py` (CompositeBackend default) |\n| Privacy-gated gitignore | `backend/.gitignore` (free-floating `upload/`, etc.) |\n\n# Decisions worth remembering\n\n- **Global file scoping**, not per-thread \u2014 uploads land at `upload/<filename>` flat. Matches the README, simpler for a solo user. Revisit if multi-thread workflows emerge.\n- **No backend HTTP endpoint** \u2014 would need a custom langgraph-api route or a sibling FastAPI app; not justified when the bind-mount path already works.\n- **Snake_case directory convention** \u2014 output dirs use `custom_resume/`, `interview_prep/`, etc., matching the routes already declared in `agents.py`. Existing skills dirs (`skills/custom-resume/`, `skills/interview-prep/`) are inputs, left as-is.\n- **PII never goes to git** \u2014 `backend/.gitignore` blocks `upload/`, `research/`, `custom_resume/`, `interview_prep/`, `interview_cheat_sheet/`. Verify empirically with `git add -A --dry-run` after any rule change.\n- **Mammoth for DOCX preview** \u2014 runs in browser via dynamic import. Types stub at `frontend/src/types/mammoth.d.ts` since the package ships none.\n- **No chat paperclip** \u2014 see \"What the user sees\" above. Industry pattern (paperclip = ephemeral attachment for one turn) doesn't match our model (persistent agent filesystem). Workspace is the canonical entry point.\n\n# Deferred (intentional non-goals for v1)\n\n- **Document processing** \u2014 extracting text from PDF/DOCX into `/processed/` is step 2 of the agent flow, a separate feature. v1 only stores raw bytes.\n- **`.doc` (legacy Word) preview** \u2014 no good in-browser parser; falls back to download.\n- **Per-thread upload scoping** \u2014 see decisions above.\n- **Drag-and-drop** \u2014 only file picker for v1.\n\n# How to verify end-to-end\n\n1. `docker compose up -d` and grab the frontend host port from `docker ps`.\n2. Open the UI, upload a PDF and a DOCX via either surface, watch toast + file appearing in Files.\n3. From the host: `ls backend/app/career_agent/upload/` shows the bytes.\n4. In chat, ask the agent `List the files in /upload/` \u2014 its `ls` tool should return them.\n5. `git add -A --dry-run backend/app/career_agent/` should stage nothing under `upload/`.", "02_document_processing": "# Why\n\nFile Upload (v1) lets the user drop CVs/JDs onto disk, but the agent only sees filenames \u2014 it can't read PDF/DOCX bytes. Step 2 of the career agent flow (`backend/app/career_agent/README.md`) is converting those uploads into clean markdown the LLM can reason over, so downstream steps (research, custom resume, interview prep) have something to chew on. CVs and JDs are visually rich (multi-column layouts, tables, embedded charts) \u2014 naive text extraction loses structure that the agent needs.\n\n# What the user sees\n\nAfter uploading via the paperclip or Workspace > Files, the chat composer auto-injects `Uploaded: <names>`. The user hits Send and:\n\n1. Agent calls `list_files(\"/upload/\")` to ground itself in what's actually on disk (the `Uploaded:` line is treated as a hint, not a contract \u2014 users can edit it).\n2. For each confirmed file, agent calls `parse_document(filename, save_as)` in parallel. The tool runs LlamaParse synchronously (~10\u201330 s per doc) and persists the markdown to `/processed/<slug>.md`. The slug is content-meaningful \u2014 e.g. `tam-nguyen-lead-ai-ml-resume.md`, `aitomatic-forward-deployed-engineer.md`.\n3. Agent replies with one short line per saved path. No markdown is dumped into the chat.\n\nIn Workspace > Files, processed markdown shows up at `/processed/<slug>.md` \u2014 clickable, viewable, sorted newest-first alongside raw uploads. Re-uploading the same source file under the same slug overwrites the processed copy in place.\n\n# How \u2014 the key architectural choices\n\n**Tool persists the file itself; the LLM never re-emits the markdown.** The naive flow \u2014 tool returns the parsed string, agent emits a `write_file(path, content)` call \u2014 would push thousands of tokens of markdown back through the model on every parse, doubling latency and cost. We avoid it by closing the agent's `CompositeBackend` over the tool via a small factory (`make_parse_document(backend)` in `tools.py`) and calling `backend.write(...)` directly. The route `/processed` is mapped to a `StoreBackend` (postgres-backed langgraph store) so the file is reachable from any future thread without disk persistence concerns.\n\n**Upsert via try-write-then-edit.** deepagents' `BackendProtocol.write()` refuses to overwrite by design (\"read then edit\"), and the protocol has no `delete`. Re-uploading a CV/JD must refresh the parsed copy, so `_upsert` (`tools.py`) tries `write` first; on the already-exists error it reads the current content and runs `edit(old_string=existing, new_string=new)` \u2014 a full-content swap. Preserves `created_at`, atomic from the store's perspective, and one round-trip on the happy path.\n\n**`list_files` tool exists because the built-in `ls` hides metadata.** deepagents' `ls` middleware tool returns only path strings to the LLM (mtime/size live in a `ToolMessage.artifact` the model never sees) and there's no sort. We added a sibling tool that returns full `FileInfo` entries sorted newest-first, working uniformly across FilesystemBackend (`/upload/`) and StoreBackend routes (`/processed/`, `/research/`, etc.). This is what lets the agent reconcile when the `Uploaded:` line and the on-disk reality drift.\n\n**UTC datetime injected per-call.** Without a clock the agent can't tell \"uploaded 5 seconds ago\" from \"uploaded yesterday\". `UtcDatetimeMiddleware` (`middleware.py`) appends `Current UTC datetime: <iso8601>` to the system message on every model call via `wrap_model_call` / `awrap_model_call` \u2014 fresh per turn, not baked at module import (the LangGraph process is long-lived).\n\n**Slug picked by the LLM, not the tool.** The agent already has filename context in the user message and can pick a meaningful slug (`tam-nguyen-lead-ai-ml-resume` vs the mechanical `resume-lead-ai-ml-tam-nguyen`). Two-arg tool \u2014 `filename` for the source, `save_as` for the slug \u2014 keeps the tool dumb and the naming smart.\n\n**Frontend store listing iterates configured `pathPrefixes`.** Original `fetchStoreFiles` queried a single namespace `[...namespacePrefix, assistantId]` \u2014 wrong shape for any agent whose backend uses per-route namespaces. Rewritten to derive namespace per `pathPrefix` by mirroring the backend's `CompositeBackend` route-stripping. Same helper (`resolveStoreLocation`) drives both list and write, so they always hit the same rows.\n\n# Robustness extensions (v1.1)\n\nThe happy path above assumes LlamaParse succeeds and the user has nothing to add. Three follow-ups close the gaps.\n\n**Parse-failure recovery prefers `.txt` re-upload over pasted text.** When `parse_document` returns `Error: ...` (LlamaParse outage, malformed PDF, no markdown), the agent surfaces the failure and offers the user two choices: re-export the doc as `.txt` and re-upload (re-runs through `parse_document` with the same `save_as` slug, so `_upsert` overwrites cleanly), or paste the content directly into chat. The `.txt` route is recommended \u2014 paste forces the LLM to re-emit the entire body as output tokens (uncached, expensive), while `.txt` rides LlamaParse's `cost_optimizer` cheap tier and well within the free credits/month for solo use. `.txt` is already accepted by the upload route (`frontend/src/app/api/files/upload/route.ts:6`).\n\n**`overwrite_file(file_path, new_content)` exists for the paste fallback.** When the user does paste, the agent persists with `overwrite_file` rather than `write_file` + `edit_file`. The naive route \u2014 `read_file` to capture existing content, then `edit_file(old_string=<entire existing>, new_string=<new>)` \u2014 would force the LLM to regenerate the existing body as `old_string`. That's costly in output tokens and error-prone for long machine-generated strings (silent desync on whitespace/escapes). `overwrite_file` wraps `_upsert` directly and takes only the new content as input; works for both write-new (case 2: failed parse left no file) and overwrite-existing (case 3: bad login-page extraction) via `_upsert`'s try-write-then-edit fallback.\n\n**Downstream work gates on `/processed/` having a CV and a JD.** Research, custom-resume, interview-prep, and fit-analysis all read from `/processed/`, so before starting any of them the agent calls `list_files(\"/processed/\")` and checks for one CV slug (`*-resume`) and one JD slug (`*-jd`). If either is missing it politely lists the input options (upload, URL for JDs, or paste) and waits for the user to provide the missing piece \u2014 rather than fabricating analysis from a one-sided view. The user can override by saying \"just work on the resume\" and the agent proceeds with the limitation noted.\n\n**Side-channel context lives at the tail of the same `/processed/<slug>.md`.** After a successful parse or extract, the agent asks once per artifact whether the user has more context \u2014 recruiter notes, team size, comp band, interview format that won't be in the JD/CV file. If yes, the agent appends a `## Additional context` section via `edit_file` using a small terminal anchor, so only the anchor + appended note re-flow as output tokens (not the whole CV). For multi-page additions, the agent redirects the user to upload as `.txt` instead.\n\n# Files of interest\n\n| Concern | Path |\n|---|---|\n| Agent assembly + composite backend route map | `backend/app/career_agent/agents.py` |\n| `parse_document`, `list_files`, `overwrite_file` tool factories + `_upsert` helper | `backend/app/career_agent/tools.py` |\n| Per-call UTC datetime middleware | `backend/app/career_agent/middleware.py` |\n| Upload-handling block + reconciliation rules | `backend/app/career_agent/prompts.py` (`SYSTEM_PROMPT`) |\n| Tool + middleware unit tests (LlamaParse mocked) | `backend/tests/test_career_agent_tools.py`, `backend/tests/test_career_agent_middleware.py` |\n| Pytest config (rootdir + asyncio mode) | `backend/pyproject.toml` (`[tool.pytest.ini_options]`) |\n| Frontend file listing (store + disk merge) | `frontend/src/app/lib/agentFiles.ts` (`fetchStoreFiles`, `resolveStoreLocation`) |\n| Path-prefix \u2192 namespace config | `frontend/src/app/config/agentFiles.ts` (`AGENT_FILE_SOURCES.career_agent.store`) |\n| LlamaCloud SDK | `llama-cloud>=2.4.1` (already in `backend/pyproject.toml`) |\n| API key | `LLAMA_CLOUD_API_KEY` in `.env` (template at `.env.example:14`) |\n\n# Decisions worth remembering\n\n- **LlamaParse over local extraction.** PyPDF/pdfplumber chokes on multi-column resumes and JD tables. LlamaCloud's agentic tier handles them out of the box and gives 10K free credits/month \u2014 comfortable for solo use. The `cost_optimizer` flag routes plain pages to a cheaper tier automatically, so a typical resume costs a fraction of a credit.\n- **Sync client, sync tool.** `client.parsing.parse()` blocks until the job finishes (LlamaCloud SDK polls for us). LangGraph runs sync tools in a thread executor that propagates contextvars, so `StoreBackend`'s lazy `langgraph.config.get_store()` lookup still works. No async plumbing needed.\n- **Tier choice: `agentic` + cost optimizer.** Defaults from the LlamaCloud quickstart. `agentic_plus` is overkill for resumes; `cost_effective` loses table structure on JDs. Cost optimizer claws back budget on text-heavy pages.\n- **`virtual_mode=True` on the FilesystemBackend.** Required for `CompositeBackend` route semantics \u2014 otherwise `/upload/foo.pdf` resolves as a real filesystem absolute path (root `/`) rather than relative to `root_dir`. Default flips in deepagents 0.6.0; we set it explicitly now.\n- **`content_builder` config dropped.** Was a stale template entry in `agentFiles.ts`, referenced nowhere else in the repo. Verified by grep before deletion.\n- **Re-parse over migration.** When we renamed `/upload/processed/` \u2192 `/processed/`, old store rows under namespace `(\"career_agent\", \"upload\", \"processed\")` orphaned. Re-parse on next upload (idempotent via `_upsert`) was cheaper than writing a one-shot migration script for a handful of rows.\n- **Image references stripped client-side.** LlamaParse emits `![alt](page_X_image_Y.jpg)` in `markdown_full` for embedded images even when extraction is disabled \u2014 the Workspace UI then 404s loading those filenames. The v2 `ParsingCreateParams` API has no flag that suppresses these refs (verified against the [Configure Parse](https://developers.llamaindex.ai/llamaparse/parse/guides/configuring-parse/) doc and the generated schema). `images_to_save: []` only stops extraction; `inline_images: true` swaps filenames for huge base64 blobs; the legacy `disable_image_extraction` lives on the v1-shape `LlamaParseParametersParam` and isn't exposed on `parsing.parse()`. So we set `images_to_save: []` (saves credits + smaller payload) **and** post-process with `_strip_image_filenames` (`tools.py`) \u2014 regex `r\"!(\\[[^\\]]*\\])\\([^)]*\\)\"` \u2192 `\\1`, turning `![check mark](page_3_image_23_v2.jpg)` into `[check mark]`. Plain markdown links are untouched (no leading `!`).\n\n# Deferred (intentional non-goals for v1)\n\n- **Pre-flight cost preview.** No \"this will cost N credits, proceed?\" UI before the parse fires. Solo user; small docs; trust the cost optimizer.\n- **DOC (legacy Word) and exotic formats.** LlamaParse accepts them but we haven't validated end-to-end. The accepted-extensions list in `frontend/src/app/api/files/upload/route.ts` already gates this at upload time.\n- **Per-thread scoping for processed files.** Global namespace `(\"career_agent\", \"processed\")`, matching the global `/upload/` directory. Revisit if multi-thread workflows emerge.\n- **Background processing with progress UI.** Tool call blocks for ~10\u201330 s per doc. Acceptable for now; the LangGraph trace shows progress to the dev. A streaming UI would be a separate front-end PRD.\n- **Editing parsed markdown in-place from the UI.** `writeAgentFile` already routes correctly to the store via `resolveStoreLocation`, but the workspace-side editor flow hasn't been QA'd against store-source files yet.\n- **Deleting processed files from the UI.** `useChat.ts:removeFile` explicitly throws \"Only disk-backed files can be deleted from the UI\". Add `client.store.deleteItem(...)` when a real need arrives.\n\n# How to verify end-to-end\n\n1. `docker compose up -d` and confirm `LLAMA_CLOUD_API_KEY` is set in `.env`.\n2. Upload a CV (PDF) via the chat paperclip. Composer auto-fills `Uploaded: <name>.pdf`.\n3. Send. Watch the LangGraph trace (`http://localhost:<LANGGRAPH_LOCAL_PORT>/docs` or LangSmith if `LANGCHAIN_TRACING_V2=true`):\n   - `list_files(\"/upload/\")` fires first.\n   - One `parse_document` call per file with a sensible `save_as`.\n   - **No** subsequent `write_file` call regenerating the markdown.\n   - Brief assistant reply naming the saved path.\n4. Open Workspace > Files: `/processed/<slug>.md` appears, sorted newest-first, clickable for preview.\n5. Query the langgraph store via the `next-role-postgres` MCP \u2014 confirm a row exists under namespace `(\"career_agent\", \"processed\")` with the expected key.\n6. **Edited-hint case.** Edit the textarea after upload to a name that doesn't exist on disk, send. Agent should call `list_files`, notice the mismatch, and ask one short clarifying question before parsing.\n7. **Overwrite case.** Re-upload the same file (or invoke `parse_document` with the same `save_as`). The processed file updates in place; `created_at` stays, `modified_at` advances.\n8. **No broken image refs.** Open the parsed markdown in Workspace > Files and check the browser Network tab \u2014 there should be **no 404s** for `page_X_image_Y.jpg`. The markdown should contain `[alt]` rather than `![alt](filename)`.\n9. **Parse-failure recovery.** Force a parse failure (e.g. set `LLAMA_CLOUD_API_KEY=invalid`, `docker compose restart langgraph`). Upload a PDF; agent reports the error and offers `.txt` re-upload or paste. Restore the key, re-upload as `.txt` with the same intent \u2192 `parse_document` produces `/processed/<slug>.md`. Alternatively, choose the paste option \u2192 `overwrite_file` persists the same path. The trace shows **no** `write_file` call for doc body content.\n10. **Side-channel augmentation.** After any successful parse, the agent asks one short follow-up about extra context. Reply with a recruiter note \u2192 `read_file` reads only a small tail, then a single `edit_file` appends `## Additional context`. The original parsed body is unchanged.\n11. **Tests.** `cd backend && uv run pytest tests/ -q` \u2014 must stay green; LlamaParse stays mocked.", "03_jd_url_extraction": "**Extends:** [Document Processing (v1)](02_document_processing.md)\n\n# Why\n\nDocument Processing (v1) only handles **uploaded** CV/JD files. But many users have the JD as a careers-page URL (Amazon Jobs, Greenhouse, Lever, etc.), not a downloadable file. Without this feature, they'd have to copy-paste the JD into a doc and upload it. Goal: paste the URL, get the same `/processed/<slug>.md` artifact downstream steps already know how to read.\n\n# What the user sees\n\nUser pastes a JD URL into chat (\"Here's the JD I want to apply for: <url>\") and hits Send:\n\n1. Agent calls `extract_jd(url, save_as)` once. The tool fetches the page via Tavily (markdown format) and persists `/processed/<slug>.md`. Slug is content-meaningful \u2014 e.g. `amazon-senior-ai-solution-architect-jd`.\n2. Agent replies with one short line naming the saved path. No markdown is dumped.\n\nThe processed file shows up in Workspace > Files alongside parsed uploads. Re-pasting the same URL with the same slug overwrites in place.\n\n# How \u2014 the key architectural choices\n\n**Separate tool, not an overload of `web_extract`.** Considered adding `offload_result_path: str | None` to the existing `web_extract`, but JD-from-URL has a clean 1-URL \u2192 1-file contract that `web_extract`'s `list[str] | str` signature would muddle. A dedicated `extract_jd(url, save_as)` mirrors `parse_document(filename, save_as)` exactly \u2014 same factory shape (`make_extract_jd(backend)`), same `_upsert`, same `_strip_image_filenames`, same kebab-case slug convention. The system prompt becomes one extra paragraph parallel to the upload paragraph, and `web_extract` stays a clean general-purpose primitive for future research flows.\n\n**Auto-offload is a no-op here.** deepagents' `FilesystemMiddleware` evicts any tool result over 80,000 chars to `/large_tool_results/<tool_call_id>` \u2014 opaque path, not what we want for a JD that downstream steps need to find by slug. We sidestep it by having the tool persist the markdown itself and return a short `Saved /processed/<slug>.md (<N> chars from <url>)` confirmation. The visible result is tiny \u2192 eviction never fires \u2192 the JD lands at the predictable `/processed/` path the agent and frontend already understand.\n\n**Header + source line, then the body.** Tavily returns `raw_content` as full-page markdown including nav and footer. We prepend `# <title>\\n\\n_Source: <url>_\\n\\n` so the persisted file is self-describing \u2014 useful when downstream prompts (custom resume, interview prep) read it without context. The same `_strip_image_filenames` regex from `parse_document` is reused on the body to keep image refs from 404'ing in the Workspace preview.\n\n# Files of interest\n\n| Concern | Path |\n|---|---|\n| `extract_jd` factory + `_tavily_extract_one` helper | `backend/app/career_agent/tools.py` |\n| Tool registration on the main agent | `backend/app/career_agent/agents.py` |\n| URL-handling block (parallel to upload block) | `backend/app/career_agent/prompts.py` (`SYSTEM_PROMPT`) |\n| Unit tests (Tavily mocked) | `backend/tests/career_agent/test_tools.py` |\n| Tavily SDK | `tavily-python` (already in `backend/pyproject.toml`) |\n| API key | `TAVILY_API_KEY` in `.env` |\n\n# Decisions worth remembering\n\n- **Tavily over scraping ourselves.** A Playwright-based scraper would handle auth-walled JDs better, but the cold-start latency, headless-browser maintenance, and per-site selector drift make it the wrong shape for v1. Tavily handles `extract_depth=\"advanced\"` for JS-rendered pages out of the box and returns clean markdown.\n- **`web_extract` stays unwired.** It's defined in `tools.py` but not registered on the main agent. Defer wiring until a research subagent or specific need lands \u2014 for now `extract_jd` is the only Tavily entrypoint the agent has, and that keeps the URL \u2192 `/processed/` flow unambiguous.\n- **One URL per call.** No `urls: list[str]` overload. Multiple JDs at once \u2192 multiple parallel `extract_jd` calls, each with its own slug. Keeps the contract trivial and parallelism is the agent's job, not the tool's.\n- **Validation in the tool, not the schema.** Pydantic could constrain `url` to `HttpUrl` and `save_as` to a regex, but that turns invalid input into a tool-call rejection the agent can't explain. We validate inside the function and return `Error: invalid url ...` / `Error: invalid save_as ...` so the model gets a readable message and can self-correct.\n- **Recovering from auth-walled URLs.** Tavily can't see past LinkedIn / internal Greenhouse logins, but `extract_jd` returns success on the login page itself \u2014 `/processed/<slug>.md` ends up with \"Sign in to continue\" instead of the JD. The agent now reads back the saved file after every successful `extract_jd` and treats it as failed when the body contains login-flow signals (\"Sign in\", \"Log in\", \"Join LinkedIn\", \"Welcome back\", etc.) or is implausibly short past the `_Source:` line. On detection, the agent offers two recovery options: save the JD as a `.txt` and re-upload (recommended \u2014 `parse_document` overwrites the bad page via `_upsert`, and the agent then prepends `_Source: <original url>_` via a tiny `edit_file`), or paste the JD content into chat (handled with `overwrite_file(path, \"_Source: <url>_\\n\\n<pasted text>\")`). Choosing `overwrite_file` over `read_file` + `edit_file` matters here: forcing the LLM to regenerate the existing login-page content as `old_string` would be expensive and error-prone for long machine-generated strings.\n\n# Deferred (intentional non-goals for v1)\n\n- **Pre-flight URL preview.** No \"this looks like a JD at <company>, proceed?\" confirmation. The slug picked by the LLM gives the user enough signal in the reply.\n- **Per-site cleanup of nav/footer noise.** `raw_content` includes amazon.jobs sidebars, \"Recommended jobs\" etc. Downstream prompts handle the noise fine; trimming would be premature.\n- **Multi-URL batching in one call.** See \"One URL per call\" above.\n\n# How to verify end-to-end\n\n1. `docker compose up -d` and confirm `TAVILY_API_KEY` is set in `.env`.\n2. Send a chat message: `Process this JD: https://www.amazon.jobs/en/jobs/3195366/senior-ai-solution-architect`.\n3. Watch the LangGraph trace:\n   - One `extract_jd` call with a sensible `save_as` (e.g. `amazon-senior-ai-solution-architect-jd`).\n   - **No** `web_extract` or `write_file` calls.\n   - Brief assistant reply naming the saved path.\n4. Open Workspace > Files: `/processed/<slug>.md` appears, header line is `# <JD title>`, second block is `_Source: <url>_`.\n5. Query the langgraph store via the `next-role-postgres` MCP \u2014 confirm a row exists under namespace `(\"career_agent\", \"processed\")` with the expected key.\n6. **Overwrite case.** Re-paste the same URL. Tool returns the same `Saved \u2026` confirmation; no duplicate row in the store.\n7. **Auth-walled URL.** Send a LinkedIn job URL. Agent calls `extract_jd`, then `read_file` on the result, flags the auth wall by name. Pick the `.txt` upload option, upload a `.txt` of the JD; agent calls `parse_document(..., save_as=<same slug as the failed extract>)` and prepends `_Source: <linkedin url>_` via one `edit_file`. The file ends up self-describing with no login-page residue. Alternatively, picking the paste option triggers a single `overwrite_file` call with the source line embedded.\n8. **Tests.** `cd backend && uv run pytest tests/career_agent/test_tools.py` \u2014 green; Tavily stays mocked.", "04_initialize_subagents": "# Why\n\nThe 5-stage career-agent workflow (intake \u2192 process \u2192 research \u2192 customize/prep \u2192 cheat sheet) had Stages 1\u20132 implemented in `CAREER_AGENT.md`; Stages 3\u20135 were `_Not yet implemented \u2014 placeholder._`. The main agent could parse a CV + JD and had nothing to do next. Also, after parsing it was reading only the first 100 lines of each processed file (the login-wall verification skim), which left it without enough substance to write good subagent task descriptions for delegation.\n\n# What ships\n\nThree subagents, one skill, and the per-stage procedure to orchestrate them:\n\n- **`hiring-recon`** (`openai:gpt-5.6-luna`, `web_search` + `web_extract`) \u2014 gathers company snapshot, financial/hiring signals, reputation, hiring team, and role market context (with a salary range bracketed by candidate/JD location), then produces a match analysis. Single output: `/research/<resume>/<jd>.md`.\n- **`resume-tailor`** (`openai:gpt-5.6-luna`, `prepare_render_settings`) \u2014 rewrites the resume tailored to one JD using the recon report, then renders it to PDF via `rendercv`. Carries the truth-vs-tailoring guardrail and the three reorder/swap/keyword strategies. Outputs: `/tailored_resume/<resume>/<jd>.yaml` (rendercv source, hand-editable) + `/tailored_resume/<resume>/<jd>.pdf` (rendered PDF) + `/render_intermediate/<resume>/<jd>.typ` (intermediate, hidden from UI). See [PRD 07](07_tailored_resume_pdf.md).\n- **`interview-coach`** (`openai:gpt-5.6-luna`, filesystem only) \u2014 structured prep doc with a top-level Self-introduction (60s + 30s, reused across rounds), optional `## Triage` when the timeline is short, and per-round STAR + questions-to-ask + watch-outs. Output: `/interview_coach/<resume>/<jd>.md`.\n- **`interview-battlecard` skill** \u2014 Stage-5 workflow that the main agent applies directly (no subagent). Day-of one-pager with exactly four sections per round (Stories ready / Company facts to drop / Questions to ask / Watch-outs), pages separated by `\\n---\\n`. Output: `/interview_battlecard/<resume>/<jd>.md` (FilesystemBackend).\n\nEach subagent's workflow lives in its own `skills/<subagent>/<subagent>/SKILL.md` (see [PRD 06](06_subagents_with_skills.md)); the YAML system_prompt is a ~7-line pointer to the skill plus the single-shot rule and the exact one-line final-reply contract back to the main agent. The `interview-battlecard` skill sits under `skills/career-agent/interview-battlecard/` (the main agent's consumer grouping).\n\n`CAREER_AGENT.md` Stages 3\u20135 now carry concrete delegation procedures with full task-input templates. Stage 2 gained a \"Load full context before delegating\" step (read both processed files in full with `limit=1000`). The CompositeBackend route `/interview_prep/` was renamed to `/interview_coach/`; all other routes unchanged.\n\n# How \u2014 the key choices\n\n**Nested `<resume>/<jd>.md`, not flat.** Picked over `<resume>-<jd>.md` because the eventual binary artifacts (PDF resumes, PDF battlecards) want to sit next to their markdown sources in the same per-resume folder, and the user already had this layout drafted in the README.\n\n**StoreBackend vs FilesystemBackend per artifact.** `/research/` and `/interview_coach/` are StoreBackend (KV-backed). `/tailored_resume/`, `/interview_battlecard/`, `/upload/`, and `/render_intermediate/` are FilesystemBackend \u2014 needed for the eventual binary outputs (PDFs need real files; the YAML/typ render pipeline already exists for `/tailored_resume/`). All route prefixes now use a leading slash after the FilesystemBackend leading-slash refactor.\n\n**Subagents avoid `write_todos` via the system prompt, not framework config.** deepagents injects `TodoListMiddleware` into every subagent with no per-subagent off-switch in `SubAgent`. The harness-profile `excluded_middleware` mechanism exists but would also drop the tool from the main agent. Instead each subagent's prompt opens with `Do not call write_todos \u2014 your task is single-shot.` Zero framework risk.\n\n**Intake filename keyed by resume\u00d7JD pair, not just JD.** `/processed/<resume>-<jd>-intake.md` future-proofs the case where the same JD is targeted with two CV variants (e.g. an \"AI-leaning\" vs \"infra-leaning\" resume) and the user wants different intake notes per pair.\n\n**hiring-recon includes match analysis.** Considered splitting (pure recon \u2192 match analysis derived later in resume-tailor). Kept combined because the analyst already has the resume + JD in context, and downstream subagents start from a richer baseline instead of re-deriving the same gap matrix twice.\n\n**Stage 4 spawns both subagents in parallel.** CAREER_AGENT.md's Stage 4 instructs the main agent to spawn `resume-tailor` and `interview-coach` \"in parallel so they can run concurrently\" and lists the five shared paths each subagent receives in its task input. The main agent doesn't need to read the recon report itself \u2014 it just forwards `research_path` to both subagents.\n\n# Files of interest\n\n| Concern | Path |\n|---|---|\n| Subagent specs (thin pointers to skills) | `backend/app/career_agent/subagents.yaml` |\n| Subagent loader (tool whitelist + `skills:` passthrough) | `backend/app/career_agent/utils.py` (`load_subagents`) |\n| Tool pool + StoreBackend route rename | `backend/app/career_agent/agents.py` (`_SUBAGENT_TOOLS`, `_SUBAGENT_DEFAULT_TOOLS`; `/interview_prep/` \u2192 `/interview_coach/`) |\n| Stages 3\u20135 procedures + Stage 2 full-context read | `backend/agents/career_agent/CAREER_AGENT.md` |\n| 5-stage summary in main agent system prompt | `backend/app/career_agent/prompts.py` (`SYSTEM_PROMPT`) |\n| Subagent workflows | `backend/app/career_agent/skills/{hiring-recon,resume-tailor,interview-coach}/<same>/SKILL.md` |\n| Battlecard skill (main agent) | `backend/app/career_agent/skills/career-agent/interview-battlecard/SKILL.md` |\n| Flow + File Structure resync | `backend/app/career_agent/README.md` |\n\n# Decisions worth remembering\n\n- **Names matter; rename cascades.** First pass used `researcher` / `custom-resume` / `interview-prep` / `interview-cheat-sheet`. User correction: too generic. Final names \u2014 `hiring-recon` / `resume-tailor` / `interview-coach` / `interview-battlecard` \u2014 were chosen for thematic coherence (recon \u2192 tailor \u2192 coach \u2192 battlecard reads as a single kit). The rename cascaded into directory names, the `/interview_coach/` backend route, the README, and the SYSTEM_PROMPT. Budget for that whenever naming changes.\n- **Full-file read before delegating.** The 100-line read in Stage 2's login-wall check was being mis-applied as the agent's only context for Stage 3 delegation. Fixed by adding an explicit \"Load full context\" step at the end of Stage 2 with `limit=1000`.\n- **Subagents take exact paths in the task input.** Subagents run in a fresh context. The main agent's job is to construct a task description that contains every path the subagent needs \u2014 the subagent does not hunt for files. Stated as the standard pattern in CAREER_AGENT.md Stages 3 and 4.\n\n# Followups that shipped\n\n- **Workflows as shareable units** \u2192 **[PRD 06](06_subagents_with_skills.md).** Subagent workflows moved out of inline `system_prompt:` into per-consumer `skills/<subagent>/<subagent>/SKILL.md`. The YAML system_prompt collapsed to a ~7-line pointer + single-shot rule + final-reply contract.\n- **PDF rendering for the tailored resume** \u2192 **[PRD 07](07_tailored_resume_pdf.md).** `resume-tailor` now writes a rendercv YAML and renders to `.pdf` (with a hidden `.typ` intermediate under `/render_intermediate/`). The battlecard is still `.md` \u2014 `/interview_battlecard/` stays on FilesystemBackend so its eventual PDF output has somewhere to land.\n- **Consolidated post-refactor snapshot** \u2192 **PRD 08.** [Career-Agent Workflow Orchestration (v2)](08_agent_workflow.md) folds this PRD plus the two follow-ups above into a single canonical reference for how the 5-stage workflow currently runs end-to-end.\n\n# How to verify end-to-end\n\n1. `pre-commit run --files $(git ls-files --modified --others --exclude-standard)` \u2014 clean.\n2. Loader smoke test (tool pool now owned by `agents.py`, so pass it in):\n   ```\n   PYTHONPATH=/Users/may/tech/next-role backend/.venv/bin/python -c \"\n   from backend.app.career_agent.agents import _SUBAGENT_TOOLS, _SUBAGENT_DEFAULT_TOOLS\n   from backend.app.career_agent.utils import load_subagents\n   from pathlib import Path\n   subs = load_subagents(Path('backend/app/career_agent/subagents.yaml'), tools=_SUBAGENT_TOOLS, default_tools=_SUBAGENT_DEFAULT_TOOLS)\n   print([(s['name'], s.get('skills')) for s in subs])\"\n   ```\n   prints three entries: `('hiring-recon', ['skills/hiring-recon/'])`, `('resume-tailor', ['skills/resume-tailor/'])`, `('interview-coach', ['skills/interview-coach/'])`.\n3. `docker compose up -d`, upload a CV + JD URL, walk all 5 stages and confirm:\n   - `/research/<r>/<j>.md` has the seven mandated sections including the **Salary range** bullet with a location qualifier.\n   - `/tailored_resume/<r>/<j>.yaml` opens with a `# changes:` comment block, and `/tailored_resume/<r>/<j>.pdf` exists next to it.\n   - `/interview_coach/<r>/<j>.md` opens with `## Self-introduction` (60s + 30s) above the rounds.\n   - `/interview_battlecard/<r>/<j>.md` has N pages separated by `\\n---\\n`, four sections each.\n   - LangSmith trace shows each subagent's first tool call is `read_file` on its `SKILL.md`, and no subagent calls `write_todos`.", "05_chat_streaming_throttle": "> **Partially superseded by [18_langchain_react_migration](18_langchain_react_migration.md)** \u2014\n> the headline mechanism (80 ms hot-window throttle, `isHotStreaming`, hot-exit scroll re-engage,\n> `sdkSubagents` memo + nested tool-call cache, `uiByMessageId`) was removed with the\n> `@langchain/react` migration, whose v2 stream runtime batches store flushes per macrotask and\n> makes a render-side throttle unnecessary. The orthogonal hardening from the same commit **remains\n> shipped and load-bearing**: `ToolCall`/`toolCalls[]` identity caches in `ChatInterface`, the\n> `pending`-state `JSON.stringify` guards + 256-char error-inspection cap in `ToolCallBox`, the\n> `onPointerDown`+`onClick` dedupe (Safari click-swallowing is OS behavior, SDK-independent), and\n> the sweep animation.\n\n# Why\n\nThe chat panel renders LangGraph-SDK stream events into React state on every token. When an LLM streams long content into a *tool-call argument* (rather than into message text), tokens arrive at 100\u2013200 Hz. With **two or more subagents emitting in parallel**, the main thread can't drain between tokens \u2014 clicks stop landing on tool boxes and their args, and content from later steps doesn't appear until the whole burst finishes. Observed today in the career-agent flow (parallel `resume-tailor` + `interview-coach`), but the failure mode is structural and will recur for any future agent whose subagents stream long tool args.\n\nThe pressure has three compounding sources, and the fix addresses all three:\n\n1. **Re-render rate.** Every token produces a new `stream.messages` reference and re-runs the messages-processing pipeline.\n2. **Per-render cost.** Even when little has changed, `JSON.stringify` over a streaming tool arg in `previewValue`/`parseToolError`, plus rebuilding every `ToolCall` object fresh, defeats `React.memo` on `ChatMessage`/`ToolCallBox` and burns the budget.\n3. **Input responsiveness.** On Safari, the OS swallows `click` during heavy main-thread work, so tool boxes stop toggling mid-stream even when the surface is otherwise painting.\n\n# What the user sees\n\nDuring any high-rate streaming window, the chat surface continues to paint smoothly (~12 fps for tool-arg content), tool boxes and subagent rows stay clickable, and step-N+1 output appears as soon as step N finishes \u2014 no manual scroll required. Outside that window every update is delivered at native cadence (per-token text streaming, instant tool-completion flips, etc.).\n\nThe trade-off is intentional and acknowledged: while a subagent is mid-tool-call, its streaming args text fills in 80 ms chunks instead of letter-by-letter. The user agreed this is a non-issue \u2014 they care about smooth observation, not character-level animation of tool inputs.\n\nA running subagent now also gets a subtle sweep animation on its indicator row (matches the existing `tool-running-sweep` on the active `ToolCallBox`), and the animation is suppressed under `prefers-reduced-motion`.\n\n# How \u2014 the key architectural choice\n\n**Conditionally throttle `stream.messages` at 80 ms only while a \"hot streaming\" window is active.** A window is active iff `stream.isLoading` and at least one running subagent has a pending tool call. While active, downstream React work (the messages-processing useMemo in `ChatInterface`, the per-message subagent rebuild in `ChatMessage`, and every memoized tool-call array) samples a snapshot updated by `setInterval`; outside, `stream.messages` is passed through directly.\n\nWhy this shape, not the obvious alternatives:\n\n- **Throttle, not skip.** Earlier options considered: (a) skip rendering the streaming `content` arg entirely and show a \"writing\u2026 (N chars)\" placeholder; (b) use React 19 `useDeferredValue`. The user picked throttling at ~12 fps because it preserves the \"live\" feel without character-level cost, and the fix needed to work even when nothing is expanded.\n- **Conditional, not always-on.** Throttling outside the hot window would delay tool-completion flips and other genuinely-cheap updates. Gating on \"running subagent has a pending tool call\" matches the only known main-thread saturation mode.\n- **Tool-name agnostic trigger.** The trigger does *not* check for `write_file` specifically \u2014 any pending tool call inside a running subagent counts. This is the cheapest generalization that survives the current backend evolving (different tool names, different agents).\n- **Re-engage sticky scroll on window exit.** Independent fix in the same surface: when `isHotStreaming` flips false, call `useStickToBottom`'s `scrollToBottom()` once. During the hot window the user can lose the bottom-lock (a stray scroll-wheel tick, or the library reading a batched content jump as an escape), which otherwise leaves the next step's output below the fold.\n\n## Supporting work in the same commit\n\nThe throttle alone reduces the *rate* of work. Three more changes reduce the *cost per render* and unblock input \u2014 all required for the smooth feel to actually land:\n\n- **Identity-stable `ToolCall` and `toolCalls[]` references.** The messages-processing useMemo in `ChatInterface` now keeps two refs (`toolCallCacheRef`, `toolCallArrayCacheRef`): finalized `ToolCall` objects are cached by id, and the per-message `toolCalls` array reuses its previous reference when no entry's identity changed. Pending tool calls intentionally always emit a fresh ref so the streaming box re-renders and shows live tokens; everything earlier in the conversation goes through `React.memo` unchanged. `ChatMessage` mirrors this with `nestedToolCallCacheRef` for finalized nested subagent tool calls. Without this, the throttle still fires but every `ChatMessage` and `ToolCallBox` re-renders at sample time anyway.\n- **`uiByMessageId` map instead of `.filter()` per render.** `ChatInterface` pre-buckets `ui` items by `metadata.message_id` once per `ui` change, so each `ChatMessage` gets a stable per-message array reference instead of a fresh `.filter()` result on every parent render.\n- **Skip `JSON.stringify` work while `status === \"pending\"`.** In `ToolCallBox`, `previewValue` and `parseToolError` are gated on completion \u2014 both feed only the collapsed header, so there's no reason to stringify the growing args object on every token. `parseToolError` additionally caps its inspection window at 256 chars (error markers always appear at the start), so a long completed result doesn't pay full stringify cost either. `previewValue` short-circuits on strings before calling `JSON.stringify`.\n- **`onPointerDown` + `onClick` with timestamp dedupe.** Both `ToolCallBox` and `SubAgentIndicator` toggle on `pointerdown`, which fires before the OS click-eating window during heavy main-thread work (the Safari mid-stream failure mode). `onClick` is kept as the keyboard fallback (Enter/Space only emit click) and is deduped against a recent pointer toggle with a 300 ms threshold, so a single tap doesn't toggle twice. Same shape in both components \u2014 copy the pattern for any future expandable surface that needs to stay responsive under streaming load.\n\n# Files of interest\n\n| Concern | Path |\n|---|---|\n| Hot-window detection + throttled messages snapshot + `isHotStreaming` export | `frontend/src/app/hooks/useChat.ts` |\n| Sticky-scroll re-engage on window exit, `ToolCall` + `toolCalls[]` identity caching, `uiByMessageId` bucketing | `frontend/src/app/components/ChatInterface.tsx` |\n| Subagent-map memo gated on `toolCalls` (throttled transitively) instead of unstable `stream.subagents` getter; nested tool-call identity caching | `frontend/src/app/components/ChatMessage.tsx` |\n| `pending`-state guards on `previewValue`/`parseToolError`, 256-char cap on error inspection, `onPointerDown` + `onClick` dedupe | `frontend/src/app/components/ToolCallBox.tsx` |\n| `onPointerDown` + `onClick` dedupe, active sweep animation when subagent is running | `frontend/src/app/components/SubAgentIndicator.tsx` |\n| `will-change`/`translateZ` on `.tool-running-sweep`, `prefers-reduced-motion` opt-out | `frontend/src/app/globals.css` |\n\n# Decisions worth remembering\n\n- **`stream.messages` and `stream.subagents` are unstable getters.** The LangGraph SDK exposes both as accessors that return a fresh reference on every read. Putting either in a `useEffect` dep array combined with a `setState` inside the effect creates an infinite re-render loop (\"Maximum update depth exceeded\") \u2014 and putting them in a `useMemo` dep makes the memo recompute on every render (which is what caused the original lag). The hook now depends only on `isHotStreaming` (a boolean that flips a handful of times per run) and reads the latest messages via a ref at sample time. Any future code in this layer must respect the same constraint.\n- **`messagesSnapshot = isHotStreaming ? throttledMessages : stream.messages`.** The ternary is deliberate. A single `useState` that we keep in sync always (even outside the hot window) reintroduces the infinite-loop trap because the unstable upstream ref differs each render and `setState` would fire on every render. Pass-through outside the hot window costs nothing and stays correct.\n- **First implementation attempt failed: tried to propagate a `streamTick` counter and bump it on every upstream change.** The bump effect depended on `stream.subagents`, which (per the previous bullet) is a fresh reference each render \u2014 infinite loop. Replaced with the ternary + ref design above. Captured here so the next person doesn't reach for the same pattern.\n- **80 ms is the single tunable knob, hardcoded in `useChat.ts`.** ~12 fps is below most users' threshold for \"feels live\" while well within the main-thread budget. Lower (60 ms) for snappier streaming on fast machines; higher (120\u2013150 ms) if a slow machine still struggles. No env var \u2014 change the literal.\n- **Subagent re-render gating uses `toolCalls` as the dep, not the live `stream.subagents` Map.** `toolCalls` is throttled transitively through `messagesSnapshot` \u2192 the messages-processing memo. This means `ChatMessage`'s `sdkSubagents` memo re-runs at the same cadence as the messages snapshot, without needing to plumb the snapshot reference any deeper.\n- **Cache only finalized `ToolCall` objects, never pending ones.** Both the `ChatInterface` top-level cache and the `ChatMessage` nested cache key off completion. Pending tool calls intentionally emit a fresh reference on every sample so the *one* streaming box re-renders to show live tokens; every other (completed) tool call holds a stable identity and short-circuits through `React.memo`. Caching pending entries would freeze the live view.\n- **Per-message `toolCalls[]` array reuses its previous reference iff every entry has the same identity.** If a single entry changes (the streaming one), the array gets a new reference and only that `ChatMessage` re-renders. This is what makes `React.memo` on `ChatMessage` actually pay off during streaming. The `arrayCache` is keyed by message id and pruned on each pass against `seenMessageIds` so thread switches don't leak references.\n- **`previewValue`/`parseToolError` must not run during `pending`.** They feed only the collapsed header text; calling `JSON.stringify` on a streaming tool-arg object every token is the dominant per-render cost we measured. Gate on `status === \"pending\"` in `ToolCallBox` and skip both. The 256-char cap on `parseToolError` is the secondary guard for when a *completed* result is also large (errors always appear at the start of the payload).\n- **`onPointerDown` is the responsive trigger; `onClick` is the keyboard fallback.** Safari swallows `click` during heavy main-thread work; `pointerdown` fires earlier in the input pipeline and survives. The 300 ms timestamp dedupe is necessary because a normal tap fires both events \u2014 without it, a single click toggles twice. Apply the same pattern to any future expandable element in the chat surface (`ToolCallBox` and `SubAgentIndicator` are the current copies; keep them in sync).\n- **No streamTick prop, no context plumbing for the throttle.** Everything threads through the existing `messages` field on `useChatContext`. The only new exported field is `isHotStreaming`, used solely by `ChatInterface` for the scroll re-engage.\n\n# Deferred (intentional non-goals for v1)\n\n- **Content-skip placeholder for streaming tool args.** Showing \"writing\u2026 (12,450 chars)\" instead of the live text would drop the cost further, but the 80 ms throttle + cost reductions are already smooth. Revisit if a future agent streams much larger payloads (e.g. >100 KB tool args).\n- **Throttling files / todos / UI panels.** They already refresh off coarse signals (`stateFilesSig`, `stream.isLoading`), not per-token. No churn observed.\n- **Virtualized message list.** `ChatInterface` still maps every message; fine for the current conversation lengths. Add `react-virtuoso` if a single thread starts holding hundreds of messages.\n- **Backend changes (batched token emission, async subagent parallelism).** The throttle is purely a UI shape and survives any backend evolution. The deepagents `SubAgentMiddleware` is currently sequential; if it becomes truly async, the same hot window still fires.\n\n# How to verify end-to-end\n\n1. `docker compose up -d` and grab the frontend host port from `docker ps`.\n2. Open the chat UI, kick off a flow that ends in **two or more subagents running in parallel and each calling a tool with long streamed args**. (Career-agent's resume-tailor + interview-coach phase is the canonical case today.)\n3. During the parallel streaming, without clicking anything: the chat surface keeps painting smoothly, tool boxes appear and update in visible 80 ms chunks, the running subagent rows show the sweep animation, and the next step's output begins streaming below as soon as the parallel phase ends \u2014 no manual scroll.\n4. During the parallel streaming, click into a streaming tool's `content` arg: the click registers within ~100 ms (it's `pointerdown`-driven, so Safari mid-stream still toggles) and the expanded `<pre>` fills in at the same 80 ms cadence. Click a subagent indicator \u2014 same responsiveness.\n5. Keyboard activation still works: Tab to a tool box, hit Enter/Space, it toggles. The `onClick` dedupe must not swallow keyboard events (they don't fire `pointerdown`).\n6. After streaming ends: the final tool-arg content is fully present (cleanup flush guarantees no missing tail from the last interval tick), the sticky scroll re-engages, the sweep animation stops on completed subagents.\n7. Earlier, completed tool boxes in the same thread do **not** re-render while a later one is streaming (verify in React DevTools Profiler \u2014 only the streaming `ChatMessage`/`ToolCallBox` should highlight per sample tick).\n8. Single-subagent streaming (e.g. an earlier `hiring-recon` step): output streams at native cadence \u2014 confirm the throttle didn't regress non-hot paths.\n9. With `prefers-reduced-motion` enabled at the OS level, the sweep animation is suppressed but every other behavior above still works.\n10. Optional Chrome DevTools Performance recording across the parallel phase: long-task count drops sharply vs. the pre-fix branch.", "06_subagents_with_skills": "# Why\n\nThe three career-agent subagents (`hiring-recon`, `resume-tailor`, `interview-coach`) carried their entire workflow as an inline `system_prompt:` block in `subagents.yaml` \u2014 ~100, ~90, ~100 lines respectively. That made the prompts un-shareable: if a second agent ever needed the same workflow (a future \"junior-resume-tailor\", a shared interview-prep flow used by another product surface), the only option was copy-paste-and-drift. The main agent's `interview-battlecard` workflow already lived as a `SKILL.md` and benefitted from progressive disclosure (one-line manifest in system prompt, full body read on demand). Goal: bring the subagents to the same shape so workflows become reusable units of agent configuration instead of YAML scalars locked to one caller.\n\n# What the user sees\n\nNo user-visible change \u2014 same flow, same outputs, same delegation tree. Internally the LangGraph trace now shows each subagent's first tool call as a `read_file` on its own `SKILL.md`, after which it executes the workflow it just loaded. Round-trip cost: one extra tool call per delegated stage, in exchange for prompts that any other agent can adopt by listing the same `skills/` path.\n\n# How \u2014 the key architectural choices\n\n**Per-consumer skill grouping under `skills/`, not flat.** Picked `skills/<consumer>/<skill-name>/SKILL.md` (main agent under `skills/career-agent/`, each subagent under `skills/<subagent-name>/`) over a flat `skills/` where every consumer sees every skill. deepagents' `SkillsMiddleware` injects the manifest (name + description) of every skill at the source path into the system prompt every turn \u2014 flat layout means each subagent's prompt would carry three irrelevant skill manifests, plus the temptation to invoke a skill that isn't its job. The grouping costs one extra directory level; the LLM ergonomics and per-turn token budget are worth it. `sources` in deepagents has to be a parent directory of skill folders (`backend.ls(source)` scans for subdirs), so a true flat layout is the only alternative \u2014 the nested `skills/hiring-recon/hiring-recon/SKILL.md` shape is the price of selective inclusion.\n\n**Skill \u2260 subagent. Workflow goes in `SKILL.md`; subagent\u2194caller interface stays in `system_prompt:`.** What lives in the SKILL: inputs section, tool guidance, decision rules, output format. What lives in the subagent YAML: role identity, a one-line pointer to read the skill, the single-shot rule (`do not call write_todos`), and the exact one-line final-reply contract back to the main agent. The split is principled: workflow is reusable across agents, but a different caller invoking the same skill won't need the same single-shot policy or the same \"Wrote X to: <path>\" handshake. Each subagent's system prompt collapsed from ~100 lines to ~7.\n\n**Subagents get their own `SkillsMiddleware`; nothing inherits from the parent.** deepagents' `SubAgent` TypedDict (`deepagents/middleware/subagents.py:88-89`) accepts an optional `skills: list[str]`, and `create_deep_agent` builds a dedicated `SkillsMiddleware` per subagent (`deepagents/graph.py:557-559`). The main agent's `skills=[\"skills/career-agent/\"]` does **not** propagate. We added a one-line passthrough in `load_subagents` and let deepagents do the rest \u2014 no path resolution on our side, no skill loading code to maintain.\n\n# Files of interest\n\n| Concern | Path |\n|---|---|\n| Skills passthrough in subagent loader | `backend/app/career_agent/utils.py` (`load_subagents`) |\n| Subagent specs (now short) + `skills:` field | `backend/app/career_agent/subagents.yaml` |\n| Main agent's source path | `backend/app/career_agent/agents.py` (`skills=[\"skills/career-agent/\"]`) |\n| Filesystem-tool prompt \u2014 `mkdir` warning for `write_file` / `overwrite_file` | `backend/app/career_agent/prompts.py` (`FILESYSTEM` block) |\n| Moved skill | `skills/career-agent/interview-battlecard/SKILL.md` |\n| New skills | `skills/{hiring-recon,resume-tailor,interview-coach}/<same>/SKILL.md` |\n| Unit tests | `backend/tests/career_agent/test_utils.py` |\n\n# Decisions worth remembering\n\n- **Per-consumer grouping over flat.** Already covered above as the central architectural choice \u2014 recorded here because the temptation will recur when the next reusable workflow lands. If a skill ends up genuinely shared across two consumers, declare both paths in the `skills:` lists rather than collapsing to a flat layout.\n- **`career-agent/` over `main/` as the grouping-folder name.** First pass used `main/`. User correction: the main agent has a name (`career-agent`) \u2014 use it. Future agents in this repo will sit under sibling folders matching their own names, not a generic \"main\".\n- **One-line subagent prompts, but interface rules stay.** First pass moved the single-shot rule and the final-reply contract into SKILL.md alongside the workflow. User correction: those govern the subagent\u2194caller handshake, not the workflow, so they belong in the YAML next to the role line. Tracking this in `feedback_subagent_prompt_minimal.md` (auto-memory) so future migrations don't repeat the misclassification.\n- **`mkdir` instruction in the FILESYSTEM prompt, not just docstrings.** Caught during dogfooding: the main agent ran `execute(\"mkdir -p /interview_battlecard/<resume>\")` before `write_file`. `FilesystemBackend.write()` (`deepagents/backends/filesystem.py:434`) already does `parent.mkdir(parents=True, exist_ok=True)`, and `StoreBackend` is a namespaced KV with no directory concept \u2014 the `mkdir` was always a no-op. Added \"parent directories are created automatically, do NOT run `mkdir`\" to both `write_file` and `overwrite_file` in the patched `FILESYSTEM` system-prompt block (`prompts.py`). System-prompt note beats docstring-only because the prompt is in-context every turn; docstrings are read once at registration.\n- **`overwrite_file` lives in the FILESYSTEM block too, even though it's a custom tool.** Mild coupling between our app code and a deepagents constant we're already patching, in exchange for grouping all seven filesystem tools the agent actually has in one place \u2014 same listing the LLM scans when picking a tool.\n\n# Deferred (intentional non-goals for v1)\n\n- **Generalising the loader.** `load_subagents` still hard-codes the `available_tools` dict (`web_search`, `web_extract`). When a second tool family arrives, generalise to a registry \u2014 but not pre-emptively.\n- **Cross-subagent skill sharing.** If `hiring-recon` and `interview-coach` ever need the same sub-workflow (e.g. a shared \"STAR formatting\" skill), the right move is to put it under its own grouping folder and add the path to both subagents' `skills:` lists. Not built yet because no two subagents share a sub-workflow today.\n\n# How to verify end-to-end\n\n1. `cd backend && uv run pytest tests/career_agent/test_utils.py` \u2014 four tests green (skills passthrough, omission, existing-field mapping, unknown-tool failure).\n2. `docker compose up -d`, send a chat asking to process a CV + JD and run the full flow.\n3. Open the LangGraph trace for one of the subagent spawns. Confirm:\n   - The subagent's system prompt's \"Available Skills\" manifest lists **only** its own skill (e.g. only `hiring-recon` for the hiring-recon subagent, no `interview-battlecard`).\n   - The subagent's first tool call is `read_file(\"/skills/<consumer>/<skill>/SKILL.md\", limit=1000)`.\n   - The expected output file lands at the path the main agent passed in the task description.\n4. Open the main agent's trace. Confirm its skill manifest lists only `interview-battlecard` \u2014 no leakage of the three subagent skills.\n5. Confirm **no** `execute(\"mkdir -p \u2026\")` calls appear before any `write_file` / `overwrite_file` in the trace.", "07_tailored_resume_pdf": "# Why\n\nStage 4.1 of the agent workflow previously had `resume-tailor` write a plain markdown file (`/tailored_resume/<resume>/<jd>.md`). Users want the actual deliverable they hand to a recruiter \u2014 a typeset PDF \u2014 not raw markdown they have to convert themselves. `rendercv[full]>=2.8` is already a backend dep, so we wire it in rather than reinvent layout.\n\nWe also want the YAML to be a **first-class, editable source of truth**: if the user tweaks a bullet, the agent can re-render the PDF without re-tailoring.\n\n# What the user sees\n\nFor each `<resume>` \u00d7 `<jd>` pair, the Workspace > Files view now shows two artifacts under `/tailored_resume/<resume>/`:\n\n- `<jd>.yaml` \u2014 the rendercv source. Hand-editable; the canonical record of what was tailored. Top of the file is a `# changes:` comment block summarising the reorder / keyword / bullet edits the agent made.\n- `<jd>.pdf` \u2014 the rendered PDF (theme selected per resume \u2014 `engineeringclassic` if engineering signals detected, else `classic`).\n\nThe `<jd>.typ` intermediate file is written to `/render_intermediate/<resume>/<jd>.typ` on real disk, **not** in the UI allowlist \u2014 invisible to users, available for debugging.\n\nAfter the agent finishes, the subagent replies one line: `Wrote tailored resume PDF to: <pdf_path>`. To regenerate after the user edits the YAML, the main agent (which also has `prepare_render_settings`) re-runs `prepare_render_settings(yaml_path)` then `execute(\"rendercv render <abs_path>\")` \u2014 no re-tailoring.\n\n# How \u2014 the key architectural choices\n\n**Three-step subagent flow.** (1) LLM writes the YAML (`cv:`, `design:`, `locale:` only \u2014 no `settings:`). (2) LLM calls `prepare_render_settings(yaml_path)` \u2014 a new custom tool that deterministically appends a canonical `settings:` block (pinning output paths, skipping md/html/png) and returns the on-disk absolute path to use. (3) LLM calls `execute(\"rendercv render <abs_path>\")` from `LocalShellBackend`'s inherited shell tool. Split chosen because (a) the LLM shouldn't reason about render settings, (b) we don't want it constructing long CLI override argv, and (c) the YAML must stay user-editable so a wrapper-around-rendercv tool would hide the settings.\n\n**Tool wiring refactor.** Subagents were silently inheriting the main agent's full toolset (e.g. `interview-coach` getting `parse_document` and `extract_jd`). Fixed by moving the tool pool into `agents.py`, threading it into `load_subagents(tools=, default_tools=)`, and **always** writing an explicit `tools=[\u2026]` onto every subagent spec (empty list when none declared). `default_tools` carries `list_files` + `overwrite_file` to every subagent so they don't have to re-declare basics.\n\n**Heavy SKILL.md prompt-engineering.** rendercv's pydantic models are strict; the LLM accumulated a long tail of YAML / type / enum errors across runs. Each one is now pinned in two places: a prescriptive rule (template comment + pitfalls section) and a recovery hint in the step-4 common-errors list. Covered: unquoted colons (mid + trailing), numeric strings (`label: 2022`), E.164 phones, `cv:` field allowlist (`headline` not `label`), 17-value `social_networks.network` enum + `custom_connections` fallback, `custom_connections.url` HttpUrl rule, nested-list bullets, NormalEntry-per-skill-category structure with a worked side-by-side RIGHT/WRONG YAML example, and \"don't drop skills / URLs from the source\".\n\n**Filesystem-tool guidance moved up.** Added to `prompts.py` Block 5b: *\"Do NOT use `execute` to create or edit files\"* \u2014 applies to every agent that has shell access, not just resume-tailor.\n\n# Files of interest\n\n| Concern | Path |\n|---|---|\n| New `prepare_render_settings` tool factory | `backend/app/career_agent/tools.py` |\n| Tool pool + `default_tools` + main-agent wiring | `backend/app/career_agent/agents.py` |\n| `load_subagents(tools=, default_tools=)` | `backend/app/career_agent/utils.py` |\n| `resume-tailor` subagent declaration | `backend/app/career_agent/subagents.yaml` |\n| Full rewrite (rendercv workflow + pitfalls + common errors) | `backend/app/career_agent/skills/resume-tailor/resume-tailor/SKILL.md` |\n| `EXECUTION` prompt: \"don't write files via execute\" | `backend/app/career_agent/prompts.py` |\n| Stage-4 description + new yaml/pdf paths | `backend/agents/career_agent/CAREER_AGENT.md` |\n| File-structure block + flow description | `backend/app/career_agent/README.md` |\n| `/render_intermediate/` gitignore | `backend/.gitignore` |\n| Unit tests (settings injection, idempotency, path validation, mkdir) | `backend/tests/career_agent/test_tools.py` |\n| Updated `load_subagents` tests (`tools=`, `default_tools=`) | `backend/tests/career_agent/test_utils.py` |\n\n# Decisions worth remembering\n\n- **YAML is the source of truth, PDF is the deliverable, .typ is hidden.** The split avoids cluttering the UI with an intermediate file users don't review, while preserving it on disk for debugging.\n- **Flat sibling layout** (`<jd>.yaml`, `<jd>.pdf`) under `/tailored_resume/<resume>/`, matching the prior `<jd>.md` convention. Nested per-JD folders rejected as unnecessary.\n- **Settings injected by tool, not LLM.** The LLM emits only `cv:` / `design:` / `locale:`; `prepare_render_settings` owns `settings:` exclusively. Idempotent so re-renders work.\n- **All built-in rendercv themes allowed** (`classic`, `classic_legacy`, `sb2nov`, `moderncv`, `engineeringclassic`, `engineeringresumes`); auto-detection picks engineering vs. classic but the user can override.\n- **Changes log lives as a top-of-YAML `# changes:` comment**, not a separate file. Survives re-renders, doesn't render in the PDF.\n- **Subagents inherit `execute` from `LocalShellBackend`** automatically \u2014 but **do NOT** inherit custom tools. Mixed inheritance is enforced by the always-explicit `tools=[\u2026]` in `load_subagents`.\n- **PII discipline:** SKILL.md uses fictional placeholders (`+15551234567`, `Jane Doe`, `your-username`); real user content lives only under gitignored output dirs.", "08_agent_workflow": "**Extends:** [Document Processing (v1)](02_document_processing.md), [JD-from-URL Extraction (v1)](03_jd_url_extraction.md), [Tailored Resume PDF (v1)](07_tailored_resume_pdf.md), [Subagents with Skills (v1)](06_subagents_with_skills.md)\n\n# Why\n\nv1 of the workflow ([PRD 04 \u2014 Stages 3\u20135](04_initialize_subagents.md)) landed the original 5-stage spine: three subagents (`hiring-recon`, `resume-tailor`, `interview-coach`) plus the `interview-battlecard` skill, with each subagent's full workflow inlined as a `system_prompt:` block in `subagents.yaml` and the tailored resume emitted as plain markdown. v2 folds in two follow-on refactors that landed since: [Subagents with Skills (PRD 06)](06_subagents_with_skills.md) moved each subagent's workflow into a per-consumer `SKILL.md`, and [Tailored Resume PDF (PRD 07)](07_tailored_resume_pdf.md) wired `resume-tailor` to `rendercv` so the user gets a downloadable PDF instead of markdown. This PRD documents the consolidated state of the workflow as it currently runs end-to-end; it supersedes the per-iteration PRDs as the canonical reference for how the 5 stages fit together today.\n\nGoal: a single chat thread takes the user from \"here's my CV and the JD\" to a finished interview kit (research report, tailored PDF resume, interview prep doc, day-of battlecard) without the agent stalling or fabricating intermediate files.\n\n# What the user sees\n\nA new session opens with one short message asking for all four intake inputs: CV upload, JD (file / URL / pasted), prep timeline, and any extra context. The agent does not parse anything until at least the CV and JD are provided. The CV and JD can be attached from the **chat composer** (paperclip icon) or from **Workspace > Files** (Upload button); both surfaces POST to `/api/files/upload` and land bytes at `/upload/<filename>` via the shared `.:/deps/next-role` volume mount.\n\nOnce both files are processed (Stage 2), the agent persists the prep timeline + role-side notes to `/processed/<resume-slug>-<jd-slug>-intake.md`, and appends any candidate-side notes (\"skills not on my CV\", \"side project I shipped last month\") to `/processed/<resume-slug>.md` under a dated `## Additional context` heading. From there the agent runs the rest of the arc autonomously:\n\n- **Stage 3** \u2014 delegates to the `hiring-recon` subagent \u2192 `/research/<resume>/<jd>.md`.\n- **Stage 4** \u2014 in one turn, spawns `resume-tailor` and `interview-coach` in parallel. `resume-tailor` writes the YAML at `/tailored_resume/<resume>/<jd>.yaml` and triggers `rendercv` to produce the `.typ` (under `/render_intermediate/`) and `.pdf` siblings. `interview-coach` writes the structured prep doc to `/interview_coach/<resume>/<jd>.md`.\n- **Stage 5** \u2014 loads the `interview-battlecard` skill, reads the tailored resume + interview-coach prep + research report, and writes the day-of one-pager to `/interview_battlecard/<resume>/<jd>.md`.\n\nThe agent maintains a `write_todos` checklist of remaining stages from turn one, even though the global TODO middleware says to skip the tool for short objectives. This workflow is explicitly the exception.\n\n# How \u2014 the key architectural choices\n\n**Two-file split: overview in `SYSTEM_PROMPT`, procedure in `CAREER_AGENT.md`.** `SYSTEM_PROMPT` is short and names the 5 stages plus the `write_todos` invariant. `CAREER_AGENT.md` is the per-stage procedure manual, loaded into every turn via `memory=[\"CAREER_AGENT.md\"]` in `agents.py` and rendered through the `MEMORY` block's `{agent_memory}` placeholder. The system prompt names each downstream stage's subagent / skill and the canonical output path inline so the LLM can plan against the spine without first reading `CAREER_AGENT.md`.\n\n**Per-consumer skill grouping under `skills/`.** Each agent or subagen
